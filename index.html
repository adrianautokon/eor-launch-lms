<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="EOR Launch OS — the operating system for launching a global Employer-of-Record business staffed from Indonesia. Investment case, operations, compliance, payments and execution in one place.">
<title>EOR Launch OS — Global × Indonesia · Navv Studio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23c8961e'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui,sans-serif' font-size='18' font-weight='800' fill='%231a1a13'%3EE%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#08080d;
  --gold:#e0b84a;--gold2:#f0d68a;--golddim:#c8961e;
  --text:#f4f4f8;--text2:#b6b6c4;--muted:#8a8a98;
  --glass:rgba(255,255,255,.055);--glass2:rgba(255,255,255,.085);--gline:rgba(255,255,255,.10);
 --blur:18px;
  --green:#34d399;--greenbg:rgba(52,211,153,.12);--greenink:#6ee7b7;
  --red:#fb7185;--redbg:rgba(251,113,133,.12);--redink:#fda4af;
  --amber:#fbbf24;--amberbg:rgba(251,191,36,.12);--amberink:#fcd34d;
  --blue:#7aa2ff;--bluebg:rgba(122,162,255,.12);--blueink:#a9c1ff;
  --violet:#c084fc;--violetbg:rgba(192,132,252,.12);--violetink:#d8b4fe;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--text);line-height:1.62;font-size:15px;-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(1100px 620px at 12% -8%, rgba(224,184,74,.16), transparent 58%),
    radial-gradient(1000px 720px at 104% -4%, rgba(90,120,220,.14), transparent 55%),
    radial-gradient(900px 900px at 50% 120%, rgba(224,184,74,.06), transparent 60%),
    var(--bg);
  background-attachment:fixed;min-height:100vh;}
a{color:var(--blueink);text-decoration:none;}
a:hover{text-decoration:underline;cursor:pointer;}
:focus-visible{outline:2px solid var(--gold2);outline-offset:2px;border-radius:8px;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}}

.app{display:grid;grid-template-columns:288px 1fr;min-height:100vh;}
.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  backdrop-filter:blur(26px) saturate(1.4);-webkit-backdrop-filter:blur(26px) saturate(1.4);
  border-right:1px solid var(--gline);}
.sidebar::-webkit-scrollbar{width:8px;}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:9px;}
.brand{padding:22px 20px 16px;border-bottom:1px solid var(--gline);}
.brand .logo{display:flex;align-items:center;gap:12px;}
.brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--golddim),var(--gold2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#1a1a13;font-size:18px;box-shadow:0 6px 18px rgba(224,184,74,.35),inset 0 1px 0 rgba(255,255,255,.4);}
.brand h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.brand .tagline{font-size:11px;color:var(--muted);margin-top:2px;}
.progwrap{padding:16px 20px;border-bottom:1px solid var(--gline);}
.progrow{display:flex;align-items:center;gap:13px;}
.ring{width:48px;height:48px;flex-shrink:0;filter:drop-shadow(0 4px 10px rgba(224,184,74,.3));}
.progmeta .n{font-size:19px;font-weight:750;color:#fff;line-height:1;}
.progmeta .l{font-size:11px;color:var(--text2);margin-top:3px;}
nav.modnav{padding:8px 0 44px;}
.navsec{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:15px 20px 5px;font-weight:700;}
.navmod{display:flex;align-items:center;gap:11px;padding:9px 16px 9px 18px;margin:1px 9px;border-radius:11px;font-size:13.5px;color:var(--text2);cursor:pointer;transition:.14s;}
.navmod:hover{background:var(--glass2);color:var(--text);}
.navmod.active{background:linear-gradient(135deg,rgba(224,184,74,.18),rgba(224,184,74,.06));color:#fff;box-shadow:inset 0 0 0 1px rgba(224,184,74,.28);}
.navmod .ix{width:23px;height:23px;border-radius:7px;background:var(--glass2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0;}
.navmod.active .ix{background:linear-gradient(135deg,var(--golddim),var(--gold2));color:#1a1a13;}
.navmod .chev{margin-left:auto;font-size:10px;color:var(--muted);transition:transform .18s;}
.navmod.open .chev{transform:rotate(90deg);}
.navmod .cnt{margin-left:auto;font-size:10px;color:var(--muted);font-weight:700;}
.navmod.open .cnt,.navmod.open .done{display:none;}
.navmod .done{color:var(--green);font-size:12px;opacity:0;margin-left:auto;}
.navmod.completed .done{opacity:1;}
.subwrap{overflow:hidden;max-height:0;transition:max-height .28s ease;margin:0 9px;}
.subwrap.open{max-height:2000px;}
.navsub{display:flex;align-items:center;gap:9px;padding:7px 14px 7px 46px;font-size:12.5px;color:var(--muted);cursor:pointer;border-radius:9px;transition:.12s;line-height:1.35;}
.navsub span:last-child{flex:1;min-width:0;}
.navsub:hover{background:var(--glass2);color:var(--text);}
.navsub.active{color:var(--gold2);}
.navsub .sd{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0;}
.navsub.active .sd{opacity:1;}

.main{min-width:0;}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;min-height:38px;padding:8px 40px;
  background:rgba(10,10,16,.6);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--gline);}
.menubtn{display:none;align-items:center;justify-content:center;width:38px;height:34px;border-radius:10px;border:1px solid var(--gline);background:var(--glass);color:var(--text);cursor:pointer;flex-shrink:0;font-size:16px;}
.topbar .crumb{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar .crumb b{color:var(--text);}
.topbar .bar{margin-left:auto;width:130px;height:7px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;flex-shrink:0;}
.topbar .bar span{display:block;height:100%;background:linear-gradient(90deg,var(--golddim),var(--gold2));width:0;transition:width .4s;}
.topbar .pct{font-size:12px;font-weight:700;color:var(--gold);min-width:32px;}
.content{padding:24px 40px 110px;max-width:1140px;}
section.view{animation:fade .3s cubic-bezier(.2,.7,.2,1);}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.scrim{display:none;position:fixed;inset:0;z-index:55;background:rgba(0,0,0,.5);}

/* subnav pills inside a module */
.subnav{position:sticky;top:38px;z-index:30;padding:7px 0 8px;margin-bottom:4px;background:linear-gradient(180deg,rgba(8,8,13,.96),rgba(8,8,13,.74));backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04);}
.subnav-track{display:flex;gap:6px;flex-wrap:nowrap;align-items:center;overflow-x:auto;overscroll-behavior-inline:contain;scrollbar-width:none;padding-bottom:1px;}
.subnav-track::-webkit-scrollbar{display:none;}
.subnav-label{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.65px;color:var(--muted);padding:4px 4px 4px 9px;margin-left:4px;border-left:1px solid rgba(255,255,255,.1);white-space:nowrap;flex:0 0 auto;}
.subnav-label:first-child{margin-left:0;padding-left:0;border-left:0;}
.subnav button{font-size:11.5px;font-weight:650;color:var(--text2);padding:5px 10px;border-radius:99px;border:1px solid var(--gline);background:var(--glass);cursor:pointer;font-family:inherit;transition:.12s;white-space:nowrap;flex:0 0 auto;}
.subnav button:hover{background:var(--glass2);color:#fff;}
.subnav button.active{background:linear-gradient(135deg,rgba(224,184,74,.2),rgba(224,184,74,.06));color:#fff;border-color:rgba(224,184,74,.4);box-shadow:0 0 0 1px rgba(224,184,74,.15);}
.sub{scroll-margin-top:92px;padding-top:8px;margin-bottom:18px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.04);}
.sub:last-of-type{border-bottom:none;margin-bottom:4px;}
.sub .subhead{display:flex;align-items:baseline;gap:10px;margin:20px 0 8px;padding-top:4px;}
.pathgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0 8px;}
@media(max-width:1000px){.pathgrid{grid-template-columns:1fr 1fr;}}
@media(max-width:620px){.pathgrid{grid-template-columns:1fr;}}
.pathcard{background:var(--glass);border:1px solid var(--gline);border-radius:14px;padding:15px 16px;cursor:pointer;transition:.14s;backdrop-filter:blur(var(--blur));}
.pathcard:hover{border-color:rgba(224,184,74,.45);background:var(--glass2);transform:translateY(-1px);}
.pathcard .pl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--gold);margin-bottom:5px;}
.pathcard .pt{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;}
.pathcard .pd{font-size:12px;color:var(--muted);line-height:1.45;}
.proofgrid{display:grid;grid-template-columns:1.15fr .85fr;gap:15px;margin:16px 0;}
.prooflist{display:grid;gap:8px;margin-top:8px;}
.proofitem{display:grid;grid-template-columns:86px 1fr;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--gline);border-radius:12px;background:rgba(255,255,255,.04);}
.proofitem .step{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--gold);}
.proofitem .txt{font-size:12.5px;color:var(--text2);line-height:1.45;}
.evidencebar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0;}
.evidencebar .ev{border:1px solid var(--gline);border-radius:12px;padding:10px;background:rgba(255,255,255,.04);min-height:78px;}
.evidencebar .ev b{display:block;font-size:12px;margin-bottom:3px;}
.evidencebar .ev span{font-size:11px;color:var(--muted);line-height:1.35;display:block;}
.sourcechip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 8px;border:1px solid var(--gline);border-radius:99px;background:rgba(255,255,255,.05);color:var(--text2);margin:0 4px 6px 0;}
.sub .subhead .no{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.5px;}
.sub .subhead h3{margin:0;font-size:20px;}

.kick{font-size:11px;text-transform:uppercase;letter-spacing:1.6px;color:var(--gold);font-weight:700;margin-bottom:7px;}
h2.title{font-size:30px;font-weight:750;letter-spacing:-.6px;margin-bottom:10px;line-height:1.12;color:#fff;}
.sub0{font-size:16px;color:var(--text2);max-width:820px;margin-bottom:8px;}
h3{font-size:19px;font-weight:700;margin:26px 0 10px;letter-spacing:-.3px;color:#fff;}
h4{font-size:14px;font-weight:700;margin:16px 0 6px;color:var(--text);}
p{margin-bottom:12px;max-width:840px;color:var(--text2);}
ul,ol{margin:0 0 14px 20px;max-width:840px;}li{margin-bottom:6px;color:var(--text2);}
.lead{font-size:16px;color:var(--text);}
b,strong{color:var(--text);}i{color:var(--text2);}

.card{background:var(--glass);border:1px solid var(--gline);border-radius:var(--radius);padding:19px 21px;margin:14px 0;backdrop-filter:blur(var(--blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--blur)) saturate(1.3);box-shadow:0 10px 34px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.06);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:1000px){.grid3,.grid4{grid-template-columns:1fr 1fr;}}
.stat{background:var(--glass);border:1px solid var(--gline);border-radius:14px;padding:16px 18px;backdrop-filter:blur(var(--blur));box-shadow:0 10px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);}
.stat .v{font-size:24px;font-weight:750;letter-spacing:-.6px;line-height:1;color:#fff;}
.stat .k{font-size:12px;color:var(--muted);margin-top:6px;}
.stat.gold .v{color:var(--gold2);}.stat.green .v{color:var(--greenink);}.stat.red .v{color:var(--redink);}.stat.blue .v{color:var(--blueink);}

.callout{border-left:3px solid var(--gold);background:var(--amberbg);border-radius:0 14px 14px 0;padding:14px 18px;margin:14px 0;backdrop-filter:blur(var(--blur));}
.callout.red{border-color:var(--red);background:var(--redbg);}.callout.green{border-color:var(--green);background:var(--greenbg);}.callout.blue{border-color:var(--blue);background:var(--bluebg);}
.callout b:first-child{display:block;margin-bottom:3px;color:#fff;}
.callout p{margin:0;max-width:none;color:var(--text2);}

.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:12px 0;border-radius:14px;}
.tablewrap table{margin:0;}
table{width:100%;border-collapse:collapse;font-size:12.5px;margin:12px 0;background:rgba(255,255,255,.03);border:1px solid var(--gline);border-radius:14px;overflow:hidden;}
th{background:rgba(255,255,255,.06);text-align:left;padding:9px 11px;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);}
td{padding:9px 11px;border-top:1px solid var(--gline);vertical-align:top;color:var(--text2);}
tr:hover td{background:rgba(255,255,255,.04);}
.mono{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;color:var(--blueink);}

.seqwrap{margin:14px 0 18px;padding:14px;border:1px solid var(--gline);border-radius:14px;background:rgba(255,255,255,.035);overflow-x:auto;-webkit-overflow-scrolling:touch;box-shadow:0 10px 30px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.05);}
.seqwrap .seqtitle{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:8px;}
.seqwrap .seqtitle h4{margin:0;color:#fff;}
.seqwrap .seqtitle span{font-size:11px;color:var(--muted);white-space:nowrap;}
.seqsvg{display:block;min-width:1040px;width:100%;height:auto;}
.seqsvg text{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
.seqactor{fill:rgba(255,255,255,.075);stroke:rgba(255,255,255,.18);stroke-width:1;}
.seqactor-t{fill:#f4f4f8;font-size:12px;font-weight:750;text-anchor:middle;}
.seqlife{stroke:rgba(255,255,255,.14);stroke-width:1;stroke-dasharray:5 7;}
.seqmsg{stroke:#7aa2ff;stroke-width:2;marker-end:url(#seqArrow);}
.seqmsg.alt{stroke:#e0b84a;marker-end:url(#seqArrowGold);}
.seqmsg.risk{stroke:#fb7185;marker-end:url(#seqArrowRed);}
.seqnum{fill:#08080d;font-size:10px;font-weight:800;text-anchor:middle;dominant-baseline:middle;}
.seqbadge{fill:#f0d68a;}
.seqbadge.blue{fill:#a9c1ff;}
.seqbadge.red{fill:#fda4af;}
.seqtext{fill:#d7d7e0;font-size:11px;font-weight:650;}
.seqnote{fill:#8a8a98;font-size:10px;}
.ssd{border:1px solid rgba(122,162,255,.24);background:rgba(122,162,255,.055);border-radius:14px;padding:13px 14px;margin:14px 0;overflow:hidden;}
.ssd-h{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:10px;}
.ssd-h h4{margin:0;color:#fff;}
.ssd-h a{font-size:11px;font-weight:700;color:var(--blueink);white-space:nowrap;}
.ssd-actors{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.ssd-actor{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.45px;color:var(--text2);padding:5px 8px;border:1px solid var(--gline);border-radius:999px;background:rgba(255,255,255,.045);}
.ssd-grid{display:grid;grid-template-columns:26px minmax(95px,.65fr) 24px minmax(95px,.65fr) minmax(180px,1.25fr) minmax(130px,.85fr);gap:7px;align-items:start;}
.ssd-step{display:contents;}
.ssd-n{width:22px;height:22px;border-radius:7px;background:var(--blueink);color:#08080d;font-size:11px;font-weight:850;display:flex;align-items:center;justify-content:center;}
.ssd-from,.ssd-to{font-size:11px;font-weight:800;color:#fff;}
.ssd-arrow{color:var(--gold2);font-weight:900;text-align:center;}
.ssd-msg{font-size:12px;color:var(--text2);line-height:1.35;}
.ssd-gate{font-size:11px;color:var(--muted);line-height:1.35;}
.ssd-out{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ssd-out div{font-size:11.5px;color:var(--text2);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:8px;}
.ssd-out b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--gold2);margin-bottom:3px;}
.drivebox{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid rgba(224,184,74,.22);background:rgba(224,184,74,.06);border-radius:12px;padding:10px 12px;margin:12px 0;}
.drivebox .dt{font-size:12px;font-weight:750;color:#fff;}
.drivebox .dd{font-size:11.5px;color:var(--muted);}
.drivebox a{font-size:11px;font-weight:800;white-space:nowrap;color:var(--gold2);}
.simbox{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;border:1px solid rgba(47,211,154,.24);background:rgba(47,211,154,.055);border-radius:14px;padding:16px;margin:14px 0;}
.simbox h4{margin:0 0 6px;color:#fff;}
.simbox p{margin:0;color:var(--text2);}
.simbox .mini{margin-top:8px;}
.simmeta{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.simmeta div{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);border-radius:10px;padding:10px;}
.simmeta b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.55px;color:var(--greenink);margin-bottom:4px;}
.simbtn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:0 14px;border-radius:10px;background:var(--greenink);color:#07110d!important;font-weight:850;text-decoration:none;margin-top:12px;}

.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;margin:0 4px 4px 0;}
.pill.local{background:var(--amberbg);color:var(--amberink);}.pill.deel{background:var(--bluebg);color:var(--blueink);}
.pill.risk{background:var(--redbg);color:var(--redink);}.pill.why{background:var(--greenbg);color:var(--greenink);}
.pill.info{background:rgba(122,162,255,.14);color:var(--blueink);}.pill.win{background:var(--greenbg);color:var(--greenink);}

.chartbox{background:var(--glass);border:1px solid var(--gline);border-radius:14px;padding:16px 18px;margin:14px 0;backdrop-filter:blur(var(--blur));box-shadow:0 10px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);}
.chartbox h4{margin-top:0;}
.chartbox canvas{max-width:100%;min-height:210px;}
.src{font-size:11px;color:var(--muted);margin-top:8px;}
.src a{color:var(--text2);}

.check{list-style:none;margin:10px 0;padding:0;max-width:none;}
.check li{display:flex;gap:11px;align-items:flex-start;padding:10px 13px;border:1px solid var(--gline);border-radius:12px;margin-bottom:7px;background:var(--glass);cursor:pointer;transition:.14s;}
.check li:hover{border-color:rgba(224,184,74,.5);background:var(--glass2);}
.check li .box{width:20px;height:20px;border:2px solid rgba(255,255,255,.28);border-radius:7px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#0a0a0f;}
.check li.on .box{background:var(--green);border-color:var(--green);}
.check li.on .txt{color:var(--muted);text-decoration:line-through;}
.check .txt{font-size:13.5px;color:var(--text);}

.stage{border:1px solid var(--gline);border-radius:14px;margin:12px 0;overflow:hidden;background:var(--glass);backdrop-filter:blur(var(--blur));box-shadow:0 8px 26px rgba(0,0,0,.28);}
.stage-h{display:flex;align-items:center;gap:12px;padding:12px 15px;background:rgba(255,255,255,.05);border-bottom:1px solid var(--gline);}
.stage-h.warn{background:var(--amberbg);}.stage-h.danger{background:var(--redbg);}
.stage-n{width:28px;height:28px;border-radius:9px;background:rgba(255,255,255,.14);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.stage-h.warn .stage-n{background:var(--amber);color:#1a1508;}.stage-h.danger .stage-n{background:var(--red);color:#1a0508;}
.stage-t{font-size:15px;font-weight:700;color:#fff;}
.stage-b{padding:14px 15px;}.stage-b p{color:var(--text2);}

.videocard{display:flex;gap:12px;align-items:center;padding:12px 14px;border:1px solid var(--gline);border-radius:12px;background:var(--glass);margin-bottom:8px;cursor:pointer;transition:.14s;}
.videocard:hover{border-color:rgba(224,184,74,.45);background:var(--glass2);}
.videocard .play{width:38px;height:38px;border-radius:11px;background:var(--redbg);color:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;}
.videocard .vt{font-size:13px;font-weight:600;color:var(--text);}
.videocard .vs{font-size:11px;color:var(--muted);}
.reslist{margin:10px 0;}
.reslink{display:block;padding:10px 13px;border:1px solid var(--gline);border-radius:11px;background:var(--glass);margin-bottom:7px;transition:.12s;}
.reslink:hover{border-color:rgba(224,184,74,.45);background:var(--glass2);text-decoration:none;}
.reslink .rt{font-size:13px;font-weight:600;color:var(--text);}
.reslink .rd{font-size:11.5px;color:var(--muted);}
.reslink .rtag{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);}

.worked{background:rgba(122,162,255,.07);border:1px solid rgba(122,162,255,.25);border-radius:12px;padding:14px 16px;margin:12px 0;font-size:13px;}
.worked .wt{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--blueink);margin-bottom:6px;}
.worked .wl{display:flex;justify-content:space-between;padding:3px 0;color:var(--text2);border-bottom:1px dashed var(--gline);}
.worked .wl.tot{border-bottom:none;border-top:1px solid var(--gline);margin-top:4px;padding-top:7px;font-weight:750;color:#fff;}

/* funnel */
.funnel{margin:16px 0;}
.ftier{margin:0 auto 8px;border-radius:12px;padding:15px 20px;text-align:center;border:1px solid var(--gline);position:relative;backdrop-filter:blur(var(--blur));}
.ftier .fl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;}
.ftier .fv{font-size:24px;font-weight:800;letter-spacing:-.5px;color:#fff;margin:2px 0;}
.ftier .fd{font-size:12px;color:var(--text2);}
.ftier.tam{width:100%;background:rgba(122,162,255,.13);border-color:rgba(122,162,255,.3);}.ftier.tam .fl{color:var(--blueink);}
.ftier.sam{width:74%;background:rgba(224,184,74,.13);border-color:rgba(224,184,74,.3);}.ftier.sam .fl{color:var(--gold2);}
.ftier.som{width:50%;background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.3);}.ftier.som .fl{color:var(--greenink);}

/* competitor grid + profile */
.compgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0;}
@media(max-width:1000px){.compgrid{grid-template-columns:1fr 1fr;}}@media(max-width:620px){.compgrid{grid-template-columns:1fr;}}
.compcard{background:var(--glass);border:1px solid var(--gline);border-radius:14px;padding:15px 16px;cursor:pointer;transition:.14s;backdrop-filter:blur(var(--blur));}
.compcard:hover{border-color:rgba(224,184,74,.5);background:var(--glass2);transform:translateY(-2px);}
.compcard .cn{font-size:15px;font-weight:700;color:#fff;}
.compcard .cp{font-size:12px;color:var(--muted);margin:3px 0 8px;min-height:32px;}
.compcard .cf{font-size:12.5px;color:var(--gold2);font-weight:700;}
.badge{display:inline-block;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:6px;}
.badge.high{background:var(--redbg);color:var(--redink);}.badge.med{background:var(--amberbg);color:var(--amberink);}
.badge.low{background:var(--bluebg);color:var(--blueink);}.badge.dist{background:rgba(122,162,255,.14);color:var(--blueink);}
.backlink{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer;margin-bottom:8px;}
.backlink:hover{color:var(--text);}

.moneyflow{display:flex;flex-direction:column;gap:0;margin:14px 0;}
.mfstep{display:flex;gap:13px;align-items:flex-start;position:relative;padding-bottom:16px;}
.mfstep:not(:last-child)::before{content:'';position:absolute;left:15px;top:30px;bottom:0;width:2px;background:var(--gline);}
.mfstep .mfn{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--golddim),var(--gold2));color:#1a1a13;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;z-index:1;}
.mfstep .mft{font-size:14px;font-weight:700;color:#fff;}
.mfstep .mfd{font-size:12.5px;color:var(--text2);}

.next{display:flex;justify-content:space-between;gap:12px;margin-top:36px;padding-top:20px;border-top:1px solid var(--gline);flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 17px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--gline);background:var(--glass);color:var(--text);transition:.14s;font-family:inherit;}
.btn:hover{border-color:rgba(224,184,74,.5);background:var(--glass2);}
.btn.gold{background:linear-gradient(135deg,var(--golddim),var(--gold2));color:#1a1a13;border-color:transparent;box-shadow:0 6px 18px rgba(224,184,74,.32);}
.btn.ghost{color:var(--muted);}

.calc{background:var(--glass);border:1px solid var(--gline);border-radius:16px;padding:19px 21px;backdrop-filter:blur(var(--blur));box-shadow:0 10px 30px rgba(0,0,0,.3);}
.calc label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin:11px 0 5px;}
.calc input,.calc select{width:100%;padding:10px 12px;border:1px solid var(--gline);border-radius:11px;font-size:15px;font-family:inherit;background:rgba(255,255,255,.06);color:var(--text);}
.calc input[type=range]{padding:0;}
.calc select option{background:#16161f;color:var(--text);}
.calc .out{margin-top:14px;border-top:1px dashed var(--gline);padding-top:12px;}
.calc .line{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--text2);}
.calc .line b{color:var(--text);}
.calc .line.tot{font-weight:750;font-size:16px;border-top:1px solid var(--gline);margin-top:5px;padding-top:9px;color:#fff;}
.calc .line .neg{color:var(--red);}.calc .line .pos{color:var(--greenink);}
.tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:6px;background:rgba(224,184,74,.16);color:var(--gold2);}

.hero{background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border:1px solid var(--gline);border-radius:20px;padding:32px 32px;color:#fff;margin-bottom:20px;backdrop-filter:blur(24px) saturate(1.4);box-shadow:0 20px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-40%;right:-10%;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(224,184,74,.28),transparent 68%);pointer-events:none;}
.hero .kick{color:var(--gold2);}
.hero h2{font-size:29px;font-weight:750;letter-spacing:-.7px;margin-bottom:11px;color:#fff;max-width:770px;position:relative;}
.hero p{color:var(--text2);max-width:750px;position:relative;}
.roadmap{display:flex;gap:11px;flex-wrap:wrap;margin-top:8px;}
.phase{flex:1;min-width:150px;background:var(--glass);border:1px solid var(--gline);border-radius:14px;padding:14px 16px;backdrop-filter:blur(var(--blur));box-shadow:0 8px 24px rgba(0,0,0,.26);}
.phase .ph{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);}
.phase .pt{font-size:14px;font-weight:700;margin:4px 0;color:#fff;}
.phase .pd{font-size:12px;color:var(--muted);}
.timeline{border-left:2px solid var(--gline);margin:14px 0 14px 8px;padding-left:22px;}
.timeline .tl{position:relative;padding-bottom:16px;}
.timeline .tl::before{content:'';position:absolute;left:-29px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--gold);border:2px solid var(--bg);box-shadow:0 0 0 3px rgba(224,184,74,.2);}
.timeline .tl .d{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;}
.timeline .tl .t{font-size:14px;font-weight:600;color:var(--text);}
.timeline .tl .x{font-size:12.5px;color:var(--muted);}
.mini{font-size:12.5px;color:var(--text2);margin-top:4px;}
.flag{font-size:11.5px;color:var(--amberink);background:var(--amberbg);border-radius:8px;padding:8px 11px;margin:8px 0;}

@media(max-width:760px){
  .app{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:0;top:0;z-index:60;width:288px;max-width:88vw;height:100vh;transform:translateX(-100%);transition:transform .25s cubic-bezier(.2,.7,.2,1);}
  .sidebar.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.6);}
  .menubtn{display:inline-flex;}
  .grid2,.grid3,.grid4{grid-template-columns:1fr;}
  .proofgrid{grid-template-columns:1fr;}
  .evidencebar{grid-template-columns:1fr 1fr;}
  .proofitem{grid-template-columns:1fr;}
  .content{padding:24px 17px 90px;}.topbar{padding:11px 17px;}
  h2.title{font-size:23px;}.hero{padding:24px 20px;}.hero h2{font-size:22px;}
  .subnav{top:48px;}
  .ssd-grid{grid-template-columns:24px 1fr;gap:5px 8px;}
  .ssd-arrow{display:none;}
  .ssd-from,.ssd-to,.ssd-msg,.ssd-gate{grid-column:2;}
  .ssd-to::before{content:'→ ';color:var(--gold2);}
  .ssd-out{grid-template-columns:1fr;}
  .drivebox{align-items:flex-start;flex-direction:column;}
  .simbox{grid-template-columns:1fr;}
  .simmeta{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="logo"><div class="mark">E</div><div><h1>EOR Launch OS</h1><div class="tagline">Global × Indonesia · Navv Studio</div></div></div></div>
    <div class="progwrap"><div class="progrow">
      <svg class="ring" viewBox="0 0 36 36"><path d="M18 2a16 16 0 1 1 0 32 16 16 0 0 1 0-32" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="3.4"/><path id="ringfill" d="M18 2a16 16 0 1 1 0 32 16 16 0 0 1 0-32" fill="none" stroke="url(#gr)" stroke-width="3.4" stroke-linecap="round" stroke-dasharray="100 100" stroke-dashoffset="100"/><defs><linearGradient id="gr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c8961e"/><stop offset="1" stop-color="#f0d68a"/></linearGradient></defs></svg>
      <div class="progmeta"><div class="n" id="progN">0%</div><div class="l">course progress</div></div>
    </div></div>
    <nav class="modnav" id="modnav"></nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="menubtn" id="menubtn" aria-label="Menu" onclick="toggleNav()">☰</button>
      <div class="crumb" id="crumb">Dashboard</div>
      <div class="bar"><span id="topbar"></span></div>
      <div class="pct" id="topPct">0%</div>
    </div>
    <div class="content" id="content"></div>
  </div>
  <div class="scrim" id="scrim" onclick="closeNav()"></div>
</div>

function go(mod,sub,keep){

  const c=document.getElementById('content');
  c.innerHTML=`<section class="view">${buildModule(m)}</section>`;
  renderNav();renderCharts(m.id);
  if(!keep){if(sub){const el=document.getElementById('sub-'+sub);if(el){setTimeout(()=>scrollToSub(sub,'auto'),90);setTimeout(()=>scrollToSub(sub,'auto'),560);}else window.scrollTo(0,0);}else window.scrollTo(0,0);}

  if(m.id==='econ')setTimeout(runCalc,60);

function scrollToSub(sub,behavior='auto'){
  const el=document.getElementById('sub-'+sub);if(!el)return;
  const topbar=document.querySelector('.topbar')?.getBoundingClientRect().height||0;
  const subnav=document.querySelector('.subnav')?.getBoundingClientRect().height||0;
  const y=window.scrollY+el.getBoundingClientRect().top-topbar-subnav-12;
  window.scrollTo({top:Math.max(0,y),behavior});
}

function pillBtn(m,subId,label){return `<button onclick="jumpSub('${m.id}','${subId}')" id="pill-${subId}">${label}</button>`;}
function buildSubnav(m){
  const groups=SUBNAV_GROUPS[m.id];
  if(!groups)return `<div class="subnav"><div class="subnav-track">`+m.subs.map((s,i)=>pillBtn(m,s[0],`${m.ix}.${i+1} ${s[1]}`)).join('')+`</div></div>`;
  const idx=new Map(m.subs.map((s,i)=>[s[0],i]));
  return `<div class="subnav" id="subnav-${m.id}"><div class="subnav-track">`+groups.map(g=>{
    const pills=g[1].map(id=>{const i=idx.get(id);if(i==null)return '';const s=m.subs[i];return pillBtn(m,s[0],`${m.ix}.${i+1} ${s[1]}`);}).filter(Boolean).join('');
    return `<div class="subnav-label">${g[0]}</div>`+pills;
  }).join('')+`</div></div>`;
}
let subSpy=null;
function attachScrollSpy(){
  if(subSpy){subSpy.disconnect();subSpy=null;}
  const subs=[...document.querySelectorAll('.sub[id^="sub-"]')];
  if(!subs.length)return;
  const pills=[...document.querySelectorAll('.subnav button')];
  const setActive=id=>{pills.forEach(b=>b.classList.toggle('active',b.id==='pill-'+id));};
  const vis=new Map();
  subSpy=new IntersectionObserver(entries=>{
    entries.forEach(e=>vis.set(e.target.id.slice(4),e.isIntersecting?e.intersectionRatio:0));
    let best=null,bestR=0;
    vis.forEach((r,id)=>{if(r>bestR){bestR=r;best=id;}});
    if(best)setActive(best);
  },{rootMargin:'-92px 0px -55% 0px',threshold:[0,.15,.35,.55,.75,1]});
  subs.forEach(el=>subSpy.observe(el));
  if(cur.sub)setActive(cur.sub);
}
function jumpSub(mod,sub){
  cur.sub=sub;
  scrollToSub(sub,'smooth');
  document.querySelectorAll('.subnav button').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById('pill-'+sub);if(p){p.classList.add('active');p.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
  location.hash=`${mod}/${sub}`;
  const m=MODS.find(x=>x.id===mod);
  if(m&&m.subs){const t=(m.subs.find(s=>s[0]===sub)||['',''])[1];document.getElementById('crumb').innerHTML=`${m.nav} <b>›</b> ${t}`;}
}
function navButtons(m){
  const i=MODS.findIndex(x=>x.id===m.id),prev=MODS[i-1],next=MODS[i+1];
  const db=m.id!=='home'?`<button class="btn ${isDone(m.id)?'ghost':'gold'}" onclick="markDone('${m.id}',${!isDone(m.id)})">${isDone(m.id)?'✓ Completed':'Mark complete'}</button>`:'';
  return `<div class="next"><div>${prev?`<button class="btn" onclick="go('${prev.id}')">← ${prev.nav}</button>`:''}</div><div style="display:flex;gap:10px;flex-wrap:wrap">${db}${next?`<button class="btn gold" onclick="go('${next.id}')">${next.nav} →</button>`:''}</div></div>`;
}

const FX=16150;
function ecoModel(){const FEE=249,FIX=3900,ADM=1100,PER=18,CAP=75;const ns=[0,10,20,27,30,40,50,75,100,125,150];const cost=n=>n===0?FIX:FIX+Math.ceil(n/CAP)*ADM+n*PER;const rev=n=>n*FEE;return{ns,cost,rev};}
const TER={A:[[5400000,0],[6300000,0.0075],[6750000,0.01],[7500000,0.0125],[8550000,0.015],[9650000,0.0175],[10050000,0.02],[10700000,0.025],[11600000,0.035],[12500000,0.04],[13750000,0.05],[15100000,0.06],[16800000,0.07],[19750000,0.09],[24150000,0.11],[26450000,0.12],[28000000,0.13],[30050000,0.14],[32400000,0.15],[35400000,0.16],[39100000,0.17],[43850000,0.18],[47800000,0.19],[51400000,0.2],[56300000,0.21],[62200000,0.22],[68600000,0.23],[77500000,0.24],[89000000,0.25],[9e9,0.3]],
 B:[[6200000,0],[7100000,0.0075],[7500000,0.01],[8250000,0.0125],[9200000,0.015],[10750000,0.0175],[11250000,0.02],[11600000,0.025],[12600000,0.03],[13600000,0.04],[14950000,0.05],[16400000,0.06],[18450000,0.07],[21850000,0.09],[26000000,0.11],[27700000,0.12],[29350000,0.13],[31450000,0.14],[33950000,0.15],[37100000,0.16],[41100000,0.17],[45800000,0.18],[49500000,0.19],[53800000,0.2],[9e9,0.3]],
 C:[[6600000,0],[7800000,0.0075],[8250000,0.01],[9200000,0.0125],[10950000,0.015],[11200000,0.0175],[12050000,0.02],[12950000,0.025],[14150000,0.03],[15550000,0.04],[17050000,0.05],[19500000,0.06],[22700000,0.07],[26600000,0.09],[28100000,0.11],[30100000,0.12],[32600000,0.13],[35400000,0.14],[38900000,0.15],[9e9,0.3]]};
function terRate(c,g){const t=TER[c]||TER.A;for(const[cap,r]of t){if(g<=cap)return r;}return .3;}
function fmt(n){return 'Rp'+Math.round(n).toLocaleString('id-ID');}
function runCalc(){const out=document.getElementById('calcOut');if(!out)return;
 const gross=+(document.getElementById('calcGross').value||0),cat=document.getElementById('calcTer').value,jkk=+document.getElementById('calcJkk').value,feeUsd=+(document.getElementById('calcFee').value||0);
 const jpB=Math.min(gross,11086300),kB=Math.min(gross,12000000);
 const eJHT=gross*.037,eJP=jpB*.02,eJKK=gross*jkk,eJKM=gross*.003,eKes=kB*.04,empB=eJHT+eJP+eJKK+eJKM+eKes;
 const thr=gross/12,sev=gross*.04,feeIdr=feeUsd*FX,loaded=gross+empB+thr+sev+feeIdr;
 const dJHT=gross*.02,dJP=jpB*.01,dKes=kB*.01,pph=terRate(cat,gross)*gross,net=gross-dJHT-dJP-dKes-pph,deel=599*FX;
 out.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Employer's true monthly cost</div>
  <div class="line"><span>Gross salary</span><b>${fmt(gross)}</b></div>
  <div class="line"><span>+ Employer BPJS</span><span class="neg">${fmt(empB)}</span></div>
  <div class="line"><span>+ THR accrual (1/12)</span><span class="neg">${fmt(thr)}</span></div>
  <div class="line"><span>+ Severance accrual (~4%)</span><span class="neg">${fmt(sev)}</span></div>
  <div class="line"><span>+ Our fee ($${feeUsd})</span><span class="neg">${fmt(feeIdr)}</span></div>
  <div class="line tot"><span>Total cost to employ</span><span>${fmt(loaded)}</span></div>
  <div class="mini">= ${(loaded/gross*100).toFixed(0)}% of gross · vs Deel's fee alone ${fmt(deel)}/mo — you save ${fmt(deel-feeIdr)} on fees</div>
  <div style="height:12px"></div>
  <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Employee take-home</div>
  <div class="line"><span>Gross</span><b>${fmt(gross)}</b></div>
  <div class="line"><span>− Employee BPJS (JHT+JP+Kes)</span><span class="neg">${fmt(dJHT+dJP+dKes)}</span></div>
  <div class="line"><span>− PPh 21 (TER-${cat}, ${(terRate(cat,gross)*100).toFixed(2)}%)</span><span class="neg">${fmt(pph)}</span></div>
  <div class="line tot"><span>Net take-home</span><span class="pos">${fmt(net)}</span></div>`;}
function runSom(){const out=document.getElementById('somOut');if(!out)return;
 const co=+document.getElementById('somCo').value,seats=+document.getElementById('somSeats').value,fee=+document.getElementById('somFee').value;
 const totalSeats=Math.round(co*seats),arr=totalSeats*fee*12;
 document.getElementById('somCoV').textContent=co.toLocaleString();document.getElementById('somSeatsV').textContent=seats;document.getElementById('somFeeV').textContent='$'+fee;
 out.innerHTML=`<div class="line"><span>Clients</span><b>${co.toLocaleString()}</b></div><div class="line"><span>× seats each</span><b>${seats}</b></div><div class="line"><span>= total seats</span><b>${totalSeats.toLocaleString()}</b></div><div class="line"><span>× $${fee}/mo × 12</span><b></b></div><div class="line tot"><span>Obtainable ARR</span><span class="pos">$${(arr/1e6).toFixed(2)}M</span></div><div class="mini">Break-even is ~25 seats. ${totalSeats>=25?'✓ Above break-even.':'Below break-even — needs more seats.'}</div>`;}

/* ===== 1 · OPPORTUNITY ===== */
SUB['opportunity/thesis']=()=>`
<p class="lead">The next legendary company won't sell software — it'll sell the work. That's the Sequoia thesis (Julien Bek, Mar 2026) Kelly and Dickson are backing: for every <b>$1 spent on software</b>, about <b>$6 is spent on services</b>. AI has crossed the threshold where it can do the <i>intelligence</i> part of a service; humans keep the <i>judgement</i>. Whoever sells the finished outcome captures the far bigger services budget.</p>
<div class="chartbox"><h4>The budget that's actually there</h4><canvas id="ch_budget"></canvas><div class="src">"$1 of software : $6 of services." Autopilots capture the work budget from day one. — Sequoia, "Services: The New Software."</div></div>
<p>An EOR is a pure example: the client buys "an employed, compliant Indonesian teammate," not payroll software. Payroll + tax + labour compliance is high-<i>intelligence</i>, rule-dense, deadline-bound work — exactly what AI runs well behind the scenes, and exactly the services budget an autopilot swallows.</p>
${res('https://sequoiacap.com/article/services-the-new-software/','Primary','Sequoia — "Services: The New Software"','The canonical piece: copilots vs autopilots, the $1:$6 ratio.')}
${res('https://fortune.com/2026/04/21/services-are-the-new-software-sequoia-venture-capital-julien-bek-ai-native-eye-on-ai/','Interview','Fortune — Julien Bek on why services are the new software','The clearest walk-through of the thesis from its author.')}
${vid('https://www.youtube.com/watch?v=LRo33rnv6rQ','"This is AGI" — Sequoia AI Ascent 2026 Keynote','YouTube · the macro backdrop to the thesis')}`;
SUB['opportunity/intel']=()=>`
<p>The thesis hinges on one distinction. <b>Intelligence</b> is rule-bound work: complex, but learnable and checkable — translating a spec into code, computing a payroll register, filing a return. <b>Judgement</b> is taste and accountability — deciding <i>whether</i> to terminate, how to handle a Disnaker dispute, whether a client is trustworthy. AI now does most intelligence work; humans still own judgement.</p>
<div class="grid2"><div class="card"><h4 style="margin-top:0">High-intelligence (AI does it)</h4><p class="mini">Gross-to-net calculation, TER lookup, BPJS filing prep, contract drafting, deadline tracking, anomaly flags, evidence-pack assembly.</p></div>
<div class="card"><h4 style="margin-top:0">Judgement (humans keep it)</h4><p class="mini">Approving a payroll run before money moves, signing filings, handling terminations and disputes, deciding who to serve, owning the client relationship.</p></div></div>
<div class="callout blue"><b>Why this matters for us</b><p>The higher the intelligence-ratio of a service, the sooner an autopilot wins it. Indonesian payroll compliance is almost pure intelligence with a thin, critical judgement layer (approval + disputes) — an ideal shape: automate the bulk, keep humans exactly where liability lives.</p></div>
${res('https://www.forbes.com/sites/josipamajic/2026/04/01/sequoia-says-ai-will-kill-software-tools-by-becoming-the-work/','Article','Forbes — AI will kill software tools by becoming the work','The intelligence-vs-judgement framing in plain English.')}`;
SUB['opportunity/autopilot']=()=>`
<p>A <b>copilot</b> sells a tool to a professional and races the model (Harvey → law firms). An <b>autopilot</b> sells the outcome directly to the company that needs it (Crosby → the company that needs the NDA), removing the professional from the loop and capturing their budget. Autopilots start with the outsourced, intelligence-heavy task where a budget line already exists.</p>
<p>EOR is autopilot-native: nobody wants "payroll software for Indonesia," they want "employ this person, compliantly." We sell the outcome, price against the services line, and let AI compound the margin underneath — never sold as a feature.</p>
${res('https://medium.com/data-science-collective/services-are-the-new-software-building-them-is-the-hard-part-ca2d3ff9aad4','Medium','"Services Are the New Software — Building Them Is the Hard Part"','The builder\'s counterpoint: operations are the moat, not the model.')}
${res('https://linas.substack.com/p/sequoiathesis','Substack','Linas — the thesis "will mint billionaires and bankrupt copycats"','Sharp take on who actually wins the services-as-software wave.')}`;
SUB['opportunity/whyeor']=()=>`
<p>Of all the services one could turn into an autopilot, EOR scores unusually well against Sequoia's playbook and against our own scar tissue:</p>
<ul>
<li><b>Already 100% outsourced.</b> Every EOR client is buying an outcome by definition — the budget line exists, and replacing a vendor is a swap, not a reorg.</li>
<li><b>A corridor we understand.</b> Indonesian employment (BPJS, PPh 21, THR, severance) is a painful maze — and the pain is the moat. Both founders already know it.</li>
<li><b>Proven demand, global buyers.</b> 8+ competitors already charge $166–599/employee/month, and advanced-market cross-border hiring grew <b>+42% YoY</b> (Deel). We re-price and re-service a market that exists.</li>
<li><b>Negative working capital.</b> Clients pre-fund salary + fee before we pay out — a structurally reliable payer.</li>
<li><b>Mandatory wedge.</b> A local entity costs 8–12 weeks + ~$650k min capital + 2 resident directors — so an EOR is effectively required to hire 1–5 people. That's our permission to exist.</li>
</ul>
${res('https://www.opensourceceo.com/p/deel-deep-dive','Substack','Bill Kerr — "Deel, EOR & The Future of Global Teams"','The strongest single essay on the EOR business model.')}`;
SUB['opportunity/lessons']=()=>`
<p>This vertical was chosen <i>against</i> the exact pattern that hurt AutoKon. That discipline is itself part of the pitch to Kelly.</p>
<div class="tablewrap"><table><tr><th>What hurt us before</th><th>How EOR answers it</th></tr>
<tr><td>Clients paid late / never</td><td>Pre-funded model — salary + fee collected before payout; non-payment pauses employment, self-enforcing</td></tr>
<tr><td>Long gatekept sales (banks, gov)</td><td>Advanced-market SMEs, self-serve + inbound; weeks not quarters</td></tr>
<tr><td>Key-person tech risk</td><td>Standard stack, ops runbooks as product; two founders can operate what they build</td></tr>
<tr><td>Betting on unproven demand</td><td>Corridor already monetised by 8+ competitors; demand is proven</td></tr>
<tr><td>No leverage in the buyer's market</td><td>We ARE the Indonesian compliance depth; the pain is the moat</td></tr></table></div>
<div class="callout green"><b>The through-line</b><p>An EOR is a promise: "we are the legal employer, and we will get payroll, tax and compliance right, every month, so you don't have to." Everything in The Machine is about keeping that promise reliably.</p></div>`;

SUB['whynow/arbitrage']=()=>`
<p>The economic engine: an Indonesian remote knowledge worker delivers the same output for a fraction of advanced-market cost. Be precise about the basis — use <b>remote-global pay</b> (an Indonesian dev serving a US client, ~2× gap), not local Indonesian pay (~10× and misleading).</p>
<div class="chartbox"><h4>Cost multiple — Western ÷ Indonesia (remote-global basis)</h4><canvas id="ch_arb"></canvas><div class="src">Software dev ~1.9–2.3× · UX designer ~4.1× · accountant ~60% saving · VA/CS ~3–5× · graphic designer ~10× (local basis). Sources: arc.dev, uiuxjobsboard/uxcel, Payscale, Somewhere, Mindspace.</div></div>
<div class="tablewrap"><table><tr><th>Role</th><th>Indonesia</th><th>US / West</th><th>Multiple</th></tr>

/* ===== 5 · WHAT IS AN EOR ===== */
SUB['whateor/def']=()=>`
<p class="lead">An <b>Employer of Record</b> becomes the <b>sole legal employer</b> of a worker on behalf of a client company, in a country where the client has no legal entity. The EOR signs the contract, runs payroll, withholds and remits taxes, enrols the worker in social security, and carries the compliance liability. The client keeps everything that matters to the work — tasks, targets, tools — but is not the legal employer on paper.</p>
<div class="callout blue"><b>The one test that resolves 90% of the confusion</b><p>Does the client need to already own a local entity? <b>EOR = No</b> (the EOR lends you its entity). <b>PEO = Yes</b> (co-employment on top of your own entity). Everything else is detail. The market barely understands this — which is why definitional clarity is a <i>sales asset</i>, not just an internal note.</p></div>
${vid('https://www.youtube.com/watch?v=pyf8u70azpQ','Employer of Record (EOR) Explained — What It Is & How It Works','YouTube · a clean ~6-minute primer')}
${vid('https://www.youtube.com/watch?v=WHo8Y9pCqrE','What Is an EOR? Employer of Record Explained','YouTube · onboarding, payroll, benefits, compliance')}`;
SUB['whateor/tax']=()=>`
<p>The whole taxonomy resolves on two questions: who is named as the legal employer, and who owns the liability.</p>
<div class="tablewrap"><table><tr><th>Model</th><th>Legal employer</th><th>Liability</th><th>Own entity?</th><th>When used</th></tr>
<tr><td><b>EOR</b></td><td>The EOR — sole</td><td>EOR absorbs (limits)</td><td>No</td><td>Hire where you have no entity — <b>our model</b></td></tr>
<tr><td>PEO</td><td>You — co-employment</td><td>Shared</td><td>Yes</td><td>Offload HR admin domestically (US)</td></tr>
<tr><td>Staffing / temp</td><td>The agency</td><td>Joint</td><td>No</td><td>Short-term roles</td></tr>
<tr><td>Recruitment</td><td>You, after placement</td><td>You</td><td>Yes</td><td>Find-and-handoff perm hires</td></tr>
<tr><td>Payroll bureau</td><td>You (never provider)</td><td>You</td><td>Yes</td><td>Run payroll mechanics only</td></tr>
<tr><td>AOR / CoR</td><td>The AOR</td><td>AOR</td><td>No</td><td>Contractors — "the EOR for contractors"</td></tr></table></div>
<div class="callout"><b>Two notes for our thesis</b><p>Payroll is a <b>component</b> of EOR, not a substitute. And the AOR/contractor line is our <b>fallback wrapper</b> if Permenaker 7/2026 narrows white-collar EOR — contractor-of-record sits outside the alih daya frame.</p></div>
${res('https://gusto.com/resources/articles/hr/team-management/peo-vs-eor','Article','Gusto — PEO vs EOR','The cleanest plain-English distinction.')}
${res('https://www.uschamber.com/co/run/human-resources/peo-vs-eor','Article','US Chamber of Commerce — PEO vs EOR','Authoritative, buyer-facing.')}`;
SUB['whateor/split']=()=>`
<div class="grid3"><div class="card"><h4 style="margin-top:0">The EOR holds</h4><ul class="mini" style="margin-bottom:0"><li>Legal employer status</li><li>The employment contract</li><li>Payroll + tax remittance</li><li>Statutory benefits (BPJS)</li><li>Compliance liability</li><li>Termination execution</li></ul></div>
<div class="card"><h4 style="margin-top:0">The client keeps</h4><ul class="mini" style="margin-bottom:0"><li>Who to hire</li><li>Job scope & targets</li><li>Day-to-day direction</li><li>Performance management</li><li>Tools & equipment</li><li>The actual relationship</li></ul></div>
<div class="card"><h4 style="margin-top:0">Nobody should pretend</h4><ul class="mini" style="margin-bottom:0"><li>"Removes all liability" is a vendor claim, not law</li><li>PE risk isn't auto-eliminated</li><li>Misclassification survives</li><li>Indemnity often capped at fees paid</li></ul></div></div>
<p>The client directs the work; the EOR holds the legal/administrative employer functions. This split is exactly why the client can hire fast without a permanent establishment — and exactly why the EOR, not the client, is on the hook for getting compliance right.</p>`;
SUB['whateor/chain']=()=>`
<p class="lead">The value chain is the anatomy of the whole business. The spine is the <b>money path</b>: client funds one consolidated, pre-funded invoice → the EOR runs payroll → withholds & remits taxes → pays the employee net → and carries the compliance risk end to end. Thirteen links hang off that spine. Understanding each is understanding where the work, the risk, and the margin actually sit.</p>
<div class="moneyflow">
${[
['1','Legal entity','The owned in-country PT that is the <i>named legal employer</i>. To the tax office the worker works for us — so we carry the risk. This is the asset a foreign client can\'t easily build (8–12 weeks + ~$650k). <b>Where the moat is.</b>'],
['2','Employment contracts','Locally compliant PKWT/PKWTT with 9 mandatory clauses + IP assignment, kept current by in-house + local counsel as the law shifts. <b>Where compliance starts.</b>'],
['3','Onboarding','Identity/KYC (KTP/NIK), e-signature, statutory registration (BPJS ×2, tax), payroll setup. Errors here propagate into every downstream link.'],
['4','Payroll processing','Gross-to-net per Indonesian rules (BPJS deductions + PPh 21 TER), the payroll register, approval, disbursement, payslips. <b>The product, monthly. Where trust is won.</b>'],
['5','Tax withholding & remittance','Withhold employee income tax, pay employer contributions, file the returns on the statutory calendar. Held-in-trust duty. <b>Where the promise is kept.</b>'],
['6','Statutory benefits','Coordinate mandatory social security (BPJS Kesehatan + Ketenagakerjaan), integrated with payroll so deductions and remittances reconcile.'],
['7','Supplemental benefits','Optional health/pension/allowances — a margin line (cost-plus 5–15%) and a retention lever for the client.'],
['8','Expense & leave','Approve expenses (often dual client + EOR approval) and track statutory leave accrual. Small, but a common source of payroll disputes.'],
['9','Compliance monitoring','Maintain the rule set, apply law changes to payroll automatically, flag min-wage/leave/deadline issues. <b>The continuous function that justifies the fee.</b>'],
['10','IP assignment','Transfer inventions and work product from the EOR-employee to the client via explicit contract clauses — load-bearing for engineering hires.'],
['11','Offboarding / termination','Final settlement per PP 35/2021, severance (often accrued monthly to avoid a lump-sum shock), BPJS deregistration. <b>Where the liability lives — our PT pays.</b>'],
['12','Employee support','An HR helpdesk for contracts, payroll, leave and life events — in-timezone, bilingual. The quiet churn driver.'],
['13','Invoicing & fund flow','One consolidated, pre-funded invoice per cycle (net + deductions + employer burden + fee), collected globally via Airwallex and converted to IDR. <b>Negative working capital + the FX margin line.</b>']
].map(s=>`<div class="mfstep"><div class="mfn">${s[0]}</div><div><div class="mft">${s[1]}</div><div class="mfd">${s[2]}</div></div></div>`).join('')}
</div>
<div class="callout blue"><b>Read the chain as three profit pools</b><p><b>The fee</b> (links 4–5–9, the compliance work), <b>the FX spread</b> (link 13, ~1–3% — 25–30% of Deel's revenue), and <b>benefits + float</b> (links 6–7, deposits). Salary and statutory costs (links 4–6) are <i>pass-through, not margin</i>. The whole game is amortising link 1 (the entity) across as many employees as possible.</p></div>
${res('https://globaleorservices.org/how-payroll-works-with-an-eor-inside-the-system/','Reference','Global EOR Services — how payroll works inside an EOR','The money path, link by link.')}
${res('https://www.deel.com/blog/employer-of-record-a-complete-guide/','Guide','Deel — the complete EOR guide','Includes the entity break-even math (~10–25 employees).')}
${vid('https://www.youtube.com/watch?v=pyf8u70azpQ','Employer of Record (EOR) Explained','YouTube · the value chain in ~6 minutes')}`;
SUB['whateor/myths']=()=>`
<p>Three things the category oversells. Knowing the truth is both risk management and a differentiator — we can be the honest operator.</p>
<div class="tablewrap"><table><tr><th>The myth</th><th>The reality</th></tr>
<tr><td>"An EOR removes ALL your liability"</td><td>A vendor claim, not settled law. The EOR absorbs a lot, but the client keeps direction risk and reputational exposure; disputes over who's liable happen.</td></tr>
<tr><td>"An EOR auto-eliminates PE risk"</td><td>False. If the worker habitually concludes contracts or holds revenue authority, the <i>client</i> can still trigger a permanent establishment. Mitigate by keeping EOR-employed staff in support/operational roles.</td></tr>
<tr><td>"You're fully indemnified"</td><td>Many EOR agreements <b>cap indemnity at total fees paid</b> — a $199/mo contract caps at ~$2.4k/yr, inadequate against a ~$50k wrongful-termination liability. Read the cap.</td></tr></table></div>
<div class="callout green"><b>Our posture</b><p>Say the quiet part out loud: structure roles to minimise PE, price a sensible deposit, and hand the client a monthly evidence pack. Honesty about limits is a trust wedge against platforms that market "zero risk."</p></div>`;

/* ===== 6 · LEGAL & SETUP (detailed) ===== */
SUB['setup/seq']=()=>`
<p class="lead">This is the one-time build of the Indonesian employing entity — the supply side that stays the same no matter where clients come from. It runs in six phases over roughly <b>8–12 weeks</b> and ~<b>$3–7k in fees</b> (excluding capital). OSS is the spine: the NIB fans out to Coretax, WLKP and BPJS. This is where "buy the expertise, don't DIY" applies hardest.</p>
<div class="callout red"><b>⚠ Resolve this before spending a rupiah — the 78101 / 78300 KBLI question</b><p>The enhanced legal report now treats <b>KBLI 78101</b> (labour placement, Medium-High risk, Manpower-verified) and/or <b>KBLI 78300</b> (HR-function provision, Low risk, NIB-only) as the likely PT PMA route. <b>KBLI 78200</b> is no longer the base assumption; it is the blocked/conflict case because OSS appears to close large-scale PMA access. Commission Memo B with a notary and employment counsel before incorporating.</p></div>
<h4>Phase A — Pre-incorporation (weeks 0–2)</h4>
<div class="moneyflow">
${[
['1','Choose KBLI classification','Test KBLI 78101 primary and 78300 secondary against OSS, Manpower verification, foreign-ownership eligibility, risk tier and JKK implications. Treat 78200 only as a counsel conflict to resolve, not the default. <b>1–3 days · advisory</b>'],
['2','Foreign-ownership check','The Positive Investment List (Perpres 10/2021): every sector is 100% open unless restricted. Confirm the 78101/78300 PMA route live in OSS with a notary; document why 78200 is excluded or unusable. <b>same-day · free</b>'],
['3','Reserve the company name','Via a licensed Indonesian notary on AHU Online: ≥3 words, Bahasa, unique, valid 60 days. <b>~1 day</b>'],
['4','Lock capital & shareholding','⚠ Minimum paid-up capital cut to <b>IDR 2.5bn</b> (BKPM Reg 5/2025), but the investment plan must exceed <b>IDR 10bn per KBLI/location</b>. Min 2 shareholders (100% foreign OK), 1 director + 1 commissioner; a foreign director needs a KITAS and cannot hold HR functions. 12-month capital lock-up.'],
['5','Secure a registered office','⚠ Virtual office is location-dependent (Jakarta zoning-restricted; Bali conflicting). ~$500–1,500/yr.']
].map(s=>`<div class="mfstep"><div class="mfn">${s[0]}</div><div><div class="mft">${s[1]}</div><div class="mfd">${s[2]}</div></div></div>`).join('')}
</div>
<h4>Phase B — Incorporation (weeks 2–4)</h4>
<div class="moneyflow">
${[
['6','Notary Deed of Establishment (Akta Pendirian)','The notary drafts + you sign the Articles of Association (name, KBLI, capital, board). Founders can act via Power of Attorney — no travel. <b>~2 weeks · IDR 5–15M (~$300–920)</b>'],

].map(s=>`<div class="mfstep"><div class="mfn">${s[0]}</div><div><div class="mft">${s[1]}</div><div class="mfd">${s[2]}</div></div></div>`).join('')}
</div>
<h4>Phase C — Licensing via OSS-RBA (weeks 3–5)</h4>
<div class="moneyflow">
${[
['8','Register on OSS → get the NIB','The single business identity; also triggers the auto-issued corporate NPWP. <b>minutes–days · free</b>'],

SUB['setup/structure']=()=>`
<p class="lead">The operating company is not a SaaS wrapper. Navv is the Indonesian legal employer; the client directs the work but does not sign Indonesian employment documents or become the local employer.</p>
<div class="moneyflow">
${[
['1','Foreign client','Signs the MSA / EOR service agreement / Indonesia SOW, funds payroll in advance, manages day-to-day work, and documents performance. It must not sign Indonesian employment docs or let the worker bind it in Indonesia.'],
['2','Navv SG / holdco / salesco','Commercial contracting, Singapore beachhead credibility, global collections, investor-facing structure and expansion optionality. Useful, but it never replaces the Indonesian employer.'],
['3','Navv Indonesian PT / PT PMA','The real employer. Owns employment contracts, payroll, BPJS, PPh 21, THR, WLKP, offboarding, and the evidence pack. This is the asset and the liability center.'],
['4','Employee in Indonesia','Signs the PKWT/PKWTT with Navv, receives statutory rights from Navv, works under the client manager, and signs no-authority + IP/confidentiality wording.']
].map(s=>`<div class="mfstep"><div class="mfn">${s[0]}</div><div><div class="mft">${s[1]}</div><div class="mfd">${s[2]}</div></div></div>`).join('')}
</div>
<div class="tablewrap"><table><tr><th>Contract</th><th>What it controls</th><th>Why it matters</th></tr>
<tr><td>Client MSA / EOR Service Agreement</td><td>Fee, deposit, pre-funding, indemnity, PE restrictions, termination request process</td><td>Allocates commercial risk before payroll starts</td></tr>
<tr><td>Indonesia SOW / alih daya-style agreement</td><td>Role description, period, remote status, workers, protections, social security, THR, leave</td><td>Frames the work inside counsel-approved outsourcing language</td></tr>
<tr><td>Employment agreement</td><td>PKWT/PKWTT, wage, fixed allowances, position, rights, obligations, no-authority wording</td><td>Makes Navv the actual legal employer</td></tr>
<tr><td>IP / confidentiality / invention assignment</td><td>Work product, code, designs, inventions, confidential information</td><td>Load-bearing for tech/product hires</td></tr>
<tr><td>Client-side work protocol</td><td>No contract-signing, no Indonesian revenue authority, manager documentation duties</td><td>Reduces permanent-establishment and termination risk</td></tr></table></div>
<div class="callout blue"><b>SG helps the sale; Indonesia holds the risk</b><p>A Singapore sales/holdco can make contracting and collection easier for Singapore buyers. It does not move BPJS, PPh 21, THR, payslip, WLKP or termination obligations out of Indonesia.</p></div>`;
SUB['setup/entity']=()=>`
<p>The entity is the thing that can legally employ — and the single biggest cheque. Two routes, one big 2025 change.</p>
<div class="grid2"><div class="card"><h4 style="margin-top:0">PT PMA (foreign-owned)</h4><p class="mini">Direct foreign ownership. ⚠ <b>2025:</b> minimum <b>paid-up capital cut to IDR 2.5bn (~$150k)</b> (BKPM Reg 5/2025), but the <b>investment plan must exceed IDR 10bn per KBLI/location</b>. 2 shareholders, 1 director + 1 commissioner, 12-month capital lock-up. A foreign shareholder-director wanting an Investor KITAS generally still needs IDR 10bn in shares recorded in the deed — so many still capitalise at 10bn.</p></div>
<div class="card"><h4 style="margin-top:0">Local PT + holdco contracts</h4><p class="mini">A locally-held PT with services agreements up to a holding company. Lower capital, but nominee/structuring risk — counsel territory. Relevant only if 78101/78300 cannot support the owned PT PMA path.</p></div></div>
<div class="flag">This wall — 8–12 weeks + IDR 2.5–10bn + resident-facing officers — is exactly <b>why our clients need us</b>. A foreign firm faces it to hire even one person. We absorb it once and amortise across every client (value-chain link 1).</div>
${res('https://sasbali.com/bkpm-regulation-no-5-of-2025-new-pt-pma-capital-rules-explained/','Update','SAS — BKPM Reg 5/2025: new PT PMA capital rules','The 2.5bn paid-up vs 10bn investment-plan distinction.')}`;
SUB['setup/lic']=()=>`
<div class="tablewrap"><table><tr><th>Item</th><th>Portal / body</th><th>Detail</th></tr>
<tr><td>NIB (business ID)</td><td class="mono">oss.go.id</td><td>Risk-based (PP 28/2025); for low-risk the NIB is the licence. Also triggers the corporate NPWP.</td></tr>
<tr><td>KBLI 78101 / 78300</td><td>OSS (KBLI 2025)</td><td>78101 likely primary for labour placement; 78300 candidate secondary for HR-function provision. Drives risk class, Manpower verification, and JKK tier. ⚠ Memo B must settle the exact route.</td></tr>
<tr><td>Alih daya licence</td><td>OSS + Disnaker</td><td>PP 35/2021 Pasal 20. Register each client/PKWT agreement with Disnaker ≤3 working days.</td></tr>
<tr><td>SISNAKER / SIAPkerja</td><td class="mono">account.kemnaker.go.id</td><td>Gateway to WLKP + JKP administration.</td></tr>
<tr><td>WLKP report</td><td class="mono">wajiblapor.kemnaker.go.id</td><td>≤30 days of establishment; annual renewal.</td></tr>
<tr><td>BPJS reg → NPP</td><td>SIPP + EDABU</td><td>BPJS-TK company number + BPJS-Kesehatan enrolment.</td></tr>
<tr><td>LKPM</td><td>OSS (quarterly)</td><td>⚠ 4 idle quarters → auto-sanction (BKPM Reg 5/2025).</td></tr></table></div>
${vid('https://www.youtube.com/watch?v=qkvndSs_iV0','Tutorial Penambahan Peserta via EDABU','YouTube · adding employees to BPJS Kesehatan')}
<p class="mini">No formal "EOR licence" exists — you operate as a licensed PT/PT PMA <i>alih daya</i> entity, read by analogy to outsourcing. That analogy is where the Permenaker risk (next) lives.</p>`;
SUB['setup/risk']=()=>`
<div class="callout red"><b>Permenaker 7/2026 — carry this through the whole build</b><p>Enacted 30 Apr 2026, it re-restricted outsourcing to <b>6 "penunjang" categories</b>. White-collar EOR placements now hang on the elastic "layanan penunjang operasional" reading — and the rule is already slated for revision. This is the single biggest business-model risk.</p></div>
<p>Mitigations, in order:</p>
<ul>
<li><b>Structure:</b> contracts written to fit "operational support services"; a written counsel opinion <i>before</i> the PT is capitalised.</li>
<li><b>Fallback wrapper:</b> if pure EOR narrows, pivot the same entity + rail to <b>contractor-of-record + payroll administration</b>, which sits outside the alih daya frame.</li>
<li><b>Positioning:</b> being the corridor-native operator who sells Permenaker-clean structure is a trust wedge — nobody else is even mentioning it yet.</li>
</ul>
<div class="flag">⚠ This needs a formal Indonesian employment-law opinion before entity money is spent. Do not treat this OS as legal advice.</div>
${res('https://www.hukumonline.com/klinik/a/legalitas-employer-of-record-di-indonesia-menurut-pp-35-2021-lt686bf29357fe7/','Primary','Hukumonline — legality of EOR in Indonesia','The authoritative practitioner analysis of EOR as alih daya + Permenaker 7/2026.')}`;
SUB['setup/memos']=()=>`
<p class="lead">Before incorporation spend, commission three short counsel memos. They are not paperwork. They are the go/no-go gate for whether this can be an owned-employer EOR or needs a fallback wrapper.</p>
<div class="grid3">
<div class="card"><h4 style="margin-top:0">Memo A · White-collar EOR legality</h4><ul class="mini"><li>Can remote white-collar roles fit under <i>layanan penunjang operasional</i>?</li><li>Which roles are low / medium / high risk?</li><li>What SOW wording should Navv use or avoid?</li><li>Must each client arrangement be recorded with Disnaker?</li></ul></div>
<div class="card"><h4 style="margin-top:0">Memo B · Entity + KBLI</h4><ul class="mini"><li>PT PMA or local PT?</li><li>Is KBLI 78101 primary, with 78300 as secondary?</li><li>Why is 78200 blocked, wrong, or not needed?</li><li>Any special outsourcing/placement licence needed?</li><li>Capital, director, commissioner and LKPM obligations?</li></ul></div>
<div class="card"><h4 style="margin-top:0">Memo C · Termination + indemnity</h4><ul class="mini"><li>PHK process by termination reason</li><li>Notice and evidence requirements</li><li>PKWT compensation vs PKWTT severance</li><li>Missing employee process</li><li>What must be funded before notice?</li><li>Enforceable client indemnity language</li></ul></div>
</div>
<div class="callout red"><b>Gate 0 decision</b><p>Can Navv legally employ Indonesian remote tech/product/support workers for Singapore clients under a defensible structure? If counsel says no, do not capitalise the PT PMA. Reframe to contractor-of-record / payroll administration and preserve the demand learning.</p></div>`;

SUB['ops/overview']=()=>`
<p class="lead">This is the hardest module to learn and the most important to get right — so we teach it like a university course. An EOR is simply a <b>payroll + employment operation performed on behalf of a client, through a legal entity the client doesn't own</b>. So ~90% of this is generic payroll operations; the EOR-specific twist is flagged where it bites. Each stage gives you the <b>theory</b> (why it exists, the load-bearing concepts) then the <b>mechanics</b> (the step-by-step).</p>
<div class="grid4"><div class="stat"><div class="v" style="font-size:15px">0 · Quote</div><div class="k">loaded cost + margin</div></div><div class="stat"><div class="v" style="font-size:15px">1 · Onboard</div><div class="k">manufacturing a legal relationship</div></div><div class="stat gold"><div class="v" style="font-size:15px">2 · Payroll ⚠</div><div class="k">gross-to-net, the core engine</div></div><div class="stat red"><div class="v" style="font-size:15px">5 · Offboard ⚠</div><div class="k">highest-risk stage</div></div></div>
<div class="chartbox"><h4>The three control spines: quote, payroll, termination</h4><canvas id="ch_ops_spine"></canvas><div class="src">Each stage is scored 1-5 on the dimensions the operating reports identify as load-bearing.</div></div>
<div class="callout blue"><b>The mental model</b><p>Money and risk concentrate in three places: the <b>quote</b> (where margin is set), the monthly <b>payroll run</b> (where trust is won or lost), and <b>termination</b> (where liability lives). A corridor-native operator must be strongest exactly there.</p></div>

<div class="callout blue"><b>Use this page as the stage map</b><p>The detailed sections below still teach the mechanics. This page tells you which companion report owns the stage and what must be visible in the LMS, checklist, and future software workflow.</p></div>`;

SUB['ops/s0']=()=>`
<div class="stage"><div class="stage-h"><div class="stage-n">0</div><div class="stage-t">Quote & cost simulation — where margin is set</div></div><div class="stage-b">
<p><span class="pill why">Theory</span>The salary a candidate negotiates is <b>not</b> what the employer pays. The <b>fully-burdened (loaded) cost</b> is the total: base + bonus + employer payroll taxes + mandatory benefits + leave + overhead. The add-on, expressed as a % of base, is the <b>burden rate</b> — commonly 18–35% in Western markets; in Indonesia ~15–18% (BPJS ~11% + THR ~8.3% + severance accrual). Salary, employer taxes and statutory benefits are <b>pass-through, not margin</b> — the EOR's revenue is the service fee on top, plus FX, setup and offboarding add-ons.</p>
<p><span class="pill info">Mechanics</span>Build a quote: (1) gross in local currency → (2) layer employer statutory contributions → (3) add mandatory benefits + THR + accrued leave → (4) apply burden rate → loaded cost → (5) add the service fee (flat or % of payroll) = the quoted price → (6) add an FX buffer + deposit terms. The <b>deposit</b> (~1 month of loaded cost) exists because the EOR <i>fronts</i> payroll before invoicing — a credit-risk control, not a fee.</p>
<p class="mini"><span class="pill risk">EOR twist</span>The % -of-payroll pricing model (8–15%) misaligns incentives for a <i>compliance</i> vendor — it earns more when your people earn more. Flat-fee is the honest model, and our wedge.</p>
<p class="mini">→ Feel the loaded-cost maths in the <a onclick="go('econ','calc')">cost calculator</a>.</p></div></div>
${ssd('07A SSD · Quote & Sign',['Client','Navv OS','Navv SG','Navv ID PT','Counsel/Ops'],[
['Client','Navv OS','Role, worker, salary, location, start date, manager and authority profile','Reject sales/contract-closing authority early.'],
['Navv OS','Counsel/Ops','Classify role risk and SOW wording under Permenaker support-service logic','Gate: role-risk score.'],

['Client','Navv SG','Sign MSA / commercial layer where used','SG can sell; ID still employs.'],
['Navv ID PT','Client','Sign Indonesia SOW / worker schedule where required','Gate: legal employer boundary is explicit.']
],[
['Learning output','Learner can explain why quote is governance, not pricing admin.'],
['Proof artifact','Quote pack + role-risk memo + funding/deposit posture.'],
['Failure mode','Underpriced role, wrong authority profile, or unfunded statutory exposure.']
])}
${driveBox('07A_Navv_EOR_Ops_Series_Quote_and_Sign_2026-07-08.docx')}
${res('https://www.hibob.com/financial-metrics/fully-burdened-labor-rate/','Concept','HiBob — fully-burdened labor rate + calculator','Burden-rate definition, formula, the 18–35% bands.')}

<p><span class="pill info">Mechanics · day-0 to day-30</span>Preboard: collect docs, verify identity, issue contract + IP agreement, register with BPJS + tax, provision access — so day one is culture, not forms. Day 1: welcome, systems, a buddy (56% of new hires say a buddy speeds productivity). Days 2–30: absorb the work, manager check-ins (new hires are 3.4× more likely to rate onboarding successful with an active manager), close with a 30-day review. Strong onboarding lifts retention ~82%.</p>

SUB['ops/s2']=()=>`
<div class="stage"><div class="stage-h warn"><div class="stage-n">2</div><div class="stage-t">The monthly payroll cycle — the core engine ⚠</div></div><div class="stage-b">
<p><span class="pill why">Theory</span>Payroll is the recurring process of <b>calculating earnings, withholding deductions, filing taxes and paying workers</b> — modelled as a cycle: <b>pre-payroll → processing → post-payroll</b>. The <b>cutoff date</b> is the control gate: inputs approved before it land in this run; anything later rolls forward. The heart is the <b>gross-to-net waterfall</b>, and the <i>order of operations is load-bearing</i> because it changes the tax base:</p>
<div class="worked"><div class="wt">Gross-to-net waterfall</div><div class="wl"><span>1. Earnings → gross pay</span><span>base + OT + bonus + allowances</span></div><div class="wl"><span>2. − pre-tax deductions</span><span>lowers taxable base</span></div><div class="wl"><span>3. − statutory deductions</span><span>income tax + social security on the reduced base</span></div><div class="wl"><span>4. − post-tax deductions</span><span>garnishments, dues</span></div><div class="wl tot"><span>= Net pay (take-home)</span><span>Net = Gross − pre-tax − tax − post-tax</span></div></div>
<p><span class="pill info">Mechanics · cutoff → payslip</span>(1) cutoff freezes inputs → (2) gather + validate hours/OT/leave/joiners/leavers → (3) compute gross → (4) run the gross-to-net engine (in Indonesia: employee BPJS JHT 2% + JP 1% + Kesehatan 1%, then PPh 21 via the TER method) → (5) produce the <b>payroll register</b> (the control artifact: every employee's gross, withholdings, net for the period) → (6) <b>review & approve</b> (maker-checker) → (7) generate the bank file → (8) disburse via the local rail → (9) issue mandatory payslips → (10) post-payroll: remit, post to GL, reconcile.</p>
<p class="mini"><span class="pill risk">Why it's a trust event</span>~40% of payroll errors trace to manual data entry, and <b>80% are first caught by the employee</b>, not the system. 49% of employees job-hunt after just two payroll mistakes. This is the stage that makes or breaks the client relationship.</p></div></div>
${ssd('07C SSD · Payroll Run',['Client','Navv OS','Payroll Maker','Payroll Checker','Finance','Employee'],[
['Client','Navv OS','Submit monthly changes before cutoff: leave, allowances, bank changes, starts/exits','Gate: cutoff freeze.'],

['Payroll Maker','Payroll Checker','Independent review of register, TER category, BPJS bases and prior-cycle variance','Gate: maker-checker approval.'],
['Navv OS','Finance','Confirm client funding and generate payout file','Gate: funding lock before release.'],
['Finance','Employee','Release net salary and payslip','Gate: payment proof.'],
['Navv OS','Client','Log exceptions and carryovers for next cycle','Output feeds support/change queue.']
],[
['Learning output','Learner can narrate the monthly payroll loop as a controlled production cycle.'],
['Proof artifact','Approved payroll register + variance report + payslip/payment proof.'],
['Failure mode','Late change, wrong tax category, or unfunded payroll becomes client-visible immediately.']
])}

SUB['ops/s3']=()=>`
<div class="stage"><div class="stage-h warn"><div class="stage-n">3</div><div class="stage-t">Statutory filing & remittance — the trust duty ⚠</div></div><div class="stage-b">
<p><span class="pill why">Theory</span>The employer does not <i>own</i> withheld taxes — it collects them as an <b>agent for the tax authority and holds them in trust</b>. (The US literally calls these "trust fund taxes," with a 100% recovery penalty that can pierce the corporate veil.) That framing is <i>the</i> reason payroll compliance is non-negotiable, and why the EOR's promise — "we keep you compliant" — is kept or broken here. Two calendars, often confused: the <b>deposit/remittance schedule</b> (when money moves) and the <b>filing calendar</b> (when returns reconcile). Deposit ≠ file.</p>
<p><span class="pill info">Mechanics · Indonesia</span>BPJS Kesehatan by the 10th (EDABU) · BPJS-TK by the 15th (SIPP) · PPh 21 <b>deposited</b> by the 15th and the SPT Masa <b>filed</b> by the 20th (Coretax e-Bupot 21) · December = the annual recalculation (rekonsiliasi Desember) + Form 1721-A1. The compliance-monitoring function runs continuously: track rule changes, auto-apply to payroll, flag min-wage/leave issues.</p>
<p class="mini">→ The full calendar + rates live in the <a onclick="go('compliance','cal')">Compliance Deep-Dive</a>.</p></div></div>

SUB['ops/s5']=()=>`
<div class="stage"><div class="stage-h danger"><div class="stage-n">5</div><div class="stage-t">Offboarding & termination — the highest-risk stage ⚠</div></div><div class="stage-b">

<p><span class="pill info">Mechanics · Indonesia</span>Written PHK notice ≥14 working days → compute severance (UP up to 9× + UPMK up to 10× + UPH, multiplied by termination ground) → if disputed: bipartite (30 days) → Disnaker mediation → PHI industrial court → Supreme Court cassation → final settlement + BPJS deregistration + final PPh 21 + 1721-A1. IT offboarding runs in parallel: revoke SSO/access within one business day (59% of firms report a breach linked to poor offboarding).</p>
<p class="mini"><span class="pill risk">EOR twist</span><b>Our PT carries the liability, not the client.</b> If the client stops paying, we still owe the severance — which is why the deposit is non-negotiable. Severance is "significantly more generous than many client companies expect."</p>
