SUB['ops/run']=()=>`
<p><span class="pill why">Theory · the operating model</span>Two structures for an EOR. The <b>owned-entity model</b> (we own the local PT; contract from our own company, payroll on our own banking, liability sits with an org directly subject to local law — faster, standardised) vs the <b>aggregator / in-country-partner model</b> (the platform subcontracts the actual employment to a local partner the client never vets — more coverage, but lag and diffused accountability). Our model is owned-entity in Indonesia — the defensible choice, and the wedge against Remofirst/Skuad's partner networks.</p>
<div class="grid2">
<div class="card"><h4 style="margin-top:0">Roles</h4><p class="mini">Payroll specialist → administrator → lead; compliance & legal (in-house + local counsel); onboarding/HR ops; client success; finance/treasury. At small scale one person wears several hats — the key-person risk we know (Faishal lesson).</p></div>
<div class="card"><h4 style="margin-top:0">The ratio that sets the cost model</h4><p class="mini">The key operating metric is the <b>payroll-to-headcount ratio</b>. Benchmarks span widely — ~633 employees/specialist (KPMG) to ~1,425 (Deloitte) — the spread <i>is</i> the automation opportunity. At our small scale, target ~1 admin per 75–100, moving toward the high end as AI preps the registers.</p></div></div>
<div class="callout"><b>The one control that keeps it honest — maker-checker / four-eyes</b><p>Segregation of duties: the person who edits the employee master file is never the one who runs the final payroll. A "maker" initiates, a separate "checker" approves — so successful fraud now requires collusion. Every action is logged (user, timestamp) into a tamper-proof audit trail. The SLA gold standard is <b>99.5–99.9% on-time-and-accurate</b> each cycle. Non-negotiable at any scale.</p></div>
${vid('https://www.youtube.com/watch?v=b0T5N7h7o3Y','ACH Rules & Regulations Explained','YouTube · how the disbursement rails + compliance work')}
${res('https://www.deel.com/blog/owned-entity-vs-in-country-partner/','Analysis','Deel — owned entity vs in-country partner','The core structural fork, from the market leader.')}
${res('https://blog.xtrm.com/posts/maker-checker-process','Concept','XTRM — the maker-checker process','Four-eyes + tamper-proof audit trail, explained.')}
${res('https://www.lano.io/blog/the-definitive-guide-to-creating-strong-payroll-slas','Reference','Lano — the definitive guide to payroll SLAs','The 99.5–99.9% accuracy benchmark + KPI taxonomy.')}
${res('https://opsdog.com/products/payroll-headcount-ratio','Benchmark','OpsDog — payroll headcount ratio','The FTE-to-employee ratio + its drivers.')}`;

SUB['compliance/bpjs']=()=>`
<p>Two separate systems, two portals, two deadlines. Basis = base salary + fixed allowances.</p>

SUB['compliance/pph']=()=>`
<p>Since Jan 2024, monthly PPh 21 uses the <b>TER</b> (average effective rate) method: <b>TER rate × monthly gross</b> for Jan–Nov, where the rate comes from the employee's PTKP-status category (A/B/C) and income band. December reverts to the annual progressive scale (5%–35%) and trues up (the "rekonsiliasi Desember"). Everything files through <b>Coretax</b> (live since Jan 2025) via e-Bupot 21 + SPT Masa, with Form 1721-A1 issued annually.</p>
<div class="callout blue"><b>Why this is a moat, not a chore</b><p>Coretax's 2025 rollout was rocky and the TER method is unintuitive. A corridor-native operator who runs this flawlessly, monthly, is selling exactly the competence that terrifies a foreign employer. This is the "intelligence work" AI runs behind the scenes.</p></div>
${vid('https://www.youtube.com/watch?v=iaG4cW4h4oU','Cara Menghitung & Lapor SPT PPh 21 Coretax 2025','YouTube · the TER method + bukti potong in Coretax')}
${vid('https://www.youtube.com/watch?v=vQihzAw_GdQ','Kelas Pajak — Perhitungan & Pelaporan PPh 21 dengan TER','YouTube · a deeper class on TER + reporting')}
${res('https://pajak.go.id/en/withholding-article-21-tax','Primary','DJP — Withholding Article 21 Tax','The tax authority\'s own source on PPh 21.')}
${res('https://recruitgo.com/indonesia-income-tax-calculator/','Tool','RecruitGo — Indonesia income-tax (TER) calculator','Cross-check our calculator against a live one.')}`;
SUB['compliance/thr']=()=>`
<p><b>THR</b> (Tunjangan Hari Raya) is a mandatory religious-holiday allowance: one month's salary for ≥12 months' service (pro-rata for 1–&lt;12 months), paid <b>at least 7 days before</b> the holiday. Both PKWT and PKWTT qualify from ≥1 month's service. Late payment = a 5% fine (Permenaker 6/2016) plus an administrative sanction ladder.</p>
<div class="worked"><div class="wt">Worked example · 2026</div><div class="wl"><span>Idul Fitri 1447H</span><span>Sat 21 / Sun 22 March 2026</span></div><div class="wl"><span>THR deadline</span><span>14 March 2026</span></div><div class="wl"><span>Employee, 8 months' service, gross Rp10M</span><span>pro-rata</span></div><div class="wl tot"><span>THR owed = 8/12 × Rp10M</span><span>Rp6,666,667</span></div></div>
<p class="mini">Budget it as ~8.3% on top of annual payroll — it's effectively a 13th month.</p>
<h4>THR funding dashboard concept</h4>
<div class="tablewrap"><table><tr><th>Employee</th><th>Holiday</th><th>Start</th><th>Service months</th><th>Monthly wage</th><th>Accrued THR</th><th>Due date</th><th>Client funded?</th></tr>
<tr><td>Example</td><td>Idul Fitri</td><td>1 Jan</td><td>8</td><td>Rp10M</td><td>Rp6.67M</td><td>H-7</td><td><span class="pill risk">No</span></td></tr></table></div>
<div class="callout"><b>Operating policy</b><p>Invoice THR monthly as an accrual, require the client to fund the final THR cash at least 10 business days before the statutory deadline, and escalate before Navv is exposed. Do not market zero-deposit EOR unless reserves or insurance cover this.</p></div>`;
SUB['compliance/sev']=()=>`
<p>Termination is the highest-risk stage because severance is generous, formula-driven, and disputes go to a labour court — and <b>our PT pays it</b>. Three components under PP 35/2021, all on a wage base of basic + fixed allowances.</p>
<div class="grid2"><div><h4>UP — Uang Pesangon (× wage)</h4><div class="tablewrap"><table><tr><th>Service</th><th>UP</th><th>Service</th><th>UP</th></tr><tr><td>&lt;1 yr</td><td>1</td><td>4–&lt;5</td><td>5</td></tr><tr><td>1–&lt;2</td><td>2</td><td>5–&lt;6</td><td>6</td></tr><tr><td>2–&lt;3</td><td>3</td><td>6–&lt;7</td><td>7</td></tr><tr><td>3–&lt;4</td><td>4</td><td>≥8 yr</td><td>9 (cap)</td></tr></table></div></div>
<div><h4>UPMK — service pay (from ≥3 yr)</h4><div class="tablewrap"><table><tr><th>Service</th><th>UPMK</th><th>Service</th><th>UPMK</th></tr><tr><td>3–&lt;6</td><td>2</td><td>15–&lt;18</td><td>6</td></tr><tr><td>6–&lt;9</td><td>3</td><td>18–&lt;21</td><td>7</td></tr><tr><td>9–&lt;12</td><td>4</td><td>≥24 yr</td><td>10</td></tr><tr><td>12–&lt;15</td><td>5</td><td></td><td></td></tr></table></div></div></div>
<p class="mini">Multipliers on UP & UPMK vary by ground: 0× (resignation, urgent misconduct) → 0.5× (efficiency due to losses) → 1× (standard) → 1.75× (retirement) → 2× (death / prolonged illness). <b>UPH</b> (unused leave + relocation) always adds on top.</p>
<div class="worked"><div class="wt">Worked example</div><div class="wl"><span>5-year employee, "efficiency due to losses"</span><span>0.5× UP + 1× UPMK</span></div><div class="wl"><span>UP = 0.5 × 6 months</span><span>3.0 months</span></div><div class="wl"><span>UPMK = 1 × 2 months</span><span>2.0 months</span></div><div class="wl tot"><span>≈ severance owed (+ UPH)</span><span>~5 months' wage</span></div></div>
<div class="flag">This is why the deposit/pre-funding policy is non-negotiable: if a client stops paying mid-employment, our PT still owes this. Client credit risk and severance math are the same risk.</div>
${res('https://www.hukumonline.com/klinik/a/cara-hitung-pesangon-lt515b7ec90fe0c/','Primary','Hukumonline — how to calculate severance (2026)','The go-to legal reference on the pesangon calculation.')}
${res('https://recruitgo.com/calculators/indonesia-severance-calculator/','Tool','RecruitGo — Indonesia severance calculator (PP 35/2021)','A live calculator to sanity-check a case.')}`;
SUB['compliance/term']=()=>`
<p class="lead">Termination is a decision tree, not a button. The foreign client can request termination, but Navv is the employer and must classify the legal ground, check evidence, fund the settlement, and run the lawful process.</p>
<div class="moneyflow">
${[
['1','Client request','Capture reason, supporting documents, last working day requested, access risk, and whether performance documentation exists.'],
['2','Classify legal ground','Resignation, PKWT expiry, performance issue, misconduct, urgent misconduct, efficiency, closure/losses, merger, illness, death, retirement, or missing/absence.'],
['3','Evidence + counsel review','No employee communication until the evidence checklist and counsel review are complete. Weak evidence means negotiate or delay.'],
['4','Funding lock','Calculate final payroll, UP/UPMK/UPH or PKWT compensation, BPJS/tax closeout and unused leave. Require client funding before notice in high-risk cases.'],
['5','Notice / negotiation','Issue written PHK notice where applicable, then run acceptance, bipartite negotiation, Disnaker mediation, or PHI path if disputed.'],
['6','Final closeout','Final payroll, payslip, BPJS deregistration, PPh 21 closeout, 1721-A1 where required, access closure, final evidence pack.']
].map(s=>`<div class="mfstep"><div class="mfn">${s[0]}</div><div><div class="mft">${s[1]}</div><div class="mfd">${s[2]}</div></div></div>`).join('')}
</div>
<h4>Reason taxonomy</h4>
<div class="tablewrap"><table><tr><th>Reason</th><th>Typical category</th><th>Special handling</th></tr>
<tr><td>Resignation</td><td>Employee-initiated</td><td>Final pay and documentation still required</td></tr>
<tr><td>End of PKWT term</td><td>Contract expiry</td><td>PKWT compensation may apply</td></tr>
<tr><td>Performance issue</td><td>Employer-initiated</td><td>Needs warnings and performance trail</td></tr>
<tr><td>Misconduct / urgent misconduct</td><td>Employer-initiated</td><td>Evidence-heavy; counsel review</td></tr>
<tr><td>Business efficiency / closure / reorg</td><td>Employer-initiated</td><td>Different severance multipliers</td></tr>
<tr><td>Missing employee</td><td>Absence / abandonment route</td><td>Welfare check, written notices, documented outreach</td></tr></table></div>
<div class="callout red"><b>Missing does not mean automatically fired</b><p>Day 1 welfare check; Day 2 formal written notice; Day 3-5 second notice and escalation; after the notice period counsel classifies whether this is resignation, abandonment, misconduct or termination. Then final pay, BPJS, tax and access closure happen.</p></div>`;

/* ===== 9 · UNIT ECONOMICS ===== */
SUB['econ/pl']=()=>`
${simBox()}
<p class="lead">This is a service business — Dickson funds ops, not just software. So the model is an <b>ops P&L</b>, not a SaaS P&L. But the margin structure is software-like once the entity's fixed cost is amortised.</p>
<div class="tablewrap"><table><tr><th>Driver</th><th>Reality</th></tr>
<tr><td>Headline fee</td><td>Only ~40–60% of true cost; the rest is employer contributions, benefits admin, FX, setup/termination fees, deposits</td></tr>
<tr><td>Ops labour</td><td>The 1:100–200 payroll ratio; below a threshold a client eats more attention than its fee covers</td></tr>
<tr><td>Fixed-cost amortisation</td><td>The single biggest margin lever: load many employees onto the one maintained entity</td></tr>
<tr><td>Where margin hides</td><td>FX spread (1–3% over mid-market — see Payments), benefits markup (5–15%), float on deposits</td></tr></table></div>
<div class="chartbox"><h4>Gross margin climbs toward ~75–80%</h4><canvas id="ch_margin"></canvas><div class="src">AI absorbs the per-employee work; humans touch only approval + exceptions.</div></div><div class="callout green"><b>The benchmark</b><p>Deel runs <b>~85% gross margins</b> at $1.4B ARR, and <b>25–30% of its revenue is fintech/FX</b> (payment services + FX spread), moving &gt;$2B/mo. That FX line is why an Airwallex-underneath model matters — it's a real profit line, not a cost.</p></div>
${res('https://sacra.com/c/deel/','Analysis','Sacra — Deel revenue, funding & unit economics','The single best doc on EOR economics: 85% GM, the FX-margin model, vertical integration.')}`;
SUB['econ/be']=()=>`<div class="chartbox"><h4>Break-even ≈ 27 employees</h4><canvas id="ch_be"></canvas><div class="src">v3.4 base case: ~$249/emp fee, first sourced fixed base ~$3.9k/mo, plus stepped admin and per-employee processing. $179 remains the aggressive floor, not the only price.</div></div>
<p>The enhanced unit-economics report recalibrates the launch model around the first real quote: Regus/Ciputra World for PT Navigasi Studio. The office is a licensing and bank-KYC asset, not decorative overhead. With the full fixed base and working-capital trough, break-even is roughly 27 employees; everything above that is high-margin because the marginal cost to add an employee is small — AI-prepped registers and one amortised entity.</p>`;
SUB['econ/staff']=()=>`<div class="chartbox"><h4>Staffing steps, it doesn't scale linearly</h4><canvas id="ch_staff"></canvas><div class="src">AI-prepped registers/filings let 1 admin run ~75 employees vs ~25–30 in a manual shop.</div></div>
<p>Humans step in at approval and exception points, not per-employee. This is the operational shape of the services-as-software thesis: automate the intelligence work, keep humans exactly where liability and judgement live.</p>
<div class="tablewrap"><table><tr><th>Stage</th><th>Employees under management</th><th>Minimum manpower</th></tr>
<tr><td>Phase 0 · before first employee</td><td>0</td><td>Founder/operator + Indonesian employment counsel + notary/incorporation firm + tax/payroll consultant + accounting firm</td></tr>
<tr><td>Phase 1</td><td>1–25</td><td>Ops / HR compliance lead, fractional payroll specialist, fractional finance/admin, counsel retainer, accounting/tax firm</td></tr>
<tr><td>Phase 2</td><td>25–100</td><td>Add customer success, payroll checker, compliance analyst, HR ops backup, part-time product/automation engineer</td></tr>
<tr><td>Phase 3</td><td>100+</td><td>Payroll lead, HR ops lead, compliance manager, finance controller, employee support function, internal tooling owner</td></tr></table></div>
<div class="callout"><b>Segregation of duties</b><p>HR makes employee master-data changes; Ops checks. Payroll calculates; founder/Ops approves. Finance prepares payouts; director/founder releases. Evidence packs are prepared by Ops and checked by Finance. One person can wear multiple hats early, but no one should control setup, calculation, approval and release alone.</p></div>`;
SUB['econ/setupcap']=()=>`<div class="chartbox"><h4>Funding trough ≈ -$56k</h4><canvas id="ch_setup"></canvas><div class="src">v3.4 correction: Regus/Ciputra quote adds a real office line; clients should still pre-fund payroll, but the operator must fund entity setup and the J-curve.</div></div>
<p>The first sourced number is a Regus Ciputra World quote: about Rp7.61M/mo including VAT and roughly Rp20M initial cash outlay. That office is a PMA domicile, licensing and bank-KYC asset. Treat the launch cash question as a J-curve trough (about -$56k), not just a one-time setup-fee list.</p>`;
SUB['econ/mvc']=()=>`
<div class="callout"><b>Veri's hardest lesson: "I said no to a client whose volume was too low — servicing them cost more than they paid."</b><p>Signals converge: EOR is economical up to ~10 employees/country; a flat setup fee adds ~21% to first-month cost on a 1-person deal; volume discounts only trigger at 20+ heads. <b>There is a client size below which serving well loses money — so "who we say no to" is a design decision, not a failure.</b></p></div>
<p>Our pricing floor and minimum seat count fall out of this. It's also the sharpest question to put to Veri (RainTech) in primary research: <i>where exactly was your line?</i></p>`;
SUB['econ/calc']=()=>`
<p>Enter a monthly gross salary (IDR). See true employer cost, employee take-home, and how our fee compares to Deel's $599. <span class="tag">estimate · verify before quoting</span></p>
<div class="grid2"><div class="calc">

<label>JKK risk tier</label><select id="calcJkk" onchange="runCalc()"><option value="0.0024">Low (office/tech) — 0.24%</option><option value="0.0054">Medium — 0.54%</option><option value="0.0089">High — 0.89%</option></select>
<label>Our monthly fee (USD)</label><input id="calcFee" type="number" value="249" oninput="runCalc()"></div>
<div class="calc" id="calcOut"></div></div>
<p class="mini" style="margin-top:8px">FX: IDR/USD 16,150 (edit <span class="mono">const FX</span> in code). PPh 21 uses a simplified TER-A/B/C band table — directional, not filing-grade.</p>`;

/* ===== 10 · PAYMENTS (Airwallex) ===== */
SUB['pay/flow']=()=>`
<p class="lead">The global model needs a global collection rail. Clients pay in their own currency; workers and statutory bodies must be paid in IDR. Airwallex is the spine that connects the two — collect anywhere, convert, pay Indonesia.</p>
<div class="moneyflow">
${[['1','Global client pays','In their currency (USD/GBP/EUR/AUD/SGD/JPY/KRW/HKD/TWD) — bank transfer to your local Global Account, or card/local method via a payment link'],['2','Airwallex Global Account','Receive "as a local", low/no incoming fee. Quote validity and requote rules sit here; collect before payroll funding lock.'],['3','Convert to IDR on receipt','Convert when funds arrive, not after payroll is due. Quote a transparent 1.5–2% FX buffer/spread so currency movement is priced, not absorbed.'],['4','Move to the PT / intercompany layer','If SG contracts the MSA and ID employs, document SG→ID flow with an intercompany agreement and transfer-pricing logic. The ID PT must hold enough cash before payroll release.'],['5','PT runs local payroll','Net salary to workers + BPJS Kesehatan/Ketenagakerjaan + PPh 21 via Coretax. Xendit can be evaluated as a domestic ID disbursement backup.']].map(s=>`<div class="mfstep"><div class="mfn">${s[0]}</div><div><div class="mft">${s[1]}</div><div class="mfd">${s[2]}</div></div></div>`).join('')}</div>
<div class="flag">⚠ Indonesia has BI rules on recurring foreign-currency → IDR conversion, and the SG-MSA / ID-employer split adds tax and transfer-pricing questions. The clean structure is: client funds before payroll, convert on receipt, land IDR into the employing PT, pay domestically, and maintain a replenished deposit of at least one month loaded cost.</div>`;

SUB['pay/margin']=()=>`
<p>FX isn't just a cost — run correctly it's a profit line, exactly as Deel does it.</p>
<div class="grid3"><div class="stat gold"><div class="v">~0.5%</div><div class="k">Airwallex FX over interbank (major pairs)</div></div><div class="stat green"><div class="v">1–3%</div><div class="k">what EORs typically charge clients on FX</div></div><div class="stat blue"><div class="v">25–30%</div><div class="k">of Deel's revenue is fintech/FX</div></div></div>

/* ===== 11 · QUALITY, RISK & CONTROLS ===== */
SUB['quality/modes']=()=>`
<p class="lead">Quality in payroll has a precise meaning: <b>accurate, on-time, compliant, every single cycle</b>. Here's where the as-is breaks and who's on the hook.</p>
<div class="tablewrap"><table><tr><th>Failure mode</th><th>Who's on the hook</th></tr>
<tr><td>Misclassification (employee treated as contractor)</td><td>The client + the EOR; willful penalties + back-contributions ($40B class-action settlements in 2024)</td></tr>
<tr><td>Permanent establishment</td><td>The client — a worker with signing authority can create a taxable presence even via an EOR</td></tr>
<tr><td>Payroll errors</td><td>The employer — bears liability even when a processor caused it</td></tr>
<tr><td>Late statutory filing</td><td>The EOR — automatic BPJS/tax penalties; coverage suspension</td></tr>
<tr><td>Botched termination</td><td>The EOR (our PT) — wrongful-termination exposure; contested if client ignored advice</td></tr>
<tr><td>Data protection</td><td>Both — payroll data is personal data (Indonesia PDP; GDPR if EU workers)</td></tr></table></div>`;
SUB['quality/nums']=()=>`
<p>The numbers that make getting this right worth it:</p>
<div class="grid3"><div class="stat red"><div class="v">~$291</div><div class="k">cost of a single payroll error (EY)</div></div><div class="stat gold"><div class="v">40%</div><div class="k">of errors trace to manual data entry</div></div><div class="stat blue"><div class="v">80%</div><div class="k">first caught by the employee, not the system</div></div>
<div class="stat red"><div class="v">49%</div><div class="k">of employees job-hunt after just two payroll mistakes</div></div><div class="stat green"><div class="v">99.9%</div><div class="k">on-time-accurate = industry SLA norm (APAC self-reports ~69%)</div></div><div class="stat green"><div class="v">&lt;1%</div><div class="k">error rate automation typically achieves</div></div></div>
<p>Every one of these is an argument for the AI-in-the-process model — and for the human sign-off layer that catches the 40% manual-entry errors before the employee does.</p>`;
SUB['quality/ctrl']=()=>`
<div class="chartbox"><h4>Controls reduce severity by turning hidden risk into reviewable artifacts</h4><canvas id="ch_controls"></canvas><div class="src">Illustrative first-10 control target: maker-checker, funding lock, counsel gates, evidence pack, access control.</div></div>
<div class="tablewrap"><table><tr><th>Control</th><th>What it does</th></tr>
<tr><td>Maker-checker (four-eyes)</td><td>Every sensitive op split into initiate + independent approve; disbursement locked until the chain completes</td></tr>
<tr><td>Audit trail</td><td>Tamper-proof read-only logs (user, timestamp, IP) — our AutoKon evidence-pack DNA, applied to payroll</td></tr>
<tr><td>Pre-funding / deposit</td><td>Never float payroll; client funds 5–7 business days before payday; a small deposit covers termination exposure</td></tr>
<tr><td>Insurance</td><td>Professional-error cover + EPLI (wrongful termination / discrimination)</td></tr>
<tr><td>Segregation of duties</td><td>HR adds → Payroll calculates → Finance releases; no one owns the whole chain</td></tr></table></div>
<p>The monthly compliance evidence pack — proof of every filing — is both a control and a product. It's the artefact none of the competitors package, and it's the thing that earns a nervous foreign employer's trust.</p>`;
SUB['quality/seam']=()=>`
<div class="callout blue"><b>The honest read — and the seam a future to-be closes</b><p>The small owned-entity EOR wins on <b>trust and local depth</b> (a named human, in timezone) but is structurally exposed on <b>consistency and reliability</b> — spreadsheets, manual portal entry, one or two people holding deadlines in their heads. The Deel-class platform is the inverse: reliable at scale, impersonal, priced for it. That tension — local trust vs platform reliability — is exactly where AI-in-the-process earns its place: keep the named human and the trust, remove the spreadsheet fragility. We name it here; we build it later.</p></div>`;

/* ===== 12 · GO-TO-MARKET ===== */
SUB['gtm/icp']=()=>`
<p class="lead">Global from day one, focused on advanced markets. The buyer is an SME or startup in the US/UK/EU/AU/SG/JP/KR/TW/HK corridor that needs 1–20 Indonesian remote people and can't (or shouldn't) open a local entity for that.</p>
<div class="grid2"><div class="card"><h4 style="margin-top:0">Who fits</h4><p class="mini">Startups & SMEs hiring engineering, design, data, finance/back-office, or async support; already tempted to hire in Indonesia (or already paying contractors there); value speed + compliance over a big brand.</p></div>
<div class="card"><h4 style="margin-top:0">Who doesn't (yet)</h4><p class="mini">Large enterprises with procurement (Deel/Atlas territory); US-realtime voice roles (timezone); companies wanting 50+ hires in one go (entity math flips).</p></div></div>
<p>Lead with the buyer's problem — compliant Indonesia hiring, severance/PE risk removed — not with "we're an EOR." Speed, compliance, and no-entity risk removal are the three messages that convert.</p>
${res('https://www.smallbizviewpoints.com/2025/04/30/go-global-stay-lean-how-eor-services-help-startups-hire-fast-smart/','Article','"Go Global, Stay Lean" — how EOR helps startups hire fast','The ICP narrative in the buyer\'s own words.')}`;
SUB['gtm/sg']=()=>`
<p class="lead">Singapore is the first commercial beachhead, not the market ceiling. It is the easiest place to sell the first proof: same-day timezone, regional familiarity, English business norms, founder networks, and buyers already comfortable managing Indonesian talent.</p>
<div class="grid3">
<div class="card"><h4 style="margin-top:0">Primary ICP</h4><p class="mini">Singapore startups hiring 1–5 Indonesian engineers, designers, product ops, QA, finance ops, admin or support. Contractor conversions are the highest-intent wedge.</p></div>
<div class="card"><h4 style="margin-top:0">Agency / dev-shop ICP</h4><p class="mini">Singapore agencies and dev shops with Indonesian delivery teams. Good demand, but watch outsourcing/core-business framing closely.</p></div>
<div class="card"><h4 style="margin-top:0">SME ops ICP</h4><p class="mini">Finance/admin/customer-ops roles are legally more comfortable and make good first pilots while tech templates are counsel-approved.</p></div></div>
<div class="callout green"><b>Positioning</b><p><b>The Indonesia EOR for Singapore teams that have outgrown contractor risk.</b> Hire Indonesian tech and product talent legally, without opening an Indonesian entity. Navv becomes the Indonesian employer and handles payroll, BPJS, PPh 21, THR, contracts and offboarding while you manage the work.</p></div>
<div class="callout blue"><b>Positioning guard</b><p>Lead with <b>employment rails</b>, not recruitment. Recruitment can become a later pull-through motion, but the launch promise is lawful employment, payroll, tax, BPJS, THR, evidence, and offboarding. That keeps Navv out of the Glints-style success-fee bundle and closer to the RainTech precedent.</p></div>`;

<tr><td>Customer support</td><td><span class="pill win">Medium-high</span></td><td>High</td><td>Good early category</td></tr>
<tr><td>QA tester</td><td><span class="pill info">Medium</span></td><td>High</td><td>Safer tech-adjacent role</td></tr>
<tr><td>Data analyst / BI support</td><td><span class="pill info">Medium</span></td><td>High</td><td>Good if framed as support</td></tr>
<tr><td>Product ops / project coordinator</td><td><span class="pill info">Medium</span></td><td>High</td><td>Strong Navv-fit</td></tr>
<tr><td>UI/UX designer</td><td><span class="pill risk">Medium-risk</span></td><td>High</td><td>Possible with careful SOW</td></tr>
<tr><td>Software engineer</td><td><span class="pill risk">Higher risk</span></td><td>Very high</td><td>Do after counsel-approved template</td></tr>
<tr><td>Product manager owning roadmap</td><td><span class="pill risk">Higher risk</span></td><td>High</td><td>Avoid as first category</td></tr>

SUB['gtm/pseo']=()=>`

<div class="callout green"><b>Our unfair advantage here</b><p>We own a topic cluster the generalists cover shallowly: "hire in Indonesia / Indonesia EOR / Indonesia payroll / BPJS / PPh 21 / severance / THR." We have genuine local depth (this whole OS is the raw material). Rank for the buyer's exact question, then convert with the evidence-pack + named-human wedge.</p></div>
<p>Pair it with inbound content (inbound leads cost ~61% less than outbound) and partnerships (recruiting agencies, dev shops, VC portfolios hiring in SEA). Outbound and communities fill the gaps.</p>
${res('https://www.omnius.so/blog/programmatic-seo-case-study','Case study','Programmatic SEO — 67 → 2,100 signups','The exact growth motion, worked end to end.')}

<div class="callout green"><b>The reframe that de-risks everything</b><p>Sell the concrete pain, not the category (Veri's #1 lesson). Not "do you want an EOR" but "keep your best Indonesian people, compliantly, for less than you think." Employee-side pull (BPJS, THR, payslips → KPR eligibility) is a channel no competitor uses.</p></div>`;

  s+=`<line x1="${LW}" y1="0" x2="${LW}" y2="${H}" stroke="rgba(255,255,255,.12)"/><line x1="0" y1="${HH}" x2="${W}" y2="${HH}" stroke="rgba(255,255,255,.12)"/>`;
  Object.keys(cell).forEach(k=>{const parts=k.split('_').map(Number),l=parts[0],st=parts[1],list=cell[k];list.forEach((a,idx)=>{const bx=LW+st*SW+(SW-BW)/2;const cy0=HH+l*LH;const by=list.length>1?cy0+8+idx*(BH+8):cy0+(LH-BH)/2;pos[a[2]]={x:bx,y:by,cx:bx+BW/2,cy:by+BH/2,r:bx+BW,b:by+BH};const col=lanes[l][1];s+=`<foreignObject x="${bx}" y="${by}" width="${BW}" height="${BH}"><div xmlns="http://www.w3.org/1999/xhtml" style="height:${BH}px;box-sizing:border-box;background:rgba(255,255,255,.06);border:1px solid ${col}55;border-left:3px solid ${col};border-radius:9px;padding:6px 8px 6px 9px;font-size:10.5px;line-height:1.25;color:#e8e8f0;display:flex;gap:6px;overflow:hidden"><span style="flex-shrink:0;width:16px;height:16px;border-radius:5px;background:${col};color:#12121a;font-weight:800;font-size:10px;display:flex;align-items:center;justify-content:center">${a[2]}</span><span>${a[3]}</span></div></foreignObject>`;});});
  for(let n=1;n<24;n++){if(pos[n]&&pos[n+1]){const p=pos[n],q=pos[n+1];let x1,y1,x2,y2;if(q.cx>p.cx){x1=p.r;y1=p.cy;x2=q.x;y2=q.cy;}else if(q.cx<p.cx){x1=p.x;y1=p.cy;x2=q.r;y2=q.cy;}else{x1=p.cx;y1=q.cy>p.cy?p.b:p.y;x2=q.cx;y2=q.cy>p.cy?q.y:q.b;}s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(224,184,74,.4)" stroke-width="1.4" marker-end="url(#aw)"/>`;}}
  s+='</svg>';el.innerHTML=s;
}

/* ================= PLAYBOOK SUBS ================= */
SUB['playbook/swimlane']=()=>`
<p class="lead">The as-is workflow, broken down by <b>actor</b> — not a table but a true swimlane. Seven lanes (the client, five EOR functions, and the employee) across the six lifecycle stages. Follow the numbered path 1→24 to see every handoff. This is the coordination map: who does what, when, and to whom.</p>
<div class="callout blue"><b>How to read it</b><p>Each box is one actor's action in one stage. Arrows are handoffs. The three ⚠ pressure points — the payroll run (stage 2), statutory filing (stage 3), and termination (stage 5) — are where coordination failures cost the most. Scroll horizontally to see all six stages.</p></div>
<div class="tablewrap" style="border:1px solid var(--gline);border-radius:14px;background:rgba(255,255,255,.02);padding:6px"><div id="swimlane" style="min-width:1400px"></div></div>
<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--text2)">
 <span>🔵 Client · directs work, funds, requests</span><span>🟡 EOR functions · Sales, HR, Payroll, Finance</span><span>🔴 Compliance / Counsel · the risk gate</span><span>🟢 Employee · in Indonesia</span></div>
<p class="mini" style="margin-top:10px">The clean separation of the five EOR lanes IS the maker-checker control: whoever prepares payroll (Payroll lane) is never the one who releases the money (Finance lane) or signs off compliance (Compliance lane). See <a onclick="go('playbook','manpower')">EOR team & hiring ladder</a>.</p>`;
SUB['playbook/triangle']=()=>`
<p class="lead">The legal spine is a triangle. The foreign client signs a commercial agreement with the EOR; the EOR — not the client — signs the Indonesian employment contract with the worker and owns every statutory obligation. Get this split wrong and either the client becomes an accidental Indonesian employer, or the EOR takes on risk it can't price.</p>
<div class="moneyflow">
 <div class="mfstep"><div class="mfn">1</div><div><div class="mft">Foreign client → EOR</div><div class="mfd">MSA / EOR Service Agreement / SOW — commercial terms, fee, pre-funding, indemnity, role restrictions, PE clauses, termination-request process.</div></div></div>
 <div class="mfstep"><div class="mfn">2</div><div><div class="mft">EOR (Indonesian entity) → Employee</div><div class="mfd">Employment Agreement (PKWT or PKWTT), in Bahasa/bilingual — wage, position, rights, confidentiality/IP, no-authority wording. The EOR owns payroll, BPJS, PPh 21, THR, termination.</div></div></div>
 <div class="mfstep"><div class="mfn">3</div><div><div class="mft">Employee → Client</div><div class="mfd">Provides the work under the client's day-to-day direction — but with no authority to bind the client, sign contracts, or represent it in Indonesia.</div></div></div>
</div>
<h3>Roles & responsibilities — who owns what, who must NOT</h3>
<div class="tablewrap"><table><tr><th>Party</th><th>Owns / controls</th><th>Must NOT do</th></tr>
<tr><td><b>Client</b></td><td>Day-to-day work direction, job requirements, performance expectations, tools</td><td>Become legal employer · sign Indonesian employment docs · ask the worker to bind the client in Indonesia</td></tr>
<tr><td><b>EOR</b></td><td>Employment contract, payroll, BPJS, PPh 21, THR, statutory compliance, termination execution</td><td>Pretend it removes ALL client risk · ignore role-authority / PE issues</td></tr>
<tr><td><b>Employee</b></td><td>Provides work, follows client direction, receives statutory rights from the EOR</td><td>Sign contracts or conclude deals for the client unless separately reviewed</td></tr></table></div>
<h3>The contract stack</h3>
<ol>
<li><b>Client MSA / EOR Service Agreement</b> — fee, payroll funding, deposit, indemnity, role & PE restrictions, confidentiality/DPA, termination-request process, client-caused liability.</li>
<li><b>Indonesia SOW / Perjanjian Alih Daya</b> — outsourced work description, period, remote status, worker protections (BPJS, THR, leave, overtime, termination rights). ⚠ Mandatory + registered with Disnaker ≤3 days under Permenaker 7/2026.</li>
<li><b>Employment Agreement (PKWT/PKWTT)</b> — Bahasa/bilingual, wage + fixed allowances, position, rights, IP/confidentiality, no-authority wording.</li>
<li><b>IP / Confidentiality / Invention Assignment</b> — especially for software/product/design roles (Indonesia doesn't apply US "work-for-hire" — you need express assignment).</li>
<li><b>Client-side Work Protocol</b> — prevents accidental PE/signing-authority; sets client-manager duties + requires performance documentation before any termination request.</li>
</ol>
<h3>SG × ID dual-entity structure</h3>
<div class="moneyflow"><div class="mfstep"><div class="mfn">SG</div><div><div class="mft">Navv HoldCo / SalesCo (Singapore)</div><div class="mfd">Commercial contracting, global collection (Airwallex), investor-facing structure. Helps sales + payments — but does <b>not</b> remove employer risk.</div></div></div>
<div class="mfstep"><div class="mfn">ID</div><div><div class="mft">Indonesian PT / PT PMA (operating employer)</div><div class="mfd">The real legal employer: payroll, BPJS, PPh 21, THR, WLKP, termination. Must be operationally real, not a paper entity — the worker is in Indonesia, so all disputes and obligations land here.</div></div></div></div>
${res('https://www.opensourceceo.com/p/deel-deep-dive','Reference','Bill Kerr — Deel, EOR & the future of global teams','How the legal triangle scales.')}`;
SUB['playbook/raci']=()=>`
<p class="lead">RACI removes the "I thought you had it" failures. For each task across the lifecycle: <b>R</b>esponsible (does it), <b>A</b>ccountable (owns it), <b>C</b>onsulted, <b>I</b>nformed. Colour-coded so the handoffs are obvious.</p>
<div class="tablewrap"><table style="font-size:11.5px"><tr><th>Task</th><th>Client</th><th>Sales/CS</th><th>HR/Ops</th><th>Payroll</th><th>Finance</th><th>Compliance</th><th>Employee</th></tr>
${[
['Role-risk + quote','C','A/R','C','','','C',''],
['Sign MSA + pre-fund','A/R','C','','','I','','' ],
['Draft & sign contract','I','','A/R','','','C','R'],
['Collect docs + register','','','A/R','I','','C','R'],
['Confirm variable pay','A/R','C','R','I','','',''],
['Gross-to-net + register','I','','C','A/R','','C',''],
['Maker-checker review','','','','C','C','A/R',''],
['Release bank payout','I','','','C','A/R','C',''],
['Pay employee + payslip','I','','','R','A','','I'],
['BPJS + PPh 21 filing','I','','','A/R','C','C',''],
['Evidence pack','I','C','C','C','C','A/R',''],
['Change requests','A','C','A/R','I','','C','R'],
['Termination decision','C','','R','','C','A/R','I'],
['Severance + closeout','I','I','R','A/R','A','C','R']
].map(r=>`<tr><td style="font-weight:600;color:#fff">${r[0]}</td>${r.slice(1).map(c=>`<td style="text-align:center;font-weight:700;color:${c.includes('A')?'#e0b84a':c.includes('R')?'#34d399':c==='C'?'#7aa2ff':c==='I'?'#8a8a98':'transparent'}">${c||'·'}</td>`).join('')}</tr>`).join('')}
</table></div>
<p class="mini"><span style="color:#e0b84a;font-weight:700">A</span> accountable · <span style="color:#34d399;font-weight:700">R</span> responsible · <span style="color:#7aa2ff;font-weight:700">C</span> consulted · <span style="color:#8a8a98;font-weight:700">I</span> informed. Note two hard rules: <b>Compliance is accountable for termination decisions</b> (never the client), and <b>Finance releases payout</b> separately from Payroll who prepares it.</p>`;
SUB['playbook/manpower']=()=>`
<p class="lead">Don't build a bloated org. Build a <b>minimum viable EOR operations cell</b> — counsel + accounting + payroll on retainer — then add headcount only as employees-under-management grow. Here's the ladder.</p>
<h4>Phase 0 · pre-incorporation (before first employee)</h4>
<div class="tablewrap"><table><tr><th>Role</th><th>Engagement</th><th>Why</th></tr>
<tr><td>Indonesian employment counsel</td><td>Retainer / memo</td><td>Permenaker 7/2026, role taxonomy, contracts, termination</td></tr>
<tr><td>Notary / incorporation firm</td><td>Project</td><td>PT/PMA setup, AHU, OSS/NIB</td></tr>
<tr><td>Tax / payroll consultant</td><td>Retainer</td><td>PPh 21, BPJS, payroll workflow</td></tr>
<tr><td>Accounting / finance firm</td><td>Retainer</td><td>Bookkeeping, withholding, reconciliation</td></tr>
<tr><td>Founder / operator</td><td>Internal</td><td>Owns SOP, vendors, client research</td></tr></table></div>
<h4>Phase 1 · 1–25 employees under management</h4>
<div class="tablewrap"><table><tr><th>Role</th><th>Hire type</th><th>Owns</th></tr>
<tr><td>Ops Lead / HR Compliance Lead</td><td>Full-time or strong fractional</td><td>Onboarding, contracts, employee support, compliance calendar</td></tr>
<tr><td>Payroll Specialist</td><td>Fractional → full-time</td><td>Gross-to-net, payslips, payroll register</td></tr>
<tr><td>Finance / Admin</td><td>Part-time / fractional</td><td>Invoicing, funding checks, bank files, reconciliation</td></tr>
<tr><td>Employment Counsel</td><td>Retainer</td><td>All terminations / unusual cases</td></tr>
<tr><td>Accounting / Tax firm</td><td>Retainer</td><td>Filings, payroll-tax sanity checks</td></tr></table></div>
<div class="grid2"><div class="card"><h4 style="margin-top:0">Phase 2 · 25–100 employees</h4><p class="mini">Add: Customer Success / Account Manager · Payroll Checker (2nd approver) · Compliance Analyst · HR Ops backup · part-time automation engineer.</p></div>
<div class="card"><h4 style="margin-top:0">Phase 3 · 100+ employees</h4><p class="mini">Add: Payroll Lead · HR Operations Lead · Compliance Manager · Finance Controller · Employee Support function · internal tooling owner.</p></div></div>
<h3>Segregation of duties — the minimum control</h3>
<div class="tablewrap"><table><tr><th>Activity</th><th>Maker</th><th>Checker / approver</th></tr>
<tr><td>Add employee master data</td><td>HR Ops</td><td>Ops Lead</td></tr>
<tr><td>Change salary / bank data</td><td>HR Ops</td><td>Founder / Finance</td></tr>
<tr><td>Calculate payroll</td><td>Payroll Specialist</td><td>Ops Lead / Founder</td></tr>
<tr><td>Release bank payout</td><td>Finance / Admin</td><td>Founder / Director</td></tr>
<tr><td>Send evidence pack</td><td>Ops Lead</td><td>Finance / Founder</td></tr></table></div>`;
SUB['playbook/clock']=()=>`
<p class="lead">Payroll isn't a day, it's a clock. Anchoring every cycle to the same relative calendar (T = payday) is what makes it reliable at scale — and it maps ops deadlines onto the hard legal ones.</p>
<div class="timeline">
${[['T-10','Collect payroll changes','Leave, OT, allowance, joiner/leaver, dependent changes'],['T-7','Client pre-funds the invoice','No funds → escalate before cutoff. The EOR never fronts payroll'],['T-5','Payroll cutoff / freeze inputs','Anything after this rolls to next cycle'],['T-4','Payroll calculation','Gross-to-net: BPJS, PPh 21 TER → payroll register'],['T-3','Maker-checker review','Register approved before any money moves'],['T-2','Finance approval / payout prep','Bank file built, second approver releases'],['T','Salary paid + payslip issued','The trust moment — on time, correct'],['T+10 / +15 / +20','Statutory deadlines','BPJS Kesehatan 10th · BPJS-TK + PPh 21 deposit 15th · SPT Masa 20th'],['T+21','Monthly evidence pack sent','Payslip + BPJS proof + PPh 21 proof + reconciliation + change log']].map(t=>`<div class="tl"><div class="d">${t[0]}</div><div class="t">${t[1]}</div><div class="x">${t[2]}</div></div>`).join('')}</div>
<div class="callout"><b>Why anchor to T</b><p>A fixed relative clock means the same checklist runs every month regardless of which calendar day payday falls on — the single biggest driver of the 99.5–99.9% accuracy SLA, and the thing that survives a key person being away.</p></div>`;
SUB['playbook/termination']=()=>`
<p class="lead">Termination is the highest-risk stage and must <b>never</b> be a one-click button. The client may <i>request</i> it; the EOR, as Indonesian legal employer, <i>decides and runs</i> the lawful process — branched by legal ground and required evidence.</p>
<div class="moneyflow">
${[['1','Client request','The client cannot execute — only request'],['2','Classify legal ground','Resignation / PKWT end / performance / misconduct / efficiency / closure / illness / death / retirement / abandonment'],['3','Evidence check','Performance trail, warnings (SP), documentation per ground'],['4','Counsel review','Employment counsel signs off BEFORE employee communication'],['5','Written PHK notice / negotiation','Surat Pemberitahuan PHK; bipartit if contested'],['6','Settlement calculation','UP + UPMK + UPH by the correct 0.5×–2× multiplier'],['7','Employee accepts OR disputes','Accept → settle. Dispute → bipartit → Disnaker mediasi → PHI → kasasi'],['8','Final payroll + closeout','Final pay, BPJS/tax closeout, final evidence pack']].map(s=>`<div class="mfstep"><div class="mfn">${s[0]}</div><div><div class="mft">${s[1]}</div><div class="mfd">${s[2]}</div></div></div>`).join('')}
</div>
<h3>Termination reason taxonomy</h3>
<div class="tablewrap"><table><tr><th>Reason</th><th>Category</th><th>Note</th></tr>
<tr><td>Resignation</td><td>Employee-initiated</td><td>Final pay + docs still needed; uang pisah per contract</td></tr>
<tr><td>End of PKWT term</td><td>Contract expiry</td><td>PKWT kompensasi may apply (not PKWTT severance)</td></tr>
<tr><td>Performance</td><td>Employer-initiated</td><td>Requires warning trail (SP 1/2/3)</td></tr>
<tr><td>Misconduct / urgent misconduct</td><td>Employer-initiated</td><td>Evidence-heavy; counsel review</td></tr>
<tr><td>Business efficiency / losses / closure</td><td>Employer-initiated</td><td>Severance multiplier depends on basis; documentation required</td></tr>
<tr><td>Prolonged illness · death · retirement</td><td>Statutory</td><td>Special handling; higher multipliers (illness 2×, death 2×)</td></tr>
<tr><td>Missing / absence</td><td>Abandonment route</td><td>Notice process required — never "missing = auto-fired"</td></tr></table></div>
<h3>Missing-employee SOP</h3>
<div class="callout red"><b>Do not assume "missing = automatic termination."</b><p><b>Day 1:</b> welfare check (WhatsApp/email/phone), ask client for last activity, freeze access only if data/security risk. <b>Day 2:</b> formal Bahasa/bilingual written notice with a response deadline. <b>Day 3–5:</b> second notice + emergency contact if justified; document every attempt. <b>After notice:</b> counsel classifies resignation / abandonment / misconduct / termination, then final pay + BPJS/tax + access closure.</p></div>
${res('https://www.hukumonline.com/klinik/a/cara-hitung-pesangon-lt515b7ec90fe0c/','Legal','Hukumonline — severance calculation','The multiplier tables by ground.')}`;
SUB['playbook/rolerisk']=()=>`
<p class="lead">Under Permenaker 7/2026, outsourcing is restricted to supporting-service categories — so <b>role selection is legal strategy</b>. Rank every first-client role by legal comfort, and frame the SOW as <i>support</i>, never core business.</p>
<div class="tablewrap"><table><tr><th>Role</th><th>Legal comfort</th><th>Commercial fit</th><th>Stance</th></tr>
<tr><td>VA / admin ops</td><td>High</td><td>Medium</td><td>Safe early category</td></tr>
<tr><td>Finance ops / bookkeeping</td><td>High</td><td>Medium-high</td><td>Good early category</td></tr>
<tr><td>Customer support</td><td>Medium-high</td><td>High</td><td>Good early category</td></tr>
<tr><td>QA tester</td><td>Medium</td><td>High</td><td>Safer tech-adjacent role</td></tr>
<tr><td>Data / BI support</td><td>Medium</td><td>High</td><td>Good if framed as support</td></tr>
<tr><td>Product ops / project coordinator</td><td>Medium</td><td>High</td><td>Strong Navv-fit</td></tr>
<tr><td>UI/UX designer</td><td>Medium-risk</td><td>High</td><td>Possible with careful SOW</td></tr>
<tr><td>Software engineer</td><td>Higher risk</td><td>Very high</td><td>Only after counsel-approved template</td></tr>
<tr><td>Product manager owning roadmap</td><td>Higher risk</td><td>High</td><td>Avoid as first category</td></tr>
<tr><td>Sales / contract-closing</td><td>High risk</td><td>Low</td><td>Avoid — PE + authority risk</td></tr></table></div>
<div class="grid2"><div class="callout red" style="margin:0"><b>Avoid this wording</b><p>"Employee is embedded as a <b>core employee</b> of Client's engineering team building Client's <b>core product</b>."</p></div>
<div class="callout green" style="margin:0"><b>Prefer this wording</b><p>"Employee provides remote <b>software development support, QA, implementation, design, or product-operations support</b> under the Client's direction, <b>without authority to bind the Client</b>, conclude contracts, represent the Client in Indonesia, or manage Client revenue."</p></div></div>`;
SUB['playbook/thr']=()=>`
<p class="lead">THR (Tunjangan Hari Raya) is the mandatory religious-holiday allowance — and the fastest way to blow a cash-flow model if treated as an annual surprise. Handle it as a <b>monthly liability</b>.</p>
<div class="worked"><div class="wt">The rule</div><div class="wl"><span>Service ≥ 12 months</span><span>THR = 1 month's wage</span></div><div class="wl"><span>1 ≤ service &lt; 12 months</span><span>THR = (months / 12) × 1 month's wage</span></div><div class="wl"><span>Deadline</span><span>≥ 7 days before the holiday (H-7)</span></div><div class="wl tot"><span>Monthly accrual</span><span>= monthly wage ÷ 12 (~8.3%)</span></div></div>
<p>Every monthly client invoice should therefore include: gross salary + employer BPJS + <b>THR accrual</b> + severance/risk reserve + EOR fee + FX/payment fee. Pre-fund THR at least 10 business days before the statutory deadline; escalate before the deadline if the client is late. Never market zero-deposit unless you carry insurance/reserve.</p>
<h3>THR dashboard concept</h3>
<div class="tablewrap"><table><tr><th>Employee</th><th>Holiday</th><th>Start</th><th>Service (mo)</th><th>Monthly wage</th><th>Accrued THR</th><th>Due</th><th>Client funded?</th></tr>
<tr><td>Example</td><td>Idul Fitri</td><td>1 Jan</td><td>8</td><td>Rp10M</td><td>Rp6.67M</td><td>H-7</td><td>Yes / No</td></tr></table></div>
<div class="callout"><b>Edge cases for counsel</b><p>Employee resigns near the holiday · employer terminates before the holiday · PKWT ending near THR date · fixed vs variable allowance base · &lt;1 month service · multiple religions / holiday-date handling. Permenaker 7/2026 explicitly extends THR to outsourced workers.</p></div>
${res('https://www.aseanbriefing.com/news/thr-compliance-in-indonesia-what-foreign-employers-must-review-before-eid-2026/','Guide','ASEAN Briefing — THR compliance 2026','What foreign employers must review before Eid.')}`;
SUB['playbook/memos']=()=>`
<p class="lead">Legal clearance is <b>Gate 0</b> — before any incorporation spend. Commission these three counsel memos precisely so the work is fast and scoped. This is the single most important de-risking step.</p>
<div class="callout red"><b>⚠ The KBLI question just got sharper</b><p>Newer research indicates a foreign-owned EOR likely registers under <b>KBLI 78101</b> (labour placement — Medium-High risk, Manpower-verified) and/or <b>KBLI 78300</b> (HR-function provision — Low risk, NIB-only), <b>not 78200</b> (which OSS effectively closes to large-scale PMA). Sources conflict — this is exactly what Memo B must settle before incorporating.</p></div>
<div class="grid3">
<div class="card"><h4 style="margin-top:0">Memo A · Permenaker 7/2026 legality</h4><ul class="mini" style="margin-bottom:0"><li>Can white-collar roles fit "layanan penunjang operasional"?</li><li>Which roles are low/med/high risk?</li><li>SOW + contract wording to use?</li><li>Must each client agreement be recorded with Disnaker?</li></ul></div>
<div class="card"><h4 style="margin-top:0">Memo B · Entity & KBLI</h4><ul class="mini" style="margin-bottom:0"><li>PT PMA or local PT?</li><li>KBLI 78101 / 78300 vs 78200 — which is correct & available?</li><li>Paid-up capital, investment plan, director/commissioner, LKPM?</li><li>Special outsourcing licence or only OSS/NIB?</li></ul></div>
<div class="card"><h4 style="margin-top:0">Memo C · Termination & indemnity</h4><ul class="mini" style="margin-bottom:0"><li>Exact PHK process by ground</li><li>PKWT kompensasi vs PKWTT severance</li><li>Missing-employee / abandonment process</li><li>What must be funded before notice? Enforceable client-indemnity wording?</li></ul></div></div>
<div class="callout green"><b>Gate 0 go/no-go</b><p>"Can Navv legally employ Indonesian remote tech/product/support workers for advanced-market clients under a defensible structure?" — No money moves to incorporation until all three memos clear. See the <a onclick="go('roadmap','gates')">roadmap gates</a>.</p></div>`;

/* ================= GLOSSARY ================= */
function gcard(t){return `<div class="card gterm" data-t="${(t.t+' '+t.d).toLowerCase().replace(/"/g,'')}"><div style="display:flex;justify-content:space-between;gap:10px;align-items:baseline"><h4 style="margin:0;color:#fff">${t.t}</h4>${t.s?`<a href="${t.s}" target="_blank" style="font-size:11px;flex-shrink:0">source ↗</a>`:''}</div><p class="mini" style="margin:6px 0 4px">${t.d}</p><p class="mini" style="margin:0;color:var(--gold2)"><b>Why it matters:</b> ${t.w}</p></div>`;}
function glossaryFilter(q){q=(q||'').toLowerCase().trim();document.querySelectorAll('.gterm').forEach(e=>{e.style.display=(!q||e.dataset.t.includes(q))?'':'none';});}
const GLOSSARY=[
{c:'biz',t:'Employer of Record (EOR)',d:'A third party that becomes the legal employer of a worker on behalf of a client, taking on payroll, tax, benefits and compliance while the client directs the work.',w:'This is the business — the EOR carries the legal-employer liabilities so the client hires without a local entity.'},
{c:'biz',t:'PEO',d:'A co-employment model (US-origin) where the PEO and client share employer responsibilities, usually needing the client to already have a local entity.',w:'Often confused with EOR; a PEO co-employs, an EOR is the sole legal employer.'},
{c:'biz',t:'AOR / Contractor of Record',d:'A party that formally engages and pays independent contractors on a client behalf.',w:'The compliant path when a role does not warrant employment — but in Indonesia the contractor/employee line is thin.'},
{c:'biz',t:'Staffing agency',d:'A firm that recruits and supplies (often temporary) workers, usually remaining their employer.',w:'Overlaps with alih daya and is scope-restricted under Permenaker 7/2026.'},
{c:'biz',t:'Payroll bureau',d:'Processes payroll (gross-to-net, filings, disbursement) but is not the legal employer.',w:'Carries far less liability than an EOR — be clear which you sell.'},
{c:'biz',t:'Co-employment',d:'An arrangement where two entities share employer obligations for the same worker.',w:'Can drag the client into joint liability; a true EOR keeps sole-employer status.'},
{c:'biz',t:'Owned-entity model',d:'Running EOR services through your own locally incorporated entity.',w:'Control, better margin, cleaner liability — but capital + ongoing compliance.'},
{c:'biz',t:'In-Country Partner (ICP) / Aggregator',d:'A local licensed entity a platform uses to employ workers where it lacks its own entity; an aggregator stitches many together.',w:'You inherit the partner compliance quality and licensing scope.'},
{c:'biz',t:'Permanent Establishment (PE) / BUT',d:'A taxable business presence a foreign company can inadvertently create, triggering local corporate tax.',w:'A core EOR value is avoiding PE — but a poorly structured EOR can create the very PE it was meant to avoid.'},
{c:'biz',t:'Misclassification',d:'Treating a worker as a contractor (or a permanent employee as fixed-term) when the law says otherwise.',w:'Indonesia biggest EOR risk: a defective PKWT can be deemed permanent; back-pay + severance + BPJS land on the EOR.'},
{c:'biz',t:'Loaded / fully-burdened cost',d:'Total cost to employ: gross salary plus all employer contributions, allowances, accruals and fees.',w:'The number you quote and price against — bare salary understates it badly.'},
{c:'biz',t:'Burden rate',d:'The percentage uplift over base salary for employer statutory + benefit costs.',w:'Your margin lives or dies on an accurate Indonesian burden rate (~15–18%).'},
{c:'biz',t:'Pass-through cost',d:'A cost the EOR incurs on the client behalf and bills onward at cost, without markup.',w:'Clean pass-through vs marked-up-fee separation builds trust and keeps the taxable service fee distinct.'},
{c:'biz',t:'Pre-funding',d:'Requiring the client to remit payroll funds before the EOR pays employees.',w:'The EOR must pay the worker (and BPJS/tax) whether or not the client has paid.'},
{c:'biz',t:'Deposit',d:'A held sum (often 1–2 months payroll or a severance reserve) the client posts as security.',w:'Covers tail liabilities (notably severance) if the client walks away.'},
{c:'biz',t:'Float',d:'The window between when the EOR pays out and when client funds clear.',w:'Negative float means financing the client; managed via pre-funding + deposit.'},
{c:'biz',t:'FX spread',d:'The margin between the rate an EOR buys currency at and the rate it bills the client.',w:'Both a cost to manage and (transparently) a revenue line for cross-border clients.'},
{c:'biz',t:'Evidence pack',d:'A bundled set of documents proving compliance/correctness of an action.',w:'An EOR defensibility rests on evidence — for termination: contracts + bipartit + mediation + payment proof.'},
{c:'biz',t:'SLA',d:'A contractual commitment to service standards (accuracy, turnaround, deadlines).',w:'Tie SLAs to hard Indonesian deadlines (PPh 21 20th, THR H-7, BPJS monthly).'},
{c:'biz',t:'Maker-checker / four-eyes',d:'One person prepares (maker), a different person reviews/approves (checker) before execution.',w:'Prevents costly single-person payroll errors and fraud.'},
{c:'biz',t:'Segregation of Duties (SoD)',d:'Splitting critical steps across different people (approve vs release).',w:'Keeps a single actor from both authorising and disbursing payments.'},
{c:'biz',t:'Gross-to-net',d:'The full calc from gross pay to net take-home, subtracting tax and employee contributions.',w:'The heart of the payroll engine; errors surface directly as employee complaints.'},
{c:'biz',t:'Payroll register',d:'The detailed record of a payroll run: every employee, gross, deductions, contributions, net.',w:'The primary evidence + reconciliation artifact for each cycle.'},
{c:'biz',t:'RACI',d:'A matrix assigning Responsible, Accountable, Consulted, Informed for each task.',w:'Makes the client–EOR–employee handoffs explicit.'},
{c:'contract',t:'Master Services Agreement (MSA)',d:'The overarching commercial contract between EOR and client (fees, liability, IP, term, governing law).',w:'Where the big protections live — every SOW inherits it.'},
{c:'contract',t:'EOR Service Agreement',d:'Defines the EOR relationship: EOR as sole legal employer, pricing, pre-funding, responsibility split.',w:'The document that puts liability where you intend.'},
{c:'contract',t:'Statement of Work (SOW)',d:'A per-engagement document under the MSA specifying the worker, role, salary, benefits, start date.',w:'Where per-employee cost and contract type (PKWT/PKWTT) live.'},
{c:'contract',t:'Perjanjian Alih Daya',d:'The Indonesian-law outsourcing contract between provider (EOR) and user company — now mandatory under Permenaker 7/2026.',w:'⚠ Must be registered with Disnaker within 3 business days; the office can refuse non-compliant scope.',s:'https://www.ahp.id/indonesias-new-outsourcing-rules-minister-of-manpower-regulation-no-7-of-2026-and-what-it-means-for-employers/'},
{c:'contract',t:'Employment agreement (PKWT / PKWTT)',d:'The contract between EOR and the individual worker under Indonesian law.',w:'The third leg of the triangle; its type sets the entire liability profile.'},
{c:'contract',t:'IP assignment',d:'A clause transferring ownership of IP the worker creates to the client (employee → EOR → client).',w:'Or the client does not own what it paid for.'},
{c:'contract',t:'Invention assignment',d:'A specific IP-assignment form covering inventions and patentable work.',w:'For technical roles the chain-of-title must be watertight through the EOR.'},
{c:'contract',t:'Work-for-hire',d:'A US doctrine where employee-created work is automatically employer-owned.',w:'Indonesia does not apply it the same way — you need express assignment clauses.'},
{c:'contract',t:'Confidentiality / NDA',d:'A promise not to disclose or misuse confidential information.',w:'Must bind the employee via the employment agreement, not just the MSA.'},
{c:'contract',t:'Non-solicitation',d:'Bars a party or ex-employee from poaching the other employees or clients.',w:'Protects the EOR from clients hiring placed workers directly — but weakly enforceable vs employees in Indonesia.'},
{c:'contract',t:'Non-compete / restraint of trade',d:'Restricts a worker from joining competitors after leaving.',w:'⚠ Indonesian courts are generally hostile to post-employment non-competes — treat as weak.'},
{c:'contract',t:'Indemnification',d:'A promise to cover the other party losses from specified events.',w:'The EOR should be indemnified for acting on client instructions; the client for the EOR compliance lapses.'},
{c:'contract',t:'Limitation of liability',d:'Caps maximum liability (often to fees paid) and excludes indirect damages.',w:'Given Indonesian severance size, carve statutory liabilities in/out of the cap deliberately.'},
{c:'contract',t:'Governing law',d:'Specifies which jurisdiction law governs the contract.',w:'The MSA may be SG-law, but the employment relationship is inescapably Indonesian law.'},
{c:'contract',t:'Dispute resolution / arbitration',d:'Sets how disputes resolve (named courts or arbitration, e.g. SIAC/BANI).',w:'Employment disputes must go through Indonesia bipartit → mediasi → PHI — you cannot arbitrate those away.'},
{c:'contract',t:'Force majeure',d:'Excuses performance when extraordinary events prevent it.',w:'Defines whether the EOR is off the hook for e.g. Coretax downtime — but statutory duties rarely qualify.'},
{c:'contract',t:'No-authority clause',d:'States the EOR has no authority to bind the client and is not its agent.',w:'Critical PE/BUT defence — rebuts the dependent-agent argument.'},
{c:'contract',t:'Data Processing Agreement (DPA)',d:'Governs how personal data is handled between controller and processor.',w:'⚠ The EOR processes sensitive data (NIK, NPWP, salary, BPJS); Indonesia PDP Law (UU 27/2022) requires it.'},
{c:'contract',t:'Pause-work / suspension clause',d:'Lets the EOR suspend a worker services on client non-payment without terminating.',w:'Stop supplying labour to a non-paying client while still owing the employee — pairs with pre-funding.'},
{c:'contract',t:'Termination-for-convenience',d:'Lets a party end the contract without cause, on notice.',w:'The EOR still faces statutory obligations to the employee — the clause must require the client to fund wind-down.'},
{c:'law',t:'PKWT',d:'Fixed-term employment contract for temporary/completion work, capped at 5 years total; no probation; end-of-contract kompensasi owed.',w:'The default EOR vehicle — track the 5-year cap, never add probation, accrue kompensasi from month 1.',s:'https://jdih.kemnaker.go.id/asset/data_puu/PP352021.pdf'},
{c:'law',t:'PKWTT',d:'Open-ended permanent contract; may include ≤3-month probation; carries full severance on termination.',w:'Full severance exposure — if a worker is (or is reclassified as) PKWTT, the EOR is on the hook.',s:'https://jdih.kemnaker.go.id/asset/data_puu/PP352021.pdf'},
{c:'law',t:'PHK',d:'Termination of employment; generally negotiated bilaterally first, then escalated if contested.',w:'The EOR issues the PHK and pays severance; each ground carries a 0.5×–2× multiplier.',s:'https://jdih.kemnaker.go.id/asset/data_puu/PP352021.pdf'},
{c:'law',t:'Masa percobaan (probation)',d:'A trial period up to 3 months, allowed only for new PKWTT hires, paid ≥ minimum wage.',w:'Probation on a PKWT is illegal and voids the clause — a very common client mistake.'},
{c:'law',t:'Alih daya (outsourcing)',d:'Delegating part of a company work to a provider by supplying workers; restricted to 6 categories, barred from core functions.',w:'⚠ The single most consequential rule for the EOR model (Permenaker 7/2026).',s:'https://www.hukumonline.com/berita/a/permenaker-outsourcing-terbaru-atur-6-jenis-pekerjaan-penunjang-lt69f4459de298b/'},
{c:'law',t:'UU Ketenagakerjaan (UU 13/2003)',d:'Indonesia foundational labour statute; still in force, heavily amended by Cipta Kerja.',w:'Defines baseline worker protections; a new standalone Labour Law is expected soon.'},
{c:'law',t:'UU Cipta Kerja / Omnibus (UU 6/2023)',d:'The job-creation law that liberalised fixed-term contracts, severance and outsourcing.',w:'Source of the flexible rules — but partly invalidated by the MK, so certainty is lower than it looks.'},
{c:'law',t:'PP 35/2021',d:'Implementing regulation for PKWT, alih daya, working time and PHK/severance.',w:'Your day-to-day compliance manual — every severance figure traces to its tables.',s:'https://jdih.kemnaker.go.id/asset/data_puu/PP352021.pdf'},
{c:'law',t:'PP 36/2021 (wages)',d:'Core wages regulation (minimum wage, structure, overtime), amended by PP 49/2025.',w:'⚠ PP 49/2025 raised the wage formula and revived sectoral minimums — some placements now owe more.'},
{c:'law',t:'Permenaker 7/2026',d:'Ministerial regulation (30 Apr 2026) restricting outsourcing to 6 categories, mandating a registered Perjanjian Alih Daya, with a 2-year transition.',w:'⚠ Defines the legal boundary of the entire EOR offering; widely seen as transitional/contestable.',s:'https://www.hukumonline.com/berita/a/permenaker-7-2026-dan-dilema-dunia-usaha--antara-kepastian-hukum-dan-realitas-lapangan-lt69f986b7895b7/'},
{c:'law',t:'Layanan penunjang operasional',d:'The 5th and broadest permitted outsourcing category — a catch-all for non-core operational support.',w:'⚠ Your widest compliant lane AND biggest gray zone — document why each role is genuinely support.'},
{c:'law',t:'UMP / UMK',d:'Provincial / regency minimum-wage floors set annually by the Governor (UMK ≥ UMP).',w:'⚠ Pay at least the correct regional floor and check whether a revived sectoral minimum applies.'},
{c:'law',t:'UP — Uang Pesangon',d:'Core severance on PKWTT termination, 1–9 months by tenure, × the 0.5×–2× ground multiplier.',w:'The largest termination liability — accrue for it and apply the correct multiplier.',s:'https://www.gadjian.com/blog/2026/01/19/tabel-pesangon-uu-cipta-kerja/'},
{c:'law',t:'UPMK — Uang Penghargaan Masa Kerja',d:'Long-service pay on PHK for ≥3 years service, 2–10 months by tenure.',w:'Stacks on UP for longer-tenured workers — model combined exposure past 3 years.'},
{c:'law',t:'UPH — Uang Penggantian Hak',d:'Compensation of accrued rights on termination: unused leave, return transport, contractual items.',w:'Owed even in clean exits — track leave balances and hire-location transport.'},
{c:'law',t:'Uang pisah',d:'A payment to a voluntarily-resigning worker where full pesangon is not owed; set by contract/company rules.',w:'Because your documents define it, you control this liability through your templates.'},
{c:'law',t:'Bipartit',d:'Mandatory first step in an industrial dispute: direct employer–worker negotiation, max 30 working days.',w:'You cannot skip to court — every disputed termination needs a documented bipartit (risalah).'},
{c:'law',t:'Disnaker',d:'The regional manpower office that registers agreements, houses mediators, runs mediation.',w:'The EOR primary government touchpoint for outsourcing-agreement registration and disputes.'},
{c:'law',t:'Mediasi',d:'Compulsory post-bipartit conciliation by a government mediator; on failure a written anjuran is issued.',w:'The gatekeeper to court — no mediation risalah/anjuran, no valid PHI filing.'},
{c:'law',t:'PHI',d:'Industrial Relations Court — first-instance court for disputes that fail bipartit + mediation; no High Court appeal, only cassation.',w:'Trial-level evidence must be right the first time.'},
{c:'law',t:'Kasasi',d:'Direct appeal to the Supreme Court against a PHI decision — the final stage.',w:'Extends timeline/cost of a contested PHK — factor into settle-vs-litigate decisions.'},
{c:'law',t:'THR — Tunjangan Hari Raya',d:'Mandatory religious-holiday pay: 1 month wage for ≥12 months service (pro-rata 1–12), paid by H-7.',w:'A hard annual deadline with sanctions — accrue across every placement, pay on time.',s:'https://www.hukumonline.com/berita/a/h-7-lebaran--ini-kriteria-pekerja-yang-wajib-dapat-thr-lt660f569300d53/'},
{c:'law',t:'Uang kompensasi PKWT',d:'End-of-contract compensation for a fixed-term worker (≥1 month service): 1 month wage per 12 months, pro-rata.',w:'⚠ A recurring guaranteed cost on every PKWT — accrue from month 1 or margin erodes.'},
{c:'tax',t:'NPWP',d:'The unique taxpayer ID for all filings and withholding; now a 16-digit number.',w:'No valid NPWP/NIK → no withholding, bukti potong, or filing. ⚠ Old 15-digit format expired Jun 2024.',s:'https://www.pajak.go.id/index.php/en/node/114311'},
{c:'tax',t:'NIK',d:'The 16-digit national ID on the KTP; for residents the NIK is the NPWP after a one-time matching.',w:'⚠ Confirm the NIK is matched/validated in Coretax or e-Bupot fails.'},
{c:'tax',t:'PTKP',d:'Non-taxable income threshold: Rp 54M/yr base, +Rp 4.5M spouse, +Rp 4.5M per dependent (max 3).',w:'Drives the annual tax base and the monthly TER category — capture accurately.'},
{c:'tax',t:'PPh 21',d:'Employee income tax the employer withholds monthly; progressive 5/15/25/30/35%.',w:'The EOR is the withholding agent — liable for correct calc, deposit and reporting.'},
{c:'tax',t:'TER',d:'Simplified monthly PPh 21 method (since 2024): a flat effective rate by PTKP category A/B/C, Jan–Nov; December reconciled progressively.',w:'⚠ Map each employee to A/B/C; wrong category or December true-up causes disputes.',s:'https://pajak.go.id/en/artikel/simplifying-employee-income-tax-withholding-0'},
{c:'tax',t:'PMK 168/2023',d:'The Finance-Minister regulation that established TER and detailed PPh 21 rules (from Jan 2024).',w:'Your payroll methodology and software must be demonstrably PMK 168-compliant.'},
{c:'tax',t:'Bukti potong / e-Bupot',d:'The official proof-of-withholding slip; e-Bupot 21/26 (now inside Coretax) generates them.',w:'The employee evidence of tax paid. ⚠ Form 1721-A1 renamed BPA1 under PER-11/PJ/2025.'},
{c:'tax',t:'SPT Masa',d:'The monthly tax return reporting tax withheld; PPh 21 due by the 20th.',w:'A hard monthly deadline — late filing triggers penalties for which the EOR is liable.'},
{c:'tax',t:'Form 1721-A1',d:'The annual withholding certificate summarising a permanent employee income + PPh 21.',w:'Issue accurately at year-end; reflects the December TER-to-progressive reconciliation. Renamed BPA1.'},
{c:'tax',t:'PKP',d:'VAT-registered taxable entrepreneur; mandatory once turnover reaches Rp 4.8bn.',w:'Determines whether the EOR must charge VAT and issue faktur pajak on its management fees.'},
{c:'tax',t:'Faktur pajak',d:'The formal VAT invoice a PKP issues via e-Faktur.',w:'The EOR issues these on its service fees if it is a PKP. ⚠ VAT effectively 11% for most services.'},
{c:'tax',t:'Coretax',d:'DJP centralized tax system (Jan 2025) consolidating registration, filing, e-Faktur and e-Bupot.',w:'⚠ The single portal for all withholding + SPT — but a rocky rollout, so build deadline buffers.'},
{c:'tax',t:'BPJS Ketenagakerjaan',d:'The employment social-security agency (JHT/JP/JKK/JKM/JKP); reporting via SIPP.',w:'Register every worker, compute multi-program contributions, remit monthly.'},
{c:'tax',t:'BPJS Kesehatan',d:'National health insurance; 5% of wage (4% employer / 1% employee), cap Rp 12M, up to 5 family.',w:'A separate agency + portal (EDABU) from BPJS-TK.'},
{c:'tax',t:'JHT',d:'Old-age savings; 5.7% total (3.7% employer / 2% employee), no wage ceiling.',w:'The largest single BPJS-TK line and uncapped — scales with salary.'},
{c:'tax',t:'JP',d:'Pension; 3% total (2% employer / 1% employee), wage-capped.',w:'⚠ Ceiling rose to Rp 11,086,300/mo from 1 Mar 2026 — apply the current ceiling.'},
{c:'tax',t:'JKK',d:'Work-accident insurance; 0.24%–1.74% by risk class, fully employer-paid.',w:'Depends on the registered risk class (office/tech ≈ 0.24%).'},
{c:'tax',t:'JKM',d:'Death benefit; 0.3% of wage, fully employer-paid.',w:'Small, flat, employer-only — but mandatory for every worker.'},
{c:'tax',t:'JKP',d:'Unemployment benefit; ~0.46% funded by government subsidy + recomposition — no new net cost.',w:'Enrollment mandatory but no separate deduction — do not double-charge.'},
{c:'tax',t:'SIPP',d:'The online employer portal for BPJS Ketenagakerjaan.',w:'Where monthly BPJS-TK movements and contribution reports are filed.'},
{c:'tax',t:'EDABU',d:'BPJS Kesehatan employer portal for managing JKN membership + family data.',w:'Keep employee + dependent data synced here for valid coverage.'},
{c:'entity',t:'PT',d:'The standard Indonesian LLC (Law 40/2007) — RUPS, Directors, Commissioners; limited liability.',w:'The base vehicle — a locally-owned EOR uses a plain PT.'},
{c:'entity',t:'PT PMA',d:'A PT with any foreign shareholding; always classified large-scale.',w:'The vehicle a foreign founder needs — triggers LKPM + the IDR 10bn investment-plan norm.',s:'https://ssek.com/blog/setting-up-a-foreign-owned-outsourcing-company-in-indonesia/'},
{c:'entity',t:'PMA',d:'The legal category of foreign direct investment (Law 25/2007).',w:'Determines whether the EOR is foreign-investment-regulated (LKPM, min-capital, positive-list).'},
{c:'entity',t:'Akta Pendirian',d:'The notarized founding deed with the articles of association, filed to Kemenkumham.',w:'Step 1 — the KBLI codes chosen here define what the entity may legally do.'},
{c:'entity',t:'Kemenkumham / AHU',d:'The ministry (and its online system) that approves a company as a legal entity (~1–2 days).',w:'Turns the EOR from a deed into a legal person that can sign contracts + hold licences.'},
{c:'entity',t:'SK Pengesahan',d:'The ministerial decree confirming the PT is approved and registered.',w:'Proof of legal existence — needed for bank accounts, OSS, client due diligence.'},
{c:'entity',t:'KBLI (esp. 78101/78300)',d:'The 5-digit business-activity code in OSS setting licensing, risk tier and foreign-ownership eligibility.',w:'⚠ A PMA EOR likely uses 78101 (labour placement) and/or 78300 (HR provision) — NOT 78200. Re-verify under KBLI 2025.',s:'https://ssek.com/blog/setting-up-a-foreign-owned-outsourcing-company-in-indonesia/'},
{c:'entity',t:'OSS / OSS-RBA',d:'Indonesia centralized electronic business-licensing platform; requirements scale with risk tier.',w:'Every EOR licence flows through OSS.'},
{c:'entity',t:'NIB',d:'The foundational single business ID issued via OSS (replaces TDP, API, customs NIK).',w:'No NIB, no legal operation. For low-risk 78300 the NIB alone may suffice.'},
{c:'entity',t:'Izin Usaha',d:'The operating licence; under OSS-RBA the tier depends on risk.',w:'For 78101 a verified Standard Certificate from the Ministry of Manpower is required.'},
{c:'entity',t:'WLKP',d:'Mandatory company manpower report via SISNAKER — within 30 days of operating, and annually.',w:'The EOR employs the workers, so it carries the WLKP obligation for the whole workforce.'},
{c:'entity',t:'SISNAKER',d:'The Ministry of Manpower integrated online system (WLKP, foreign-worker services).',w:'The EOR day-to-day manpower compliance surface.'},
{c:'entity',t:'KITAS',d:'Limited-stay permit for foreigners; work KITAS needs a contract, RPTKA, sponsor + DKP-TKA levy.',w:'Sponsoring KITAS for clients foreign hires is a flagship EOR service. ⚠ Biometric registration from Jun 2025.'},
{c:'entity',t:'LKPM',d:'Quarterly investment-activity report every PT PMA files via OSS.',w:'⚠ A permanent quarterly obligation; 4 idle quarters auto-trigger sanctions (BKPM Reg 5/2025).'},
{c:'entity',t:'RUPS',d:'General meeting of shareholders; annual (within 6 months of year-end) + extraordinary.',w:'Governs capital increases, director changes, major decisions.'},
{c:'entity',t:'Modal disetor (paid-up capital)',d:'Capital deposited into the company. PMA: investment plan >IDR 10bn/KBLI/location; min paid-up IDR 2.5bn.',w:'⚠ The up-front cash barrier dropped to IDR 2.5bn (BKPM Reg 5/2025, Oct 2025).',s:'https://sasbali.com/bkpm-regulation-no-5-of-2025-new-pt-pma-capital-rules-explained/'},
{c:'entity',t:'Positive Investment List (DNI)',d:'Perpres 10/2021 list of open/conditional sectors that replaced the old Negative List.',w:'Confirms labour supply (78101/78300) is open to foreign ownership.'},
{c:'entity',t:'PJP',d:'Payment Service Provider licensed by Bank Indonesia.',w:'Running payroll through a bank does not need a PJP licence — but holding/transmitting client funds at scale might.'},
{c:'docs',t:'KTP',d:'The Indonesian resident ID card carrying the 16-digit NIK.',w:'The primary onboarding identity doc; its NIK doubles as the tax ID and must be validated in Coretax.'},
{c:'docs',t:'KK (Kartu Keluarga)',d:'The official household/family registration card.',w:'Verifies dependents for PTKP and enrols family in BPJS Kesehatan.'},
{c:'docs',t:'NPWP card',d:'The taxpayer-registration card showing the NPWP.',w:'For residents this is now effectively the NIK/KTP after integration.'},
{c:'docs',t:'Ijazah',d:'Formal proof of education/qualifications.',w:'Collected for role verification and, for RPTKA/KITAS roles, as a required document.'},
{c:'docs',t:'Slip gaji (payslip)',d:'The per-cycle statement of gross pay, deductions and net.',w:'The employee-facing output of gross-to-net; doubles as evidence of correct pay — and enables KPR mortgage applications.'},
{c:'docs',t:'Surat keterangan kerja',d:'An employment-verification letter (role, tenure).',w:'The EOR issues these (for bank, visa, credit) — requests route to the EOR, not the client.'},
{c:'docs',t:'Surat Pemberitahuan PHK',d:'The formal written notice of termination.',w:'A required dated artifact in the PHK process; part of the evidence pack if contested.'}
];
const GCATS={biz:'EOR business terms',contract:'Contract-stack terms',law:'Employment law',tax:'Tax & statutory',entity:'Entity & licensing',docs:'Documents & IDs'};
SUB['glossary/biz']=()=>`<div style="position:sticky;top:112px;z-index:20;background:linear-gradient(180deg,rgba(8,8,13,.9),rgba(8,8,13,.6));padding:8px 0"><input id="gsearch" type="text" placeholder="🔍 Search all ${GLOSSARY.length} terms…" oninput="glossaryFilter(this.value)" style="width:100%;padding:11px 14px;border:1px solid var(--gline);border-radius:12px;background:rgba(255,255,255,.06);color:var(--text);font-size:15px;font-family:inherit"></div>${GLOSSARY.filter(t=>t.c==='biz').map(gcard).join('')}`;
SUB['glossary/contract']=()=>GLOSSARY.filter(t=>t.c==='contract').map(gcard).join('');
SUB['glossary/law']=()=>GLOSSARY.filter(t=>t.c==='law').map(gcard).join('');
SUB['glossary/tax']=()=>GLOSSARY.filter(t=>t.c==='tax').map(gcard).join('');
SUB['glossary/entity']=()=>GLOSSARY.filter(t=>t.c==='entity').map(gcard).join('');
SUB['glossary/docs']=()=>GLOSSARY.filter(t=>t.c==='docs').map(gcard).join('');

/*__CONTENT__*/

/* ================= ROUTER BOOT ================= */
window.addEventListener('hashchange',()=>{const [mod,sub]=location.hash.slice(1).split('/');if(MODS.find(m=>m.id===mod))go(mod,sub);});
let bootTries=0;const boot=setInterval(()=>{bootTries++;if(window.Chart||bootTries>60){clearInterval(boot);const [mod,sub]=location.hash.slice(1).split('/');go(MODS.find(m=>m.id===mod)?mod:'home',sub);}},70);
renderNav();refreshProgress();
</script>
