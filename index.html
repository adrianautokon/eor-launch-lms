SUB['compliance/pph']=()=>`
<p>Since Jan 2024, monthly PPh 21 uses the <b>TER</b> (average effective rate) method: <b>TER rate × monthly gross</b> for Jan–Nov, where the rate comes from the employee's PTKP-status category (A/B/C) and income band. December reverts to the annual progressive scale (5%–35%) and trues up (the "rekonsiliasi Desember"). Everything files through <b>Coretax</b> (live since Jan 2025) via e-Bupot 21 + SPT Masa, with Form 1721-A1 issued annually.</p>
<div class="callout blue"><b>Why this is a moat, not a chore</b><p>Coretax's 2025 rollout was rocky and the TER method is unintuitive. A corridor-native operator who runs this flawlessly, monthly, is selling exactly the competence that terrifies a foreign employer. This is the "intelligence work" AI runs behind the scenes.</p></div>
${vid('https://www.youtube.com/watch?v=iaG4cW4h4oU','Cara Menghitung & Lapor SPT PPh 21 Coretax 2025','YouTube · the TER method + bukti potong in Coretax')}
${vid('https://www.youtube.com/watch?v=vQihzAw_GdQ','Kelas Pajak — Perhitungan & Pelaporan PPh 21 dengan TER','YouTube · a deeper class on TER + reporting')}
${res('https://pajak.go.id/en/withholding-article-21-tax','Primary','DJP — Withholding Article 21 Tax','The tax authority\'s own source on PPh 21.')}
${res('https://recruitgo.com/indonesia-income-tax-calculator/','Tool','RecruitGo — Indonesia income-tax (TER) calculator','Cross-check our calculator against a live one.')}`;
SUB['compliance/thr']=()=>`
<p><b>THR</b> (Tunjangan Hari Raya) is a mandatory religious-holiday allowance: one month's salary for ≥12 months' service (pro-rata for 1–&lt;12 months), paid <b>at least 7 days before</b> the holiday. Both PKWT and PKWTT qualify from ≥1 month's service. Late payment = a 5% fine (Permenaker 6/2016) plus an administrative sanction ladder.</p>
<div class="worked"><div class="wt">Worked example · 2026</div><div class="wl"><span>Idul Fitri 1447H</span><span>Sat 21 / Sun 22 March 2026</span></div><div class="wl"><span>THR deadline</span><span>14 March 2026</span></div><div class="wl"><span>Employee, 8 months' service, gross Rp10M</span><span>pro-rata</span></div><div class="wl tot"><span>THR owed = 8/12 × Rp10M</span><span>Rp6,666,667</span></div></div>
<p class="mini">Budget it as ~8.3% on top of annual payroll — it's effectively a 13th month.</p>`;
SUB['compliance/sev']=()=>`
<p>Termination is the highest-risk stage because severance is generous, formula-driven, and disputes go to a labour court — and <b>our PT pays it</b>. Three components under PP 35/2021, all on a wage base of basic + fixed allowances.</p>
<div class="grid2"><div><h4>UP — Uang Pesangon (× wage)</h4><div class="tablewrap"><table><tr><th>Service</th><th>UP</th><th>Service</th><th>UP</th></tr><tr><td>&lt;1 yr</td><td>1</td><td>4–&lt;5</td><td>5</td></tr><tr><td>1–&lt;2</td><td>2</td><td>5–&lt;6</td><td>6</td></tr><tr><td>2–&lt;3</td><td>3</td><td>6–&lt;7</td><td>7</td></tr><tr><td>3–&lt;4</td><td>4</td><td>≥8 yr</td><td>9 (cap)</td></tr></table></div></div>
<div><h4>UPMK — service pay (from ≥3 yr)</h4><div class="tablewrap"><table><tr><th>Service</th><th>UPMK</th><th>Service</th><th>UPMK</th></tr><tr><td>3–&lt;6</td><td>2</td><td>15–&lt;18</td><td>6</td></tr><tr><td>6–&lt;9</td><td>3</td><td>18–&lt;21</td><td>7</td></tr><tr><td>9–&lt;12</td><td>4</td><td>≥24 yr</td><td>10</td></tr><tr><td>12–&lt;15</td><td>5</td><td></td><td></td></tr></table></div></div></div>
<p class="mini">Multipliers on UP & UPMK vary by ground: 0× (resignation, urgent misconduct) → 0.5× (efficiency due to losses) → 1× (standard) → 1.75× (retirement) → 2× (death / prolonged illness). <b>UPH</b> (unused leave + relocation) always adds on top.</p>
<div class="worked"><div class="wt">Worked example</div><div class="wl"><span>5-year employee, "efficiency due to losses"</span><span>0.5× UP + 1× UPMK</span></div><div class="wl"><span>UP = 0.5 × 6 months</span><span>3.0 months</span></div><div class="wl"><span>UPMK = 1 × 2 months</span><span>2.0 months</span></div><div class="wl tot"><span>≈ severance owed (+ UPH)</span><span>~5 months' wage</span></div></div>
<div class="flag">This is why the deposit/pre-funding policy is non-negotiable: if a client stops paying mid-employment, our PT still owes this. Client credit risk and severance math are the same risk.</div>
${res('https://www.hukumonline.com/klinik/a/cara-hitung-pesangon-lt515b7ec90fe0c/','Primary','Hukumonline — how to calculate severance (2026)','The go-to legal reference on the pesangon calculation.')}
${res('https://recruitgo.com/calculators/indonesia-severance-calculator/','Tool','RecruitGo — Indonesia severance calculator (PP 35/2021)','A live calculator to sanity-check a case.')}`;

/* ===== 9 · UNIT ECONOMICS ===== */
SUB['econ/pl']=()=>`
<p class="lead">This is a service business — Dickson funds ops, not just software. So the model is an <b>ops P&L</b>, not a SaaS P&L. But the margin structure is software-like once the entity's fixed cost is amortised.</p>
<div class="tablewrap"><table><tr><th>Driver</th><th>Reality</th></tr>
<tr><td>Headline fee</td><td>Only ~40–60% of true cost; the rest is employer contributions, benefits admin, FX, setup/termination fees, deposits</td></tr>
<tr><td>Ops labour</td><td>The 1:100–200 payroll ratio; below a threshold a client eats more attention than its fee covers</td></tr>
<tr><td>Fixed-cost amortisation</td><td>The single biggest margin lever: load many employees onto the one maintained entity</td></tr>
<tr><td>Where margin hides</td><td>FX spread (1–3% over mid-market — see Payments), benefits markup (5–15%), float on deposits</td></tr></table></div>
<div class="chartbox"><h4>Gross margin climbs toward ~75–80%</h4><canvas id="ch_margin"></canvas><div class="src">AI absorbs the per-employee work; humans touch only approval + exceptions.</div></div><div class="callout green"><b>The benchmark</b><p>Deel runs <b>~85% gross margins</b> at $1.4B ARR, and <b>25–30% of its revenue is fintech/FX</b> (payment services + FX spread), moving &gt;$2B/mo. That FX line is why an Airwallex-underneath model matters — it's a real profit line, not a cost.</p></div>
${res('https://sacra.com/c/deel/','Analysis','Sacra — Deel revenue, funding & unit economics','The single best doc on EOR economics: 85% GM, the FX-margin model, vertical integration.')}`;
SUB['econ/be']=()=>`<div class="chartbox"><h4>Break-even ≈ 25 employees</h4><canvas id="ch_be"></canvas><div class="src">$179/emp fee · fixed ~$3.5k/mo · +1 Jakarta admin (~$800/mo) per 75 emp · ~$12/emp variable. ~8–12 clients.</div></div>
<p>The fixed base (a lean PT + 1–2 ops staff + tooling) is covered at roughly 25 employees on platform. Everything above that is high-margin because the marginal cost to add an employee is small — AI-prepped registers and one amortised entity.</p>`;
SUB['econ/staff']=()=>`<div class="chartbox"><h4>Staffing steps, it doesn't scale linearly</h4><canvas id="ch_staff"></canvas><div class="src">AI-prepped registers/filings let 1 admin run ~75 employees vs ~25–30 in a manual shop.</div></div>
<p>Humans step in at approval and exception points, not per-employee. This is the operational shape of the services-as-software thesis: automate the intelligence work, keep humans exactly where liability and judgement live.</p>`;
SUB['econ/setupcap']=()=>`<div class="chartbox"><h4>Setup capital ≈ $33k</h4><canvas id="ch_setup"></canvas><div class="src">The actual cheques to launch. Working capital is negative thereafter — clients pre-fund salary + fee.</div></div>
<p>~$33k gets the entity, licences, a legal opinion, ~3 months of ops runway and a working-capital buffer. Modest for a business with negative working capital and 75–85% gross margins at scale.</p>`;
SUB['econ/mvc']=()=>`
<div class="callout"><b>Veri's hardest lesson: "I said no to a client whose volume was too low — servicing them cost more than they paid."</b><p>Signals converge: EOR is economical up to ~10 employees/country; a flat setup fee adds ~21% to first-month cost on a 1-person deal; volume discounts only trigger at 20+ heads. <b>There is a client size below which serving well loses money — so "who we say no to" is a design decision, not a failure.</b></p></div>
<p>Our pricing floor and minimum seat count fall out of this. It's also the sharpest question to put to Veri (RainTech) in primary research: <i>where exactly was your line?</i></p>`;
SUB['econ/calc']=()=>`

/* ===== 10 · PAYMENTS (Airwallex) ===== */
SUB['pay/flow']=()=>`
<p class="lead">The global model needs a global collection rail. Clients pay in their own currency; workers and statutory bodies must be paid in IDR. Airwallex is the spine that connects the two — collect anywhere, convert, pay Indonesia.</p>
<div class="moneyflow">
${[['1','Global client pays','In their currency (USD/GBP/EUR/AUD/SGD) — bank transfer to your local Global Account, or card/local method via a payment link'],['2','Airwallex Global Account','Receive "as a local", low/no incoming fee. The float sits here — you choose when to convert'],['3','Convert to IDR','Inside the wallet, at ~0.5% over interbank. This is where the FX margin is captured'],['4','Payout to the PT','Local IDR rail, free, full amount, to your Indonesian PT bank account'],['5','PT runs local payroll','Net salary to workers + BPJS Kesehatan/Ketenagakerjaan + PPh 21 via Coretax']].map(s=>`<div class="mfstep"><div class="mfn">${s[0]}</div><div><div class="mft">${s[1]}</div><div class="mfd">${s[2]}</div></div></div>`).join('')}</div>
<div class="flag">⚠ Indonesia has BI rules on recurring foreign-currency → IDR conversion. The clean structure — collect abroad, convert, land IDR into your <i>own</i> PT account, pay domestically — needs a local tax/FX advisor to confirm documentation before scaling.</div>`;
SUB['pay/aw']=()=>`
<p>What Airwallex actually gives you:</p>
<div class="tablewrap"><table><tr><th>Product</th><th>What it does</th></tr>
<tr><td>Global Accounts</td><td>Local-currency accounts in your name (real local account numbers) so clients pay you as a local in USD/GBP/EUR/AUD/SGD</td></tr>
<tr><td>Multi-currency wallet</td><td>Hold 20+ currencies, convert on demand, pay out from one balance</td></tr>
<tr><td>Global payouts</td><td>Send in 60+ currencies to 200+ countries via local rails — including IDR to Indonesia</td></tr>
<tr><td>Payment links / invoicing</td><td>No storefront needed — share a link/QR on invoices; accepts cards + 160+ local methods</td></tr>
<tr><td>API / embedded finance</td><td>Accept in 180+ countries, pay 200+, issue cards in 60+; embed the whole rail later</td></tr></table></div>
<div class="callout blue"><b>The Indonesia signal</b><p>Airwallex acquired majority ownership of <b>PT Skye Sab Indonesia</b>, holder of a <b>PJP Category 1</b> licence (the widest digital-payments category) — announced 8 Jan 2026. A licensed local entity in Indonesia is rare for a foreign PSP and de-risks IDR payout materially.</p></div>
${vid('https://www.youtube.com/watch?v=puq7nXoiEgE','Airwallex Tutorial for Beginners — Setup, Deposit, FX, Withdraw','YouTube · the end-to-end account tour')}
${res('https://www.airwallex.com/us/business-account/global-accounts','Product','Airwallex — Global Accounts','Local-currency collection accounts in your name.')}`;
SUB['pay/compare']=()=>`
<div class="tablewrap"><table><tr><th>Rail</th><th>Best for</th><th>Verdict for "collect globally, pay IDR"</th></tr>
<tr><td><b>Airwallex</b></td><td>Global collection + hold + IDR payout + API</td><td><span class="pill win">Best overall</span> IDR payout, own ID licence, embeddable, lowest FX (~0.5%)</td></tr>
<tr><td>Wise Business</td><td>Simplicity, transparency</td><td>Great cheap backup ($31 setup; ~0.57% transfers); thinner embedded story</td></tr>
<tr><td>Aspire</td><td>SEA SME expense mgmt</td><td>Complementary — but local receiving is SGD/USD/EUR/GBP, ⚠ not IDR receiving</td></tr>
<tr><td>Payoneer</td><td>Marketplace payouts</td><td>Highest card fees (up to 3.99%); not for EOR client billing</td></tr></table></div>
<p><b>Recommendation:</b> Airwallex primary, Wise Business as redundancy. Confirm two things with Airwallex sales before modelling margin: the exotic-currency FX spread, and whether a small (~0.3%) inbound fee applies to transfers from third-party (non-owner) accounts — which directly affects an EOR collecting from clients.</p>
${res('https://statrys.com/sg/reviews/airwallex-vs-aspire-app','Compare','Statrys — Airwallex vs Aspire','Independent side-by-side for the SEA use case.')}
${res('https://truescho.com/en/blog/airwallex-vs-wise-vs-payoneer-2026','Compare','Airwallex vs Wise vs Payoneer (2026)','Fees and best-fit across the three rails.')}`;
SUB['pay/margin']=()=>`
<p>FX isn't just a cost — run correctly it's a profit line, exactly as Deel does it.</p>
<div class="grid3"><div class="stat gold"><div class="v">~0.5%</div><div class="k">Airwallex FX over interbank (major pairs)</div></div><div class="stat green"><div class="v">1–3%</div><div class="k">what EORs typically charge clients on FX</div></div><div class="stat blue"><div class="v">25–30%</div><div class="k">of Deel's revenue is fintech/FX</div></div></div>
<p>If Airwallex converts at ~0.5% and you quote the client a transparent ~1.5–2% all-in FX, the spread is margin on every payroll cycle — on top of the platform fee. On a $50k salary a 2% margin ≈ $1,000/yr; across a book of employees it compounds into a second revenue line. Plus the float between receipt and conversion.</p>
<div class="callout"><b>Do it honestly</b><p>Transparent FX is also a wedge against Deel's hidden 0.6–2% markup. Quote one clear all-in rate, capture the spread openly, and it becomes a feature ("no surprise FX") rather than the complaint it is for the incumbents.</p></div>`;

/* ===== 11 · QUALITY, RISK & CONTROLS ===== */
SUB['quality/modes']=()=>`
<p class="lead">Quality in payroll has a precise meaning: <b>accurate, on-time, compliant, every single cycle</b>. Here's where the as-is breaks and who's on the hook.</p>
<div class="tablewrap"><table><tr><th>Failure mode</th><th>Who's on the hook</th></tr>
<tr><td>Misclassification (employee treated as contractor)</td><td>The client + the EOR; willful penalties + back-contributions ($40B class-action settlements in 2024)</td></tr>
<tr><td>Permanent establishment</td><td>The client — a worker with signing authority can create a taxable presence even via an EOR</td></tr>
<tr><td>Payroll errors</td><td>The employer — bears liability even when a processor caused it</td></tr>
<tr><td>Late statutory filing</td><td>The EOR — automatic BPJS/tax penalties; coverage suspension</td></tr>
<tr><td>Botched termination</td><td>The EOR (our PT) — wrongful-termination exposure; contested if client ignored advice</td></tr>
<tr><td>Data protection</td><td>Both — payroll data is personal data (Indonesia PDP; GDPR if EU workers)</td></tr></table></div>`;
SUB['quality/nums']=()=>`
<p>The numbers that make getting this right worth it:</p>
<div class="grid3"><div class="stat red"><div class="v">~$291</div><div class="k">cost of a single payroll error (EY)</div></div><div class="stat gold"><div class="v">40%</div><div class="k">of errors trace to manual data entry</div></div><div class="stat blue"><div class="v">80%</div><div class="k">first caught by the employee, not the system</div></div>
<div class="stat red"><div class="v">49%</div><div class="k">of employees job-hunt after just two payroll mistakes</div></div><div class="stat green"><div class="v">99.9%</div><div class="k">on-time-accurate = industry SLA norm (APAC self-reports ~69%)</div></div><div class="stat green"><div class="v">&lt;1%</div><div class="k">error rate automation typically achieves</div></div></div>
<p>Every one of these is an argument for the AI-in-the-process model — and for the human sign-off layer that catches the 40% manual-entry errors before the employee does.</p>`;
SUB['quality/ctrl']=()=>`
<div class="tablewrap"><table><tr><th>Control</th><th>What it does</th></tr>
<tr><td>Maker-checker (four-eyes)</td><td>Every sensitive op split into initiate + independent approve; disbursement locked until the chain completes</td></tr>
<tr><td>Audit trail</td><td>Tamper-proof read-only logs (user, timestamp, IP) — our AutoKon evidence-pack DNA, applied to payroll</td></tr>
<tr><td>Pre-funding / deposit</td><td>Never float payroll; client funds 5–7 business days before payday; a small deposit covers termination exposure</td></tr>
<tr><td>Insurance</td><td>Professional-error cover + EPLI (wrongful termination / discrimination)</td></tr>
<tr><td>Segregation of duties</td><td>HR adds → Payroll calculates → Finance releases; no one owns the whole chain</td></tr></table></div>
<p>The monthly compliance evidence pack — proof of every filing — is both a control and a product. It's the artefact none of the competitors package, and it's the thing that earns a nervous foreign employer's trust.</p>`;
SUB['quality/seam']=()=>`
<div class="callout blue"><b>The honest read — and the seam a future to-be closes</b><p>The small owned-entity EOR wins on <b>trust and local depth</b> (a named human, in timezone) but is structurally exposed on <b>consistency and reliability</b> — spreadsheets, manual portal entry, one or two people holding deadlines in their heads. The Deel-class platform is the inverse: reliable at scale, impersonal, priced for it. That tension — local trust vs platform reliability — is exactly where AI-in-the-process earns its place: keep the named human and the trust, remove the spreadsheet fragility. We name it here; we build it later.</p></div>`;

/* ===== 12 · GO-TO-MARKET ===== */
SUB['gtm/icp']=()=>`
<p class="lead">Global from day one, focused on advanced markets. The buyer is an SME or startup in the US/UK/EU/AU/SG that needs 1–20 Indonesian remote people and can't (or shouldn't) open a local entity for that.</p>
<div class="grid2"><div class="card"><h4 style="margin-top:0">Who fits</h4><p class="mini">Startups & SMEs hiring engineering, design, data, finance/back-office, or async support; already tempted to hire in Indonesia (or already paying contractors there); value speed + compliance over a big brand.</p></div>
<div class="card"><h4 style="margin-top:0">Who doesn't (yet)</h4><p class="mini">Large enterprises with procurement (Deel/Atlas territory); US-realtime voice roles (timezone); companies wanting 50+ hires in one go (entity math flips).</p></div></div>
<p>Lead with the buyer's problem — compliant Indonesia hiring, severance/PE risk removed — not with "we're an EOR." Speed, compliance, and no-entity risk removal are the three messages that convert.</p>
${res('https://www.smallbizviewpoints.com/2025/04/30/go-global-stay-lean-how-eor-services-help-startups-hire-fast-smart/','Article','"Go Global, Stay Lean" — how EOR helps startups hire fast','The ICP narrative in the buyer\'s own words.')}`;
SUB['gtm/pseo']=()=>`
<p>The #1 growth engine the category leaders used, and the one a two-person team can actually run: <b>programmatic SEO</b> — a repeatable keyword pattern × a structured dataset × a template, generating hundreds of intent pages. Wise runs 3,000+; Deel/Remote/Oyster built thousands of "hire in [country]" pages.</p>
<div class="callout green"><b>Our unfair advantage here</b><p>We own a topic cluster the generalists cover shallowly: "hire in Indonesia / Indonesia EOR / Indonesia payroll / BPJS / PPh 21 / severance / THR." We have genuine local depth (this whole OS is the raw material). Rank for the buyer's exact question, then convert with the evidence-pack + named-human wedge.</p></div>
<p>Pair it with inbound content (inbound leads cost ~61% less than outbound) and partnerships (recruiting agencies, dev shops, VC portfolios hiring in SEA). Outbound and communities fill the gaps.</p>
${res('https://www.omnius.so/blog/programmatic-seo-case-study','Case study','Programmatic SEO — 67 → 2,100 signups','The exact growth motion, worked end to end.')}
${res('https://sacra.com/c/deel/','Analysis','Sacra — Deel','How the leader compounded distribution + FX margin.')}`;
SUB['gtm/wedges']=()=>`
<p>Three conversion motions, not one market. The sharpest insight from the whole build: the real competitor isn't Deel — it's the <b>$0 status quo</b>. So the primary motion is conversion, not net-new education.</p>
<div class="grid3">
<div class="card"><h4 style="margin-top:0">💸 Contractor conversion</h4><p class="mini">Target advanced-market companies already paying Indonesians via Wise/Airwallex. Pitch retention + risk removal to the employer; BPJS/THR/payslips-for-KPR to the worker. Latent demand → active.</p></div>
<div class="card"><h4 style="margin-top:0">🎯 The returnee trigger</h4><p class="mini">Indonesians on work passes abroad who move home. Their employer already trusts them and wants to keep them — the highest-intent EOR moment there is. Nobody markets to it.</p></div>
<div class="card"><h4 style="margin-top:0">🏗️ Role-vertical landing pages</h4><p class="mini">"Your Indonesian engineering / design / finance team, employed properly." Programmatic pages per role × per buyer country — the SEO engine made concrete.</p></div></div>
<div class="callout green"><b>The reframe that de-risks everything</b><p>Sell the concrete pain, not the category (Veri's #1 lesson). Not "do you want an EOR" but "keep your best Indonesian people, compliantly, for less than you think." Employee-side pull (BPJS, THR, payslips → KPR eligibility) is a channel no competitor uses.</p></div>`;
SUB['gtm/pricing']=()=>`
<div class="tablewrap"><table><tr><th>Lever</th><th>Position</th></tr>
<tr><td>Headline fee</td><td>~$149–199 flat, transparent, no hidden-deposit surprise (vs Deel $599 + FX + deposit)</td></tr>
<tr><td>FX</td><td>One clear all-in rate (~1.5–2%), spread captured openly — a feature vs incumbents' hidden markup</td></tr>
<tr><td>Deposit</td><td>Small + insured — <b>never</b> zero (our PT eats PKWTT severance if a client stops paying)</td></tr>
<tr><td>Minimum</td><td>A floor seat count per client, set by the min-viable-client math — saying no is discipline</td></tr>
<tr><td>Expansion</td><td>Benefits upsell, FX, devices/coworking; later, wholesale "powered-by-us" to resellers (the Aspire model, inverted)</td></tr></table></div>`;
SUB['gtm/check']=()=>{const items=['Build the "hire in Indonesia" programmatic-SEO page set (role × country)','Draft the contractor-conversion outbound list (advanced-market cos paying ID contractors)','Draft the returnee-trigger landing page','Stand up the Airwallex collection account + transparent FX quote','Run 20 discovery interviews across US/UK/EU/AU/SG','Set price point ($149 / $179 / $199) + minimum seat count','Set deposit posture (small + insured — never zero)','Interview Veri / RainTech (the operator)'];
 return `<ul class="check" data-mod="gtm">${items.map((t,i)=>`<li class="${checked('gtm',i)?'on':''}" onclick="toggleCheck('gtm',${i});this.classList.toggle('on')"><span class="box">✓</span><span class="txt">${t}</span></li>`).join('')}</ul>`;};
