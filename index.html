<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="EOR Launch OS — the operating system for launching an Employer-of-Record business in Indonesia. Investment case, operational reality, and execution plan in one place.">
<title>EOR Launch OS — Indonesia · Navv Studio</title>
<style>
:root{
  --bg:#08080d;
  --gold:#e0b84a;--gold2:#f0d68a;--golddim:#c8961e;
  --text:#f4f4f8;--text2:#b6b6c4;--muted:#8a8a98;
  --glass:rgba(255,255,255,.055);--glass2:rgba(255,255,255,.085);--gline:rgba(255,255,255,.10);
  --blur:18px;
  --green:#34d399;--greenbg:rgba(52,211,153,.12);--greenink:#6ee7b7;
  --red:#fb7185;--redbg:rgba(251,113,133,.12);--redink:#fda4af;
  --amber:#fbbf24;--amberbg:rgba(251,191,36,.12);--amberink:#fcd34d;
  --blue:#7aa2ff;--bluebg:rgba(122,162,255,.12);--blueink:#a9c1ff;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--text);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(1100px 620px at 12% -8%, rgba(224,184,74,.16), transparent 58%),
    radial-gradient(1000px 720px at 104% -4%, rgba(90,120,220,.14), transparent 55%),
    radial-gradient(900px 900px at 50% 120%, rgba(224,184,74,.06), transparent 60%),
    var(--bg);
  background-attachment:fixed;min-height:100vh;}
a{color:var(--blueink);text-decoration:none;}
a:hover{text-decoration:underline;cursor:pointer;}

/* Accessible focus + reduced motion */
:focus-visible{outline:2px solid var(--gold2);outline-offset:2px;border-radius:8px;}
.navlink:focus-visible,.check li:focus-visible,.videocard:focus-visible,.tab:focus-visible,.btn:focus-visible,.chip:focus-visible{outline:2px solid var(--gold2);outline-offset:2px;}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}
}

.app{display:grid;grid-template-columns:274px 1fr;min-height:100vh;}

/* SIDEBAR — glass */
.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;padding:0;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  backdrop-filter:blur(26px) saturate(1.4);-webkit-backdrop-filter:blur(26px) saturate(1.4);
  border-right:1px solid var(--gline);}
.sidebar::-webkit-scrollbar{width:8px;}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:9px;}
.brand{padding:24px 22px 18px;border-bottom:1px solid var(--gline);}
.brand .logo{display:flex;align-items:center;gap:12px;}
.brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--golddim),var(--gold2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#1a1a13;font-size:18px;box-shadow:0 6px 18px rgba(224,184,74,.35),inset 0 1px 0 rgba(255,255,255,.4);}
.brand h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.brand .tagline{font-size:11px;color:var(--muted);margin-top:2px;}
.progwrap{padding:18px 22px;border-bottom:1px solid var(--gline);}
.progrow{display:flex;align-items:center;gap:14px;}
.ring{width:50px;height:50px;flex-shrink:0;filter:drop-shadow(0 4px 10px rgba(224,184,74,.3));}
.progmeta .n{font-size:20px;font-weight:750;color:#fff;line-height:1;}
.progmeta .l{font-size:11px;color:var(--text2);margin-top:3px;}
nav.modnav{padding:8px 0 40px;}
.navsec{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:16px 22px 6px;font-weight:700;}
.navlink{display:flex;align-items:center;gap:12px;padding:9px 18px 9px 19px;margin:1px 10px;border-radius:11px;font-size:13.5px;color:var(--text2);cursor:pointer;transition:.14s;}
.navlink:hover{background:var(--glass2);color:var(--text);}
.navlink.active{background:linear-gradient(135deg,rgba(224,184,74,.18),rgba(224,184,74,.06));color:#fff;box-shadow:inset 0 0 0 1px rgba(224,184,74,.28);}
.navlink .ix{width:23px;height:23px;border-radius:7px;background:var(--glass2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0;}
.navlink.active .ix{background:linear-gradient(135deg,var(--golddim),var(--gold2));color:#1a1a13;}
.navlink .done{margin-left:auto;color:var(--green);font-size:12px;opacity:0;}
.navlink.completed .done{opacity:1;}
.navlink.completed .ix{box-shadow:inset 0 0 0 1.5px rgba(52,211,153,.5);}
.navgroup{margin:1px 10px 4px;}
.navhead{width:100%;display:flex;align-items:center;gap:10px;padding:9px 9px;border:0;border-radius:11px;background:transparent;color:var(--text2);cursor:pointer;font:inherit;text-align:left;transition:.14s;}
.navhead:hover{background:var(--glass2);color:var(--text);}
.navhead.active{background:linear-gradient(135deg,rgba(224,184,74,.18),rgba(224,184,74,.06));color:#fff;box-shadow:inset 0 0 0 1px rgba(224,184,74,.28);}
.navhead .chev{margin-left:auto;color:var(--muted);transition:transform .16s;}
.navhead[aria-expanded="true"] .chev{transform:rotate(90deg);}
.navhead .count{font-size:10px;color:var(--muted);margin-left:4px;}
.navkids{display:none;margin:2px 0 7px 35px;border-left:1px solid var(--gline);padding-left:7px;}
.navgroup.open .navkids{display:block;}
.navchild{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;margin:1px 0;border-radius:9px;color:var(--muted);font-size:12.5px;cursor:pointer;border:0;background:transparent;text-align:left;font-family:inherit;}
.navchild:hover{background:var(--glass2);color:var(--text);}
.navchild.active{background:rgba(224,184,74,.12);color:#fff;}
.navchild.completed::after{content:'✓';margin-left:auto;color:var(--green);font-size:11px;}

/* MAIN */
.main{min-width:0;}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;padding:12px 40px;
  background:rgba(10,10,16,.55);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);
  border-bottom:1px solid var(--gline);}
.menubtn{display:none;align-items:center;justify-content:center;width:38px;height:34px;border-radius:10px;border:1px solid var(--gline);background:var(--glass);color:var(--text);cursor:pointer;flex-shrink:0;font-size:16px;padding:0;}
.menubtn:hover{background:var(--glass2);}
.topbar .crumb{font-size:12px;color:var(--muted);white-space:nowrap;}
.topbar .crumb b{color:var(--text);}
.tabbar{display:flex;gap:6px;margin-left:6px;flex-wrap:wrap;}
.tab{font-size:12px;font-weight:600;color:var(--text2);padding:6px 13px;border-radius:99px;border:1px solid transparent;background:transparent;cursor:pointer;transition:.14s;font-family:inherit;}
.tab:hover{background:var(--glass2);color:var(--text);}
.tab.active{background:var(--glass2);color:#fff;border-color:var(--gline);box-shadow:inset 0 0 0 1px rgba(224,184,74,.25);}
.topbar .bar{margin-left:auto;width:150px;height:7px;background:rgba(255,255,255,.10);border-radius:99px;overflow:hidden;}
.topbar .bar span{display:block;height:100%;background:linear-gradient(90deg,var(--golddim),var(--gold2));width:0;transition:width .4s;}
.topbar .pct{font-size:12px;font-weight:700;color:var(--gold);min-width:34px;}
.content{padding:36px 40px 100px;max-width:1120px;}
section.view{animation:fade .34s cubic-bezier(.2,.7,.2,1);}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

.scrim{display:none;position:fixed;inset:0;z-index:55;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);}

.kick{font-size:11px;text-transform:uppercase;letter-spacing:1.6px;color:var(--gold);font-weight:700;margin-bottom:7px;}
h2.title{font-size:30px;font-weight:750;letter-spacing:-.6px;margin-bottom:10px;line-height:1.12;color:#fff;}
.sub{font-size:16px;color:var(--text2);max-width:780px;margin-bottom:8px;}
h3{font-size:19px;font-weight:700;margin:32px 0 12px;letter-spacing:-.3px;color:#fff;}
h4{font-size:14px;font-weight:700;margin:16px 0 6px;color:var(--text);}
p{margin-bottom:12px;max-width:840px;color:var(--text2);}
ul,ol{margin:0 0 14px 20px;max-width:840px;}
li{margin-bottom:6px;color:var(--text2);}
.lead{font-size:16px;color:var(--text);}
b,strong{color:var(--text);}
i{color:var(--text2);}

.card{background:var(--glass);border:1px solid var(--gline);border-radius:var(--radius);padding:20px 22px;margin:14px 0;
  backdrop-filter:blur(var(--blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--blur)) saturate(1.3);
  box-shadow:0 10px 34px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.06);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:1000px){.grid3,.grid4{grid-template-columns:1fr 1fr;}}

.stat{background:var(--glass);border:1px solid var(--gline);border-radius:14px;padding:17px 19px;
  backdrop-filter:blur(var(--blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--blur)) saturate(1.3);
  box-shadow:0 10px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);}
.stat .v{font-size:25px;font-weight:750;letter-spacing:-.6px;line-height:1;color:#fff;}
.stat .k{font-size:12px;color:var(--muted);margin-top:7px;}
.stat.gold .v{color:var(--gold2);}
.stat.green .v{color:var(--greenink);}
.stat.red .v{color:var(--redink);}
.stat.blue .v{color:var(--blueink);}

.callout{border-left:3px solid var(--gold);background:var(--amberbg);border-radius:0 14px 14px 0;padding:15px 19px;margin:14px 0;backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));}
.callout.red{border-color:var(--red);background:var(--redbg);}
.callout.green{border-color:var(--green);background:var(--greenbg);}
.callout.blue{border-color:var(--blue);background:var(--bluebg);}
.callout b:first-child{display:block;margin-bottom:3px;color:#fff;}
.callout p{margin:0;max-width:none;color:var(--text2);}

/* Guided 15-minute path */
.pathchips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center;}
.chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--text);padding:6px 12px;border-radius:99px;border:1px solid var(--gline);background:var(--glass2);cursor:pointer;transition:.14s;font-family:inherit;}
.chip:hover{border-color:rgba(224,184,74,.55);color:#fff;}
.chip .cn{font-size:10px;font-weight:800;color:var(--gold);}
.patharrow{color:var(--muted);font-size:12px;}

.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:12px 0;border-radius:14px;}
.tablewrap table{margin:0;}
table{width:100%;border-collapse:collapse;font-size:13px;margin:12px 0;background:rgba(255,255,255,.03);border:1px solid var(--gline);border-radius:14px;overflow:hidden;backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));}
th{background:rgba(255,255,255,.06);text-align:left;padding:10px 12px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);}
td{padding:10px 12px;border-top:1px solid var(--gline);vertical-align:top;color:var(--text2);}
tr:hover td{background:rgba(255,255,255,.04);}
.mono{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;color:var(--blueink);}

.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;margin:0 4px 4px 0;}
.pill.local{background:var(--amberbg);color:var(--amberink);}
.pill.deel{background:var(--bluebg);color:var(--blueink);}
.pill.risk{background:var(--redbg);color:var(--redink);}
.pill.why{background:var(--greenbg);color:var(--greenink);}
.pill.info{background:rgba(122,162,255,.14);color:var(--blueink);}
.pill.win{background:var(--greenbg);color:var(--greenink);}

.chartbox{background:var(--glass);border:1px solid var(--gline);border-radius:14px;padding:17px 19px;margin:14px 0;backdrop-filter:blur(var(--blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--blur)) saturate(1.3);box-shadow:0 10px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);}
.chartbox h4{margin-top:0;}
.chartbox canvas{display:block;width:100%;min-height:220px;}
canvas{max-width:100%;}
.src{font-size:11.5px;color:var(--muted);margin-top:8px;}
.src a{color:var(--text2);}

.check{list-style:none;margin:10px 0;padding:0;max-width:none;}
.check li{display:flex;gap:11px;align-items:flex-start;padding:11px 14px;border:1px solid var(--gline);border-radius:12px;margin-bottom:8px;background:var(--glass);cursor:pointer;transition:.14s;backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));}
.check li:hover{border-color:rgba(224,184,74,.5);background:var(--glass2);}
.check li .box{width:20px;height:20px;border:2px solid rgba(255,255,255,.28);border-radius:7px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#0a0a0f;transition:.14s;}
.check li.on .box{background:var(--green);border-color:var(--green);}
.check li.on .txt{color:var(--muted);text-decoration:line-through;}
.check .txt{font-size:13.5px;color:var(--text);}

.stage{border:1px solid var(--gline);border-radius:14px;margin:12px 0;overflow:hidden;background:var(--glass);backdrop-filter:blur(var(--blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--blur)) saturate(1.3);box-shadow:0 8px 26px rgba(0,0,0,.28);}
.stage-h{display:flex;align-items:center;gap:12px;padding:13px 16px;background:rgba(255,255,255,.05);border-bottom:1px solid var(--gline);}
.stage-h.warn{background:var(--amberbg);}.stage-h.danger{background:var(--redbg);}
.stage-n{width:29px;height:29px;border-radius:9px;background:rgba(255,255,255,.14);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.stage-h.warn .stage-n{background:var(--amber);color:#1a1508;}.stage-h.danger .stage-n{background:var(--red);color:#1a0508;}
.stage-t{font-size:15px;font-weight:700;color:#fff;}
.stage-b{padding:15px 16px;}
.stage-b p{color:var(--text2);}

.videocard{display:flex;gap:13px;align-items:center;padding:13px 15px;border:1px solid var(--gline);border-radius:12px;background:var(--glass);margin-bottom:9px;cursor:pointer;transition:.14s;backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));}
.videocard:hover{border-color:rgba(224,184,74,.45);background:var(--glass2);}
.videocard .play{width:40px;height:40px;border-radius:11px;background:var(--redbg);color:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.videocard .vt{font-size:13.5px;font-weight:600;color:var(--text);}
.videocard .vs{font-size:11.5px;color:var(--muted);}

.next{display:flex;justify-content:space-between;gap:12px;margin-top:38px;padding-top:22px;border-top:1px solid var(--gline);flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--gline);background:var(--glass);color:var(--text);transition:.14s;font-family:inherit;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.btn:hover{border-color:rgba(224,184,74,.5);background:var(--glass2);}
.btn.gold{background:linear-gradient(135deg,var(--golddim),var(--gold2));color:#1a1a13;border-color:transparent;box-shadow:0 6px 18px rgba(224,184,74,.32);}
.btn.gold:hover{filter:brightness(1.06);}
.btn.ghost{color:var(--muted);}

.calc{background:var(--glass);border:1px solid var(--gline);border-radius:16px;padding:20px 22px;backdrop-filter:blur(var(--blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--blur)) saturate(1.3);box-shadow:0 10px 30px rgba(0,0,0,.3);}
.calc label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin:12px 0 5px;}
.calc input,.calc select{width:100%;padding:11px 13px;border:1px solid var(--gline);border-radius:11px;font-size:15px;font-family:inherit;background:rgba(255,255,255,.06);color:var(--text);}
.calc input:focus,.calc select:focus{outline:none;border-color:rgba(224,184,74,.6);box-shadow:0 0 0 3px rgba(224,184,74,.18);}
.calc select option{background:#16161f;color:var(--text);}
.calc .out{margin-top:16px;border-top:1px dashed var(--gline);padding-top:14px;}
.calc .line{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0;color:var(--text2);}
.calc .line b{color:var(--text);}
.calc .line.tot{font-weight:750;font-size:16px;border-top:1px solid var(--gline);margin-top:6px;padding-top:10px;color:#fff;}
.calc .line .neg{color:var(--red);}
.calc .line .pos{color:var(--greenink);}
.tag{display:inline-block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:6px;background:rgba(224,184,74,.16);color:var(--gold2);}

.hero{background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border:1px solid var(--gline);border-radius:20px;padding:34px 34px;color:#fff;margin-bottom:22px;backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);box-shadow:0 20px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-40%;right:-10%;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(224,184,74,.28),transparent 68%);pointer-events:none;}
.hero .kick{color:var(--gold2);}
.hero h2{font-size:30px;font-weight:750;letter-spacing:-.7px;margin-bottom:12px;color:#fff;max-width:760px;position:relative;}
.hero p{color:var(--text2);max-width:740px;position:relative;}
.roadmap{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;}
.phase{flex:1;min-width:158px;background:var(--glass);border:1px solid var(--gline);border-radius:14px;padding:15px 17px;backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));box-shadow:0 8px 24px rgba(0,0,0,.26);}
.phase .ph{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);}
.phase .pt{font-size:14.5px;font-weight:700;margin:4px 0;color:#fff;}
.phase .pd{font-size:12px;color:var(--muted);}
.timeline{border-left:2px solid var(--gline);margin:14px 0 14px 8px;padding-left:22px;}
.timeline .tl{position:relative;padding-bottom:18px;}
.timeline .tl::before{content:'';position:absolute;left:-29px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--gold);border:2px solid var(--bg);box-shadow:0 0 0 3px rgba(224,184,74,.2);}
.timeline .tl .d{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;}
.timeline .tl .t{font-size:14px;font-weight:600;color:var(--text);}
.timeline .tl .x{font-size:12.5px;color:var(--muted);}
.mini{font-size:12.5px;color:var(--text2);margin-top:4px;}
.card ul.mini li,ul.mini li{color:var(--text2);}

/* ---- Responsive: real mobile nav (drawer) ---- */
@media(max-width:760px){
  .app{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:0;top:0;z-index:60;width:280px;max-width:86vw;height:100vh;transform:translateX(-100%);transition:transform .25s cubic-bezier(.2,.7,.2,1);}
  .sidebar.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.6);}
  .menubtn{display:inline-flex;}
  .tabbar{display:flex;margin-left:0;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;max-width:100%;}
  .tabbar .tab{flex:0 0 auto;}
  .topbar{gap:10px;}
  .grid2,.grid3,.grid4{grid-template-columns:1fr;}
  .content{padding:26px 18px 90px;}
  .topbar{padding:12px 18px;}
  h2.title{font-size:24px;}
  .hero{padding:26px 22px;}
  .hero h2{font-size:24px;}
}
</style>
</head>
<body>
<div class="scrim" id="scrim" onclick="closeNav()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar" aria-label="Module navigation">
    <div class="brand">
      <div class="logo"><div class="mark" aria-hidden="true">E</div><div><h1>EOR Launch OS</h1><div class="tagline">Indonesia · Navv Studio</div></div></div>
    </div>

C.opportunity = ()=>`
<div class="kick">The Case · 01</div><h2 class="title">The Opportunity</h2>
<p class="sub"><b>What you'll get:</b> why an EOR is the right autopilot business — framed by the thesis Kelly and Dickson bought into: Sequoia's "Services: The New Software." Sell the work, not the tool.</p>

<h3>The thesis in one line</h3>
<div class="callout"><b>"The next $1T company will be a software company masquerading as a services firm."</b><p>For every $1 spent on software, ~$6 is spent on services. AI has crossed the threshold on <i>intelligence</i> work (complex, but rule-bound); humans keep <i>judgement</i>. The higher the intelligence-ratio of a service, the sooner an "autopilot" wins it. — Julien Bek, Sequoia, Mar 2026.</p></div>

<div class="grid2">
  <div class="chartbox"><h4>Where the budget actually is</h4><canvas id="ch_budget" height="150"></canvas><div class="src">For every $1 of software spend, ~$6 of services spend. Autopilots capture the work budget from day one.</div></div>
  <div class="card"><h4 style="margin-top:0">Copilot vs Autopilot</h4>
  <p class="mini">A <b>copilot</b> sells the tool to the professional (Harvey → law firms). An <b>autopilot</b> sells the outcome to the end customer (Crosby → the company that needs the NDA). Autopilots capture the work budget from day one.</p>
  <p class="mini">An EOR is a pure autopilot: the client buys "an employed, compliant person in Indonesia," not payroll software. Payroll compliance is high-<i>intelligence</i> work — rule-dense, deadline-bound — which is exactly what AI runs well behind the scenes.</p></div>
</div>

<h3>Why EOR specifically</h3>
<ul>
  <li><b>Already 100% outsourced.</b> Sequoia's playbook says start where outsourcing already exists — the budget line exists, the buyer already buys an outcome, and replacing a vendor is a swap not a reorg. Every EOR client is buying an outcome by definition.</li>
  <li><b>A corridor we understand.</b> Singapore employers, Indonesian workers. Both founders already know the Indonesian employment stack (BPJS, PPh 21, THR, severance) — the painful part is the moat.</li>
  <li><b>Proven demand.</b> 8+ competitors already charge $166–599/employee/month in this exact corridor. We're not inventing a market; we're re-pricing and re-servicing it.</li>
  <li><b>Negative working capital.</b> Clients pre-fund salary + fee before we pay out. Structurally reliable payer — the opposite of the AutoKon late-payment pain.</li>
</ul>

<div class="callout green"><b>The AutoKon lessons, applied</b><p>Reliable payer (pre-funded) · short sales cycle (SG SME self-serve, not government/bank procurement) · no key-person tech risk (standard stack, ops runbooks) · proven demand (competitors already monetise it). This vertical is chosen <i>against</i> the exact pattern that hurt us before.</p></div>
`;

<p class="sub"><b>What you'll get:</b> where the as-is breaks, what it costs, and how serious operators control it. Dickson asked us to look hard at quality, consistency and reliability. In payroll these have a precise meaning: <b>accurate, on-time, compliant, every single cycle</b>.</p>

    <li><b>80%</b> are first caught by the employee, not the system.</li>
    <li><b>49%</b> of employees job-hunt after just <b>two</b> payroll mistakes.</li>
    <li><b>99.9%</b> on-time-accurate = industry SLA norm; APAC self-reports ~69%.</li>

<h3>The controls serious operators run</h3>
<table>
<tr><th>Control</th><th>What it does</th></tr>

`;

C['what-eor/definition'] = ()=>`
<div class="kick">The Machine · 5.1</div><h2 class="title">Definition + the one test</h2>
<p class="sub"><b>What you'll get:</b> the single question that resolves 90% of the "what even is an EOR" confusion.</p>
<div class="callout blue"><b>The one test that resolves 90% of the confusion</b><p>Does the client need to already own a local entity? <b>EOR = No</b> (the EOR lends you its entity). <b>PEO = Yes</b> (co-employment on top of your own entity). Everything else is detail. The market barely understands this — which is why definitional clarity is a <i>sales asset</i>, not just an internal doc.</p></div>
<p>An EOR is a legally-registered local company that becomes the <b>sole legal employer</b> of your worker in a country where you have no entity. You direct the work; the EOR holds the contract, runs payroll, remits taxes, provides statutory benefits, and carries the compliance liability.</p>
`;

<div class="kick">The Machine · 5.5</div><h2 class="title">Liability reality — the myths</h2>
<p class="sub"><b>What you'll get:</b> three vendor claims stated plainly, then corrected — so we never oversell what an EOR removes.</p>
<div class="callout red"><b>Myth 1: "An EOR removes all liability."</b><p>It absorbs and limits employment liability — it doesn't erase it. Contracts routinely cap the EOR's indemnity <b>at the fees paid</b>, and some exposures flow back to the client by agreement. "All liability gone" is marketing, not law.</p></div>
<div class="callout red"><b>Myth 2: "An EOR auto-removes permanent-establishment risk."</b><p>PE risk <b>survives</b>. A worker with signing authority or who habitually concludes contracts can still create a taxable presence <i>for the client</i>, regardless of who runs payroll. PMK 112/2025 narrowed the preparatory/auxiliary safe harbor from end-2025 — raising 2026 audit risk.</p></div>
<div class="callout red"><b>Myth 3: "Indemnity is unlimited."</b><p>Almost never. Read the cap. Misclassification exposure and back-contributions can also survive if the underlying relationship was mis-set-up. The EOR reduces and operationalises risk; it doesn't make it vanish.</p></div>
<div class="callout green"><b>Why honesty is a wedge</b><p>Competitors overclaim here. Stating the real limits — then packaging the evidence that we handled the controllable risk properly — is exactly the trust posture a corridor-native specialist can own.</p></div>

/* ---------------- CHART INITIALISERS (lazy, dark-themed) ---------------- */
const FX=16150;
const CHART_INSTANCES={};
function destroyRenderedCharts(){
  document.querySelectorAll('#content canvas[id]').forEach(el=>{
    if(CHART_INSTANCES[el.id]){
      CHART_INSTANCES[el.id].destroy();
      delete CHART_INSTANCES[el.id];
    }
  });
}
function makeChart(canvasId,config){
  const el=document.getElementById(canvasId);
  if(!el||!window.Chart) return;
  if(CHART_INSTANCES[canvasId]){
    CHART_INSTANCES[canvasId].destroy();
  }
  CHART_INSTANCES[canvasId]=new Chart(el,config);
}
function initCharts(id){
  if(!window.Chart) return;
  // Defer one frame so freshly-injected canvases are laid out before Chart.js
  // measures them — but never depend on rAF alone (it's throttled/suppressed in
  // background tabs and some embedded webviews). A timeout guarantees the draw
  // runs exactly once in every environment.
  let ran=false;
  const once=()=>{ if(ran) return; ran=true; drawCharts(id); };
  requestAnimationFrame(()=>requestAnimationFrame(once));
  setTimeout(once, 60);
}
function drawCharts(id){
  destroyRenderedCharts();

  Chart.defaults.plugins.legend.labels.color='#c4c4d2';

function ecoModel(){const FEE=179,FIX=3500,ADM=800,PER=12,CAP=75;const ns=[0,10,20,25,30,40,50,75,100,125,150];
  const cost=n=>n===0?FIX:FIX+Math.ceil(n/CAP)*ADM+n*PER;const rev=n=>n*FEE;return{ns,cost,rev};}
function initEcoCharts(){const {ns,cost,rev}=ecoModel();const g=(x)=>document.getElementById(x);const grid={grid:{color:'rgba(255,255,255,.07)'}};
  if(g('ch_breakeven')) makeChart('ch_breakeven',{type:'line',data:{labels:ns,datasets:[{label:'Revenue',data:ns.map(rev),borderColor:'#e0b84a',backgroundColor:'rgba(224,184,74,.12)',fill:true,tension:.2,pointRadius:2},{label:'Cost',data:ns.map(cost),borderColor:'#fb7185',tension:.2,pointRadius:2}]},options:{plugins:{legend:{position:'bottom'}},scales:{y:{...grid,ticks:{callback:v=>'$'+(v/1000)+'k'}},x:{...grid}}}});
  const ms=ns.filter(n=>n>0);
  if(g('ch_margin')) makeChart('ch_margin',{type:'line',data:{labels:ms,datasets:[{data:ms.map(n=>Math.round((rev(n)-cost(n))/rev(n)*100)),borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.12)',fill:true,tension:.25,pointRadius:2}]},options:{plugins:{legend:{display:false}},scales:{y:{min:-100,max:100,...grid,ticks:{callback:v=>v+'%'}},x:{...grid}}}});
  if(g('ch_staff')) makeChart('ch_staff',{type:'bar',data:{labels:['25','75','150','300'],datasets:[{label:'AI-run (us)',data:[1,1,2,4],backgroundColor:'#e0b84a'},{label:'Manual',data:[1,3,6,11],backgroundColor:'#5b6472'}]},options:{plugins:{legend:{position:'bottom'}},scales:{x:{...grid,title:{display:true,text:'employees'}},y:{...grid,title:{display:true,text:'admins'}}}}});
  if(g('ch_setup')) makeChart('ch_setup',{type:'doughnut',data:{labels:['Ops runway $12k','WC buffer $10k','Legal $6k','PT+licence $4k','Infra $1k'],datasets:[{data:[12,10,6,4,1],backgroundColor:['#e0b84a','#f0d68a','#fb7185','#7aa2ff','#5b6472'],borderWidth:2,borderColor:'#12121a'}]},options:{plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:10}}}},cutout:'58%'}});
  runCalc();
}

/* ---------------- CALCULATOR ---------------- */
const TER={A:[[5400000,0],[6300000,0.0075],[6750000,0.01],[7500000,0.0125],[8550000,0.015],[9650000,0.0175],[10050000,0.02],[10700000,0.025],[11600000,0.035],[12500000,0.04],[13750000,0.05],[15100000,0.06],[16800000,0.07],[19750000,0.09],[24150000,0.11],[26450000,0.12],[28000000,0.13],[30050000,0.14],[32400000,0.15],[35400000,0.16],[39100000,0.17],[43850000,0.18],[47800000,0.19],[51400000,0.20],[56300000,0.21],[62200000,0.22],[68600000,0.23],[77500000,0.24],[89000000,0.25],[999999999,0.30]],
  B:[[6200000,0],[7100000,0.0075],[7500000,0.01],[8250000,0.0125],[9200000,0.015],[10750000,0.0175],[11250000,0.02],[11600000,0.025],[12600000,0.03],[13600000,0.04],[14950000,0.05],[16400000,0.06],[18450000,0.07],[21850000,0.09],[26000000,0.11],[27700000,0.12],[29350000,0.13],[31450000,0.14],[33950000,0.15],[37100000,0.16],[41100000,0.17],[45800000,0.18],[49500000,0.19],[53800000,0.20],[58500000,0.21],[64000000,0.22],[71000000,0.23],[80000000,0.24],[93000000,0.25],[999999999,0.30]],
  C:[[6600000,0],[7800000,0.0075],[8250000,0.01],[9200000,0.0125],[10950000,0.015],[11200000,0.0175],[12050000,0.02],[12950000,0.025],[14150000,0.03],[15550000,0.04],[17050000,0.05],[19500000,0.06],[22700000,0.07],[26600000,0.09],[28100000,0.11],[30100000,0.12],[32600000,0.13],[35400000,0.14],[38900000,0.15],[43000000,0.16],[47400000,0.17],[51800000,0.18],[56000000,0.19],[60400000,0.20],[65600000,0.21],[71500000,0.22],[79500000,0.23],[89000000,0.24],[103000000,0.25],[999999999,0.30]]};
function terRate(cat,gross){const t=TER[cat]||TER.A;for(const[cap,r]of t){if(gross<=cap)return r;}return 0.30;}
function fmt(n){return 'Rp'+Math.round(n).toLocaleString('id-ID');}
function runCalc(){
  const out=document.getElementById('calcOut'); if(!out) return;
  const gross=+(document.getElementById('calcGross').value||0);
  const cat=document.getElementById('calcTer').value;
  const jkk=+document.getElementById('calcJkk').value;
  const feeUsd=+(document.getElementById('calcFee').value||0);
  const jpBase=Math.min(gross,11086300), kesBase=Math.min(gross,12000000);
  // employer
  const eJHT=gross*0.037, eJP=jpBase*0.02, eJKK=gross*jkk, eJKM=gross*0.003, eKes=kesBase*0.04;
  const empBpjs=eJHT+eJP+eJKK+eJKM+eKes;
  const thr=gross/12; const sev=gross*0.04;
  const feeIdr=feeUsd*FX;
  const loaded=gross+empBpjs+thr+sev+feeIdr;
  // employee
  const dJHT=gross*0.02, dJP=jpBase*0.01, dKes=kesBase*0.01;
  const pph=terRate(cat,gross)*gross;
  const net=gross-dJHT-dJP-dKes-pph;
  const deel=599*FX;
  out.innerHTML=`
   <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Employer's true monthly cost</div>
   <div class="line"><span>Gross salary</span><b>${fmt(gross)}</b></div>
   <div class="line"><span>+ Employer BPJS</span><span class="neg">${fmt(empBpjs)}</span></div>
   <div class="line"><span>+ THR accrual (1/12)</span><span class="neg">${fmt(thr)}</span></div>
   <div class="line"><span>+ Severance accrual (~4%)</span><span class="neg">${fmt(sev)}</span></div>
   <div class="line"><span>+ Our fee ($${feeUsd})</span><span class="neg">${fmt(feeIdr)}</span></div>
   <div class="line tot"><span>Total cost to employ</span><span>${fmt(loaded)}</span></div>
   <div class="mini">= ${(loaded/gross*100).toFixed(0)}% of gross · vs Deel's fee alone ${fmt(deel)}/mo — you save ${fmt(deel-feeIdr)} on fees</div>
   <div style="height:12px"></div>
   <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Employee take-home</div>
   <div class="line"><span>Gross</span><b>${fmt(gross)}</b></div>
   <div class="line"><span>− Employee BPJS (JHT+JP+Kes)</span><span class="neg">${fmt(dJHT+dJP+dKes)}</span></div>
   <div class="line"><span>− PPh 21 (TER-${cat}, ${(terRate(cat,gross)*100).toFixed(2)}%)</span><span class="neg">${fmt(pph)}</span></div>
   <div class="line tot"><span>Net take-home</span><span class="pos">${fmt(net)}</span></div>`;
}
function updateSom(){
  const out=document.getElementById('somOut'); if(!out) return;
  const companies=+(document.getElementById('somCompanies').value||0);
  const seatsPer=+(document.getElementById('somSeats').value||0);
  const fee=+(document.getElementById('somFee').value||0);
  const seats=Math.round(companies*seatsPer);
  const arr=seats*fee*12;
  const breakeven=25;
  out.innerHTML=`
   <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">SOM sensitivity</div>
   <div class="line"><span>Companies reached</span><b>${companies.toLocaleString()}</b></div>
   <div class="line"><span>Avg seats / client</span><b>${seatsPer.toFixed(1)}</b></div>
   <div class="line"><span>Active seats</span><b>${seats.toLocaleString()}</b></div>
   <div class="line"><span>Monthly fee</span><b>$${fee}</b></div>
   <div class="line tot"><span>Run-rate ARR</span><span>$${Math.round(arr).toLocaleString()}</span></div>
   <div class="mini">${seats>=breakeven?'Above':'Below'} ~25-seat break-even by ${Math.abs(seats-breakeven).toLocaleString()} seats.</div>`;
}

/* ---------------- NAV / ROUTER ---------------- */
let curId='home';
let curKey='home';
let curRoute=null;
const ROUTE_ALIASES={
  'market/som':{key:'market/som',anchor:'sec-som'},
  'competition/deel':{key:'competition/deel'},
  'compliance/severance':{key:'compliance/severance',anchor:'sec-severance'}
};
function childrenOf(moduleId){return SUBS[moduleId]||[];}
function firstKey(moduleId){
  const kids=childrenOf(moduleId);
  return kids.length?`${moduleId}/${kids[0].id}`:moduleId;
}
function allRoutes(){
  const routes=[];
  MODS.forEach(m=>{
    const kids=childrenOf(m.id);
    if(!kids.length){routes.push({key:m.id,module:m,child:null});return;}
    kids.forEach(child=>routes.push({key:`${m.id}/${child.id}`,module:m,child}));
  });
  return routes;
}
function resolveRoute(raw){
  const rawKey=(raw||'').replace(/^#/,'')||'home';
  // Aliases only carry an optional scroll anchor; the target key is resolved
  // directly below (no recursion — the alias key equals the plain key).
  const alias=ROUTE_ALIASES[rawKey];
  const anchor=alias?alias.anchor:undefined;
  const key=alias?alias.key:rawKey;
  const first=key.split('/')[0];
  const module=MODS.find(m=>m.id===first);
  if(!module) return {key:'home',id:'home',module:MODS[0],child:null,hash:'home',anchor};
  const kids=childrenOf(module.id);
  if(!kids.length) return {key:module.id,id:module.id,module,child:null,hash:module.id,anchor};
  const childId=key.includes('/')?key.split('/')[1]:kids[0].id;
  const child=kids.find(k=>k.id===childId)||kids[0];
  return {key:`${module.id}/${child.id}`,id:module.id,module,child,hash:`${module.id}/${child.id}`,anchor};
}
function renderNav(){
  const nav=document.getElementById('modnav'); let html=''; let lastG='';
  MODS.forEach(m=>{
    if(m.group!==lastG){html+=`<div class="navsec">${m.group}</div>`;lastG=m.group;}
    const kids=childrenOf(m.id);
    if(!kids.length){
      html+=`<div class="navlink ${curKey===m.id?'active':''} ${isDone(m.id)?'completed':''}" data-id="${m.id}" role="link" tabindex="0" aria-current="${curKey===m.id?'page':'false'}" aria-label="${m.nav}${isDone(m.id)?' (completed)':''}" onclick="go('${m.id}')"><span class="ix" aria-hidden="true">${m.ix}</span><span>${m.nav}</span><span class="done" aria-hidden="true">✓</span></div>`;
      return;
    }
    const done=kids.filter(k=>isDone(`${m.id}/${k.id}`)).length;
    const complete=done===kids.length;
    const open=curId===m.id;
    html+=`<div class="navgroup ${open?'open':''} ${complete?'completed':''}">
      <button class="navhead ${open?'active':''}" role="button" aria-expanded="${open}" onclick="toggleGroup('${m.id}')">
        <span class="ix" aria-hidden="true">${m.ix}</span><span>${m.nav}</span><span class="count">${done}/${kids.length}</span><span class="chev" aria-hidden="true">›</span>
      </button>
      <div class="navkids" id="kids_${m.id}">
        ${kids.map(k=>{const key=`${m.id}/${k.id}`;return `<button class="navchild ${curKey===key?'active':''} ${isDone(key)?'completed':''}" onclick="go('${key}')" aria-current="${curKey===key?'page':'false'}">${k.nav}</button>`;}).join('')}
      </div>
    </div>`;
  });
  nav.innerHTML=html;
}
function toggleGroup(moduleId){
  if(curId===moduleId){go(firstKey(moduleId));return;}
  go(firstKey(moduleId));
}
function renderTabs(){
  const bar=document.getElementById('tabbar'); if(!bar) return;
  let kids=childrenOf(curId);
  // Competition has 17 children (3 structural + 14 competitor pages). Showing all
  // as top pills balloons the sticky bar; competitor pages are reached via the
  // profiles grid + sidebar accordion, so only the structural tabs go up here.
  if(curId==='competition') kids=kids.slice(0,3);
  if(!kids.length){bar.innerHTML='';return;}
  bar.innerHTML=kids.map(k=>{const key=`${curId}/${k.id}`;const active=curKey===key||(curId==='competition'&&k.id==='profiles'&&!['landscape','small-player-wins'].includes(curKey.split('/')[1]));return `<button class="tab ${active?'active':''}" role="tab" aria-selected="${active}" onclick="go('${key}')">${k.nav}</button>`;}).join('');
}
function go(id,routeHash,anchor){
  const route=resolveRoute(id);
  const m=route.module; curId=m.id; curKey=route.key; curRoute=route;
  try{location.hash=routeHash||route.hash||route.key;}catch(e){}
  document.getElementById('crumb').innerHTML=`${m.nav}${route.child?` &rsaquo; ${route.child.nav}`:''}`;
  const content=document.getElementById('content');
  const contentKey=C[route.key]?route.key:m.id;
  const title=route.child?`${m.title} — ${route.child.nav}`:m.title;
  content.innerHTML=`<section class="view" id="v_${m.id}" aria-label="${title}">${C[contentKey]?C[contentKey]():'<p>Coming soon.</p>'}${navButtons(route)}</section>`;
  // wrap tables so they scroll (never overflow) on narrow viewports
  content.querySelectorAll('table').forEach(t=>{
    if(t.parentElement&&t.parentElement.classList.contains('tablewrap'))return;
    const w=document.createElement('div');w.className='tablewrap';t.replaceWith(w);w.appendChild(t);
  });
  window.scrollTo({top:0});
  renderNav();
  renderTabs();
  initCharts(m.id);
  if(m.id==='economics') setTimeout(runCalc,60);
  if(m.id==='market') setTimeout(updateSom,60);
  if(anchor||route.anchor) setTimeout(()=>jumpTo(anchor||route.anchor),80);
  closeNav();
}
function jumpTo(anchor){
  const el=document.getElementById(anchor);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}
function navButtons(route){
  const routes=allRoutes();
  const i=routes.findIndex(x=>x.key===route.key);
  const prev=routes[i-1], next=routes[i+1];
  const label=r=>r.child?r.child.nav:r.module.nav;
  const doneBtn=route.key!=='home'?`<button class="btn ${isDone(route.key)?'ghost':'gold'}" onclick="markDone('${route.key}',${!isDone(route.key)});go('${route.key}')">${isDone(route.key)?'✓ Marked complete':'Mark complete'}</button>`:'';
  return `<div class="next"><div>${prev?`<button class="btn" onclick="go('${prev.key}')">← ${label(prev)}</button>`:''}</div><div style="display:flex;gap:10px;flex-wrap:wrap">${doneBtn}${next?`<button class="btn gold" onclick="go('${next.key}')">${label(next)} →</button>`:''}</div></div>`;
}
function refreshProgress(){
  const routes=allRoutes().filter(r=>r.key!=='home');
  const total=routes.length;
  const complete=routes.filter(r=>isDone(r.key)).length;
  const pct=Math.round(complete/total*100);
  document.getElementById('progN').textContent=pct+'%';
  document.getElementById('topPct').textContent=pct+'%';
  document.getElementById('topbar').style.width=pct+'%';
  const off=100-pct; document.getElementById('ringfill').setAttribute('stroke-dashoffset',off);
}

/* ---------------- MOBILE DRAWER ---------------- */
function toggleNav(){document.getElementById('sidebar').classList.contains('open')?closeNav():openNav();}
function openNav(){document.getElementById('sidebar').classList.add('open');document.getElementById('scrim').style.display='block';document.getElementById('menubtn').setAttribute('aria-expanded','true');}
function closeNav(){document.getElementById('sidebar').classList.remove('open');document.getElementById('scrim').style.display='none';document.getElementById('menubtn').setAttribute('aria-expanded','false');}

/* keyboard operability for div/li-based controls */
document.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key===' ')&&e.target&&e.target.matches&&e.target.matches('.navlink,.navhead,.navchild,.check li,.videocard,.chip')){
    e.preventDefault();e.target.click();
  }
  if(e.key==='Escape')closeNav();
});

window.addEventListener('hashchange',()=>{
  const route=resolveRoute(location.hash);
  if(route.key!==curKey||route.anchor) go(route.key,route.hash,route.anchor);
});

const startRoute=resolveRoute(location.hash);
renderNav(); refreshProgress(); go(startRoute.key,startRoute.hash,startRoute.anchor);

// Chart.js may finish loading after first paint — re-init current view once ready
let tries=0;
const poll=setInterval(()=>{tries++;if(window.Chart){initCharts(curId);clearInterval(poll);}if(tries>80)clearInterval(poll);},80);
</script>
